front:
  text: 急救仙方卷之三惻三
  hash: sha256:c36b07749d99961ef3fbfbcbb5d50c4ceb0e7f1bc03c2d02683f22e3fc1fafda
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_HFL_003-001a, image: hfl/0821/0821-076.png}
body:
  text: 婦女雜病品四物湯熟地黄川芎芍藥當歸各等分右爲粗末水煎服若女蒸勞熱加地骨皮牡丹皮知母柴胡黄芩若妊娠胎動不安下血不止者加艾十葉阿膠黄耆葱若血藏虚冷崩中去血過多亦加膠艾若血崩者加生地黄蒲黄黄芩一加阿大艾黄芩若血虚而腹痛微汗而惡風加莪术官桂若風虚眩運加秦芁羗活若氣虚弱起則無力眶然而倒加厚朴陳皮若發熱而煩不得睡卧加黄連栀子若虚寒脉微自汗氣難布息清便自調加乾姜附子炮若中濕身沉重無力身凉微汗加白术茯苓若筋骨技節痛及頭痛增寒加羗活防風藁本細辛若臍下虚冷腹痛及腰脊間悶痛加玄胡索苦練各炒若經水過多别無餘證加黄芩白术若經水澁少加葵花紅花若虚勞氣弱咳嗽喘滿加薑製厚朴麩炒枳實若經水暴下加黄芩若血積塊痛加莪术三梭桂乾漆炒若赤白帶下加香附子桂炒若血痢加膠艾黄連若産後血痢腹痛疼加槐花黄連御米殻若血熱相愽舌乾口渴加括蔞麥門冬若大渇引飲加石膏知母若藏府秘澁加大黄桃仁若嘔吐者加白术人參藿香生姜若虚寒滑泄者加官桂附子炮若虚煩不得睡加竹葉人參酸棗仁若目赤暴發作雲翳疼痛不可忍加防風羗活防巳酒浸草龍膽酒浸芎歸湯川芎當歸各等分右㕮咀水煎熱服若産後眩運加芍藥甘菊花若産後腹痛加官桂酒童便合煎若妊娠子死或不死胎動加紫蘇酒水合煎死者即下未死者即安若臨月服之則縮胎易産若倒横難生或子死腹中加黑豆一合先炒熟水童便合煎若腸風藏毒加槐花末半錢三日取下血塊即愈若吐血加生地黄黄芩枳殻若血氣上喘下脹腫加艾煎湯空心調散服若産後血悶心迷喘急腹痛加炒黑豆一合入姜汁同煎服若崩中漏下失血不止加香附子炒每兩入甘草一錢湯點服若白帶加芍藥半兩乾姜二錢半同爲末米飲調下若赤白帶下加香附子棕櫚燒灰同爲末米飲調下苦練丸治赤白帶苦練碎酒炒茴香炒當歸各五錢右爲細末酒糊爲丸每服五十丸空心温酒送下又方雲母爲粉温水和服三方寸七立見神效又方夏枯草花開時採搗爲末每服二錢食前温飲調下能飲者酒服又方用酸漿草隂乾爲末空心酒下三錢七治月候湛濁赤白帶下多年不差者石燕一枚於堅硬甆器内以温水磨服之丁香膠艾湯治白帶白崩之物雖多間有如屋漏水下時有鮮血當歸身一錢半熟地黄白芍藥川芎各半錢阿膠六分炒珠丁香四分生艾葉一錢右當歸酒洗剉艾亦剉川芎丁香地黄爲細末都作一服水五盞先煎作一盞半去滓入阿膠再煎至一盞帶熱空心服之三兩服愈補經固眞丸治心胞尺脉極微白帶流而不止甘草炙柴胡各一錢黄芩一錢令剉乾姜末三錢橘皮半錢人參二錢白葵花十六個去萼剪郁李仁一錢去皮尖另研如泥右件除芩外以水三盞煎至盞七分再入黄芩同煎至一盞去滓空心熱服少時以早膳壓之萬金散治婦人血崩不止香附子四兩炒當歸尾一兩二錢五靈脂一兩炒右爲細末每服五錢醋調空心服立愈當歸散治血崩當歸一兩龍骨一兩燒香附子三錢炒棕毛灰半兩右爲細末空心米飲調下四錢忌油膩等物蓮殻散治血崩乾蓮蓬燒存性棕皮及毛燒灰各半兩香附子三錢炒右爲細末每服四錢空心米飲調下小薊湯治崩漏不止小薊莖葉研汁一盞生地黄汁一盞白术半兩剉右三件入水一盞煎至一半去滓温服槐花散治血崩陳槐花一兩百草霜半兩右爲末每服三四錢温酒調下若昏憒不省人事則燒紅秤錘淬酒下芎藭酒治崩中晝夜不止芎藭一兩生地黄汁一盞右先用酒五盞煮芎藭一盞去滓下地黄汁再煎三二沸分爲三服槐灰散治崩中或下赤白不問年月遠近並皆治之槐枝不以多少燒灰右以温酒調下方寸七食前螵蛸散治漏下臍腹痛乆不止者烏賊魚骨燒存生右研爲細末每服二錢煎木賊湯下紅花散治婦人産後血昏血崩月事不調遠年乾血氣乾荷葉牡丹皮當歸紅花蒲黄炒各等分右爲細末每服半兩酒煎和滓温服如胞衣不下調榆白皮末半兩服之立下萬病丸治女人月經瘀閉月候不來繞臍痛乾漆杵碎炒令一時久大烟出烟頭青白爲度牛膝酒浸一宿焙各一兩右爲末以生地黄汁一升入二味藥末瓦石器内熳火熬可丸即丸如桐子大每服二丸空心米飲調下牛膝散治婦人月水不利臍腹㽲痛牛膝一兩桂心赤芍藥桃仁玄胡索當歸牡丹皮川芎木香各七錢右爲細末每服方寸七温酒調下食前催經散治婦人經脉不行凌霄花不以多少搗羅爲末右每服二錢温酒調下食前服衛生湯治婦人女子虚弱月事不來白芍藥當歸各二兩黄耆三兩甘草人參各一兩右爲粗末每服五錢水煎空心服二神丸治室女血氣相博腹中刺痛經候不調橘紅二兩玄胡索去皮醋煮當歸剉酒浸炒各一兩右爲末酒煮米糊丸如桐子大每服一百丸艾醋湯下蓮蓬散療經血不止蓮蓬燒灰存性右爲細末每服二錢熱酒調下徹清膏治婦人頭痛川芎三錢蔓荆子細辛薄苛藁本各一錢生甘草半錢炙甘草半錢當歸一錢半右爲細末食後茶清調下二錢石膏散治頭痛不可忍石膏麻黄去根節各一兩乾葛七錢半何首烏半兩忌鐵右爲細末每服三錢生姜三片水煎熱服川芎散治婦人偏頭疼川芎甘菊花石膏各三錢白僵蠶六錢生用右爲極細末每服三錢茶清調下清寧散治婦人偏頭痛連睛痛者石膏黍粘子炒川芎各等分菊花細辛减半右爲末茶清調下食前湧泉散治婦人妳汁因氣絶少瞿麥穗麥門冬去心龍骨川山甲炮黄王不留行右爲細末每服一錢熱酒調下後喫猪蹄羹少許又用木梳左右乳上梳三二十下日三服苽蔞散治乳汁少苽蔞根薄荷乾等分爲末酒調服右先喫羊骨汁一碗次服藥後再喫葱絲羊羹少時微汗出效下乳散粳米糯米各半合生甘草半兩萵茞子一合益淘凈右煎汁一升研藥令極細去滓分作三服立下乳香散治吹妳乳香一錢括蔞根末一兩右研匀每服二錢温酒調下又用天南星末温湯調塗之橘皮散治乳癰初發神效橘皮湯浸去白晒乾麵炒微黄右爲末每服二錢麝香研酒調服苽蔞散治乳癰妳勞屢效苽蔞一個去皮焙爲末生甘草一錢乳香一錢另硏没藥二錢末另研當歸酒浸焙各半兩右用無灰酒三升銀石器内慢火熬取一升清汁分三服連喬散治妬乳連喬升麻硭硝各一兩玄參芍藥白斂防巳射干各八錢大黄二錢甘草六錢杏仁四十個去皮尖右㕮咀水五升煮二升後下大黄數沸却下硝分三服隂蝕瘡方當歸芍藥甘草地榆芎藭各三兩右細切以水五升煮取二升去滓熏洗日三夜一又方蒲黄一升水銀一兩二味硏均以粉上又方蝦䗫兔屎等分爲末敷瘡上良治婦人夢與鬼交妄有所見聞言語錯亂茯神一兩半茯苓人參石菖蒲各一兩赤小豆半兩右㕮咀每服四錢水一盞煎食前温服辟邪丹治婦人與鬼魅交通虎頭骨二兩朱砂雄黄雌黄鬼臼皁莢鬼箭黎盧蕪夷仁各一兩右件生爲末鍊蜜丸如彈子大囊盛一丸男左女右繫臂上及用一丸當病人户前燒之一切邪鬼不敢近菖蒲散治婦人月水澁滯隂間腫痛菖蒲當歸各一兩炒秦芁七錢半吴茱萸半兩製右爲粗末每服三錢水一盞葱白五寸煎空心温服又方艾葉五兩防風三兩大戟二兩右剉細以水一斗煮取五升熱洗日三切宜避風冷治婦人隂腫或瘡爛者麻黄黄連蛇床各二兩艾葉一兩半烏梅十箇右剉細以水一斗煮取五升去滓熱洗避風冷大黄散治隂痒大黄微炒黄芩黄耆炙各一兩赤芍藥玄參丹參山茱萸蛇床子各半兩右爲細末食前温酒調二錢服又方杏仁燒灰乘熱綿裹納隂中日二易之又方蒜煮湯洗之一方用枸𣏌根煎湯洗之又方取雞肝乘熱納隂中如有蟲當盡下治隂痒脫方礬石爲末空心酒服方寸七日三治陰挺下脫方當歸炒黄苓各二兩牡蠣二兩半蝟皮炙一兩赤芍藥一兩半右爲細末每服二錢食前暖酒調下米飲亦可治隂中生瘡方杏仁炒存性雄黄礬石各半兩麝香一錢二分右爲末敷隂中内補丸治婦女五勞七傷子息斷緒服一月當妊娠百病皆愈萆薢四兩牛膝五加皮白术各二兩川烏炖枳實麩炒丹參各一兩右爲細末鍊蜜丸如桐子大温酒下二十丸空心日午晡後各進一服有娠住服辨證詩括紫色紅傷寒青驚白色疳黑時因中惡黄色困脾端觀兒顔色及男左女右手二指節文如經過三節上者難治自下而上看全嬰紫圓治小兒變蒸發熱不解并挾傷寒温壯后熱不歇腹中有痰癖哺乳不進乳則吐哯食癎先寒後熱此方無所不治雖下不虚人代赭石赤石脂各一兩大杏仁五十粒去皮尖巴豆三十粒去殻用厚紙追去油或加青蒙石一錢重另爲末入和右石二味爲末别研巴杏爲膏相和更擣一二千杵當自相得若硬入鍊熟蜜少許同杵收密器中若生纔三十日兒服止如麻子大一粒與少乳汁令下食頃又與坐乳勿今多至日中當小下則熱除若未全除明日更與一粒如百日兒圓如小豆一粒以此準定加减盖小兒初生骨骼未成筋骨未就臟腑未充精神未全氣血虚浮肌膚軟脆資乳以養積漸增長故有變蒸之候三十二日爲一變變者變其形容再變爲一蒸蒸者蒸長肌肉十變而五小蒸又四大蒸積五百七十六日大小蒸俱畢乃得成人故當變蒸之時輕者體熱而微驚耳冷尻冷上唇頭有白泡起如魚目珠子微汗時出其重者體壯熱而脉亂或汗或不汗不欲乳食食輙吐哯目白微赤黑睛微白變蒸畢則日明矣此乃氣血周流肌膚充溢所致謹無他治但少與紫圓微下其熱即退若二次下後身有熱而耳熱尻熱乃爲他病宜别治焉保嬰桃紅散亦可用水煮麵糊爲丸如龍眼大臨用各依湯使磨化服如用吞服則丸如緑豆大每服十五丸川烏白附子各五錢生用大南星陳半夏各二錢生用右剉碎以新汲井花水拌濕瓦器中浸之春五夏三秋七冬十日晒夜露一日一換新水日足晒乾爲末以好大粒朱砂五錢重另研爲細末和如桃紅色爲度治急驚風薄荷心金銀環同煎湯下重則灸百會慢驚用全蝎鈎藤同煎湯下重灸百會嘔瀉薑葱煎湯下或老米飲加酸醋一呷下腹痛淡姜湯下咳嗽桑白皮煎湯下胎驚夜啼及覺腹中有蟲用苦練根皮煎湯露一宿下傷風咳嗽姜葱煎湯下瘧亦薑葱湯下後用姜湯調末子服尤佳保命丹治小兒急慢驚風痰涎壅盛牙關緊急角弓反張睡中驚跳哭泣呌噉偏搐斜目面青臉赤兩眼直視手足搐搦天吊客仵揺頭上竄一切風痰並皆治之大箇無油南星二兩煨朋砂凈六錢白殭蠶二兩姜汁浸炒茯神去皮尖六錢蟬退去頭足翅凈一兩白礬一兩火枯天龍四條酒煮即蜈蚣也麝香一錢全蝎去尾毒凈用二兩糯米炒黄爲度去米遠志去骨用凈肉一兩甘草一節同煮過去草大粒朱砂五錢另硏爲衣猪牙皂角二兩打碎煎濃汁右先將南星煨以皁角汁淬十數次餘皂汁留煮米糊以前藥俱爲末丸如龍眼大以朱砂爲衣隂乾每用一丸以薄苛燈草金銀環子同煎湯浸磨化臨時於火上頓温與服保童丹治小兒急慢驚風痰涎咳嗽喘滿不進乳食蟲疳積熱膨脹等證陳枳殻五對大者去根用巴豆七粒去殻入内以綫十字縛定好醋反覆煮軟去巴切片焙乾餘醋留煮糊三稜莪术煨各五錢金箔十箇朱砂二錢另硏右爲末以前醋煮麵糊爲丸菉豆大朱砂爲衣未及周歲一丸周歲巳上三丸三歲巳下五丸巳上七丸用薄苛燈心金銀環同煎湯下不能吞磨化與服急救仙方卷之三
