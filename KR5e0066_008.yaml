front:
  text: 急救仙方卷之八惻八
  hash: sha256:25b3fdc83c6e35fbdd44f7c7e7ae29e00c1c0f49d9f5d9199ec78324c33f42e9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_HFL_008-001a, image: hfl/0822/0822-066.png}
body:
  text: 疔瘡治法夫疔瘡之初生也人多不覺生於頭面手足肚脅腰腿間亦無定處一二日必作寒熱如瘧頭疼體痛不可忍其痛稍異於尋常之證須去遍身尋認其瘡如有小瘡與常患之瘡稍異即是疔也此瘡得患各有所因而其形狀亦各不同猪疔形圓而小瘡口內有油羊疔形長色白牛疔形圓而小瘡口內無油狗疔形長或帶尖色赤驢馬疔其狀三角頂上有黑點根赤或要知此瘡非特猪牛狗羊驢馬之毒所致宿水不潔飲之亦生水疔豆腐中有人汗食之亦生豆腐疔又有氣疔鬼疔形狀雖不一然其治之之法則一也瘡色緩第一日瘡頂疱色小白第二日色大白第三日色微紫第四日色真紫瘡色急第五日色微青小緊第六日色深青大緊第七日色黑其狀有如魚臍又如炙瘡之狀乃最緊急之候也瘡證吉有應如生一疔之外别處肉上再生一小瘡即是有應可用針挑破護場瘡四圍有赤腫生多瘡多者謂之滿天星飲食如常頭痛身熱手足溫瘡證凶無應别處肉上無瘡不護場疔四圍無赤腫內疔盛渴欲飲水飲食不進頭眩眼花護床不動卧不起也眼白睛癡不轉唇舌青腹痛甚者有內疔五心腫手足冷氣粗無脉桃紅散治諸疔瘡雖有凶證迭見六脉俱絶死者此藥悉能主之蟾酥信石各少許蟬蛻去足翅斑猫去足翅各三箇蜈蚣頭一箇國丹五錢風化石灰一兩沙鍋盛瓦片並炭火煅二時久取出右各製同研為末令極細指爪甲刮葱白皮內涎調藥先以禾葉針針破瘡口可深半寸凡疔瘡必有紅絲路可隨紅絲斜下針如瘡在胸以上可斜向下如在胸下可針斜向上蓋瘡毒喜趨心故下針亦隨毒氣行也出針後瘡口有惡血須令出盡别將蟾酥一粒如麥粒大入在瘡口中用針送令深入却以前葱涎所調藥敷瘡口莫敷在好肉上用冷水浸濕紙二三十重貼在藥上封固瘡上如清早封固至晚覺瘡口熱即去紙水洗去令淨用玉紅散摻瘡口瘡口必有數日臖作疼痛只用玉紅散摻瘡仍日用葱湯洗然疔瘡之證雖危惡但能用針破瘡口入蟾酥在內以桃紅散封固瘡後即可保其回生也至如瘡口臖作疼痛不可忍可不必憂此非疔毒為害乃是蟾酥在作腐爛疔毒故爾痛也可採芙蓉葉桑葉亦可擂敷瘡四圍散其血勿令血潮日夜各换一藥須洗瘡後上藥其瘡安好不日也若疔瘡初發時必發寒熱身疼此乃毒氣在表當汗而解自沸湯主之老人虛人孕婦不宜汗下止用桃紅散拔毒自沸湯白礬五錢青黛三錢冢間貼背乾石灰三錢右件同為細末研至無聲為度打和令勻每服三錢井花水半碗調柳條攪千百下令勻頓服之厚衣蓋覆良久用葱豉湯入醋少許極熱服少助藥力得汗而解若始不覺是疔瘡不曾以前法出汗過數日方覺則寒熱體痛皆罷毒氣入裏矣須用利藥使內中毒氣下泄雄黃丸主之雄黃丸雄黃鬱金各五錢巴豆半錢去心殼略去油一方加信石一字許不可多用清油煮半日取出晒乾入藥一方加斑猫七箇去翅觜糯米炒變色去米用以治瘰癧一方加玄明粉三錢以治咽喉腫痛喉閉等證右各研為細末麵糊為丸如菉豆大每服七丸冷茶清吞下取利為度如未利再服玉紅散寒水石一兩火煅輕粉國丹各少許右件研為細末摻瘡口日夜二洗二换蓋蟾酥膏桃紅散皆為毒藥故令瘡疼痛用玉紅散解二藥之毒用二藥散其血則當自然安矣若一時未能辨前項蟾酥桃紅散等藥可用李世安一宗治法主之功效尤速李世安治疔法當歸散當歸尾二兩川芎乾葛荆芥穗烏藥白芷川獨活赤芍藥升麻各一兩羌活甘草防風去蘆枳殼各半兩紅花蘇木各二錢半瘡疼痛者加乳香沒藥白芷各五錢瘡熱不退加筀竹青山栀仁各少許大便閉加枳殼一兩燥煩加燈心十莖竹茹一塊渴者加天花粉一兩腫者加甘草節降真節各半兩眼暈加川芎白芷荆芥防風渴而小便閉者加滑石一兩右件㕮咀每服五錢燈草十數莖烏豆十粒水一鍾半煎至八分病在上食後服病在下食前服連進取效若患疔瘡始初不覺不曾用前法出汗過數日外證皆罷或在腹脅之間或在胸腋之下腫起此乃毒氣入裏所致宜用霹靂火治之若服當歸散外證不解者亦急用霹靂火發散霹靂火法鵝卵石炭火煆通赤用澱桶一隻先置竹椅一隻於桶內又用一杓置竹椅下令病人裸體坐於椅上用荆芥為末調下酸米醋一器却置煅石於杓內即用荆芥醋淋沃石上火力不可大煅灼人恐病人難禁若火力已微汗尚未透可再加火力再沃之沃時桶口用衾覆蓋别用一衾蓋病人頭上止留口鼻在外令遍身汗出須要頭面皆有汗病即除矣此法絶妙老人虛人孕婦不宜汗下可針破瘡口用海馬拔毒散點瘡酒煎蒼耳服至如毒入裏用霹靂火時病人不須入桶止用一小水桶依前法以杓盛煆石在桶中用醋淋沃令病人側身以腫處覆在桶上四圍用衾被遮護勿令氣泄良久腫處出汗如汗未透可再加火力再沃之須令腫處汗透却不必遍身汗也若瘡在兩脅間毒氣欲奔心乃危急之證也可急於患處尖上用艾炷灸三五壯仍於灸穴前後針出少血灸瘡四圍有皰起吉無皰凶若瘡生於虛軟不便處不可用針灸者可用松針截法針斷紅絲路如瘡生於兩胯間毒氣欲奔腎者用松針於兩胯紅絲路盡處針斷出血如瘡生頭面上者可於項間絲路盡出針斷出血或各處紅絲路亦有不現者亦可以意消詳用松針針之凡用松針者蓋因紅絲路不現無可下手處故用此法於頷下兩腋間兩胯間虛軟處下手針斷毒氣毋令攻心攻腎而巳松針法取向北松枝上葉極硬者頓齊作一束扎令極緊緩緩以意消詳毒氣所經行虛軟處針之須令出血針時先用酒潤下針處針必小痛令病人稍忍仍用雄黃麝香為末溫酒調一二服與之服之方下針若表證皆罷毒氣入裏者用前雄黃丸主之若手足厥冷六脉俱絶者此乃毒氣巳深氣血為毒氣所并不能流通是以體冷而不現必須用木香流氣飲連進數服氣血流通則脉自回矣然後依法治之萬無一失海馬拔毒散治疔瘡大效兼治諸惡瘡發背海馬一隻炙穿山甲黃士炒水銀朱砂各二錢雄黃三錢輕粉一錢腦子麝香各少許右件除水銀外各研為末打合入水銀再研至無星針破瘡口點藥入內一日一點神效夫內疔之證與外疔之證並同亦發寒熱頭疼體痛但瘡形不現過數日胸背腹脅頭面手足間或有一處腫起即內疔所發之處急用霹靂火如前不護場汗法於腫處出汗若身體寒熱雖未有腫起但腹痛甚者便須作內疔證用後法治之不可緩也用蟾酥一粒病勢重者用二粒置病人舌上噙化化後良久用井花水灌漱却用雄黃丸七丸冷茶清吞下得臟腑利數行其病應手而愈凡治內疔蟾酥可於取時用桑葉小錢大入蟾酥揉和得所丸如念珠大隂乾急救仙方卷之八
