front:
  text: 急救仙方卷之六惻六
  hash: sha256:560a377b3a011203347a9130c4d328aaa74ac8c8e7ceeed9e96fc192e71c6c2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_HFL_006-001a, image: hfl/0822/0822-004.png}
body:
  text: 仙授理傷續斷秘方序此方唐會昌間有一頭陀結草庵于宜春之鍾村貌甚古年百四五十𡻕買數畝墾畬種粟以自給村垊有彭叟者常常往來其廬顔情甚稔或助之耕一日彭之子升木伐條誤墜于地折頸挫肱呻吟不絶彭訴于道人道人請視之命買數品藥親製以餌俄而痛定數日已如平時始知道人能醫求者益衆道人亦厭之乃取方授彭使自製以應求者且誓之以無苟取毋輕售毋傳非人由是言治損者宗彭氏彭叟之初識道人三十許今老矣然風采無異前時問其姓名曰藺道者問其氏曰長安人也始道人閉門不通人事人亦少至惟一鄧先生每春暗秋爽擕稚過之必載酒從焉道人懸一椰瓢壁間鄧至則取瓢更酌彭或遇之亦酌二人皆談笑竟晷醉則高歌其詞曰經世學經世學成無用著山中樂山中樂土堪耕鑿癭瓢有酒同君酌醉卧草廬誰喚覺松隂忽聽雙鳴鶴起來日出穿林薄彭朴不知所言爲何惟熟聽其歌亦得其腔每歸對人歌之人亦不省居久鄧先生不至彭問道人道人云已仙去彭卒不悟後江西觀察使行部至袁州聞彭所歌異之詰其詞得道人姓氏遂遣人同彭叟至其廬邀之至則行矣惟瓢存焉廉大以爲恨謂彭傳其治損諸方因易其村曰鞏道人有書數篇所授者特其最後一卷云理傷續斷方醫治整理𥙷接次第口訣一煎水洗二相度損處三抜伸四或用力收入骨五捺正六用黑龍散通七用風流散填瘡八夾縛九服藥十再洗十一再用黑龍散通十二或再用風流散填瘡口十三再夾縛十四仍用前服藥治之凢腦骨傷碎輕輕用手撙令平正若皮不破用黑龍散敷貼若破用風流散填瘡口絹片包之不可見風著水恐成破傷風若水與風入腦成破傷風則必發頭疼不復可治在髮内者須剪去髮傅之凢腦骨傷碎在頭骨上則可治在太陽穴乃是命處斷然不可治矣凢肩甲骨出相度如何整用椅當圈住脇仍以軟衣被盛簟使一人捉定兩人抜伸却墜下手腕又著曲著手腕絹片縛之凢金井骨在脇之下有損不可夾縛只是捺平令安貼平正用黑龍散貼絹片縛兩脇骨亦如此凢跨骨從臀上出者可用三兩人挺定腿拔伸乃用脚跨入如跨骨從檔内出不可整矣凢手骨出者看如何出若骨出向左則向右邊拔入骨向右出則向左拔入凢手脚骨皆有兩脛若一脛斷則可治兩脛俱斷决不可治矣凡手脚骨傷甚者不可治凢傷損重者大概要拔伸捺正或取開捺正然後傅貼填塗夾縛拔伸當相近本骨損處不可别去一節骨上凢拔伸且要相度左右骨如何出有正拔伸者有斜拔伸者凢認損處只須揣摸骨頭平正不平正便可見凢左右損處只相度骨縫子細撚捺忖度便見大概要骨頭歸舊要撙捺皮相就入骨凢拔伸或用一人或用兩人三人看難易如何凢皮破骨出差殳拔伸不入撙捺相近爭一二分用快刀割些捺入骨不須割肉肉自爛碎了可以入骨骨入之後用黑龍散貼瘡之四圍腫處留瘡口别用風流散填所用刀最要快剜刀雕刀皆可凢捺正要時時轉動使活凢骨碎斷須要本處平正如何大抵骨低是骨不曾損左右看骨方是損處要拔伸捺正用藥貼夾縛要平正方是凢腫是血作用熱藥水泡洗却用黑龍散傅貼凢傷重必用藥水泡洗然後塗藥如傷輕不必洗便塗藥凢夾縛夏三兩日冬五三日解開夾縛處用熱藥水泡洗去舊藥洗時切不可驚動損處了仍用黑龍散傅夾縛盖傷重者方如此凢皮破用風流散填更塗未破用黑龍散貼須用杉木及夾縛之凢拔伸捺正要軟物如絹片之類奠之凢皮裏有碎骨只用黑龍散傅貼後來皮肉自爛其碎骨必然自出來然後方愈凢骨破打斷或筋斷有破處用風流散填塗却用針綫縫合其皮又四圍用黑龍散傅貼凢夾縛用杉木皮數片周回緊夾縛留開皆一縫夾縛必三度縛必要緊凢平處骨碎皮不破用藥貼用密夾縛大概看曲轉處脚凹之類不可夾縛恐後伸不得止用黑龍散貼帛片包縛庶可曲轉屈伸有數處如指骨斷止用苧麻夾縛腿上用苧麻繩夾縛繩如綫繩許大凢貼藥用版子一片將皮紙或油紙以水調黑龍散攤匀在上然後卷之貼損處凢用杉皮浸約如指大片疏排令周匝用小繩三度緊縛三日一次如前淋洗換塗貼藥凢曲縛如手腕脚凹手指之類要轉動用藥貼將絹片包之後時時運動盖曲則得伸得伸則不得屈或屈或伸時時爲之方可凢傷損其初痺而不痛應拔伸捺正復用刀取開皮皆不痛三二日方痛凢損一月尚可整理久則不可凢損不可吃草藥吃則所出骨不能如舊凢跌損腸肚中汙血且服散血藥如四物湯之類凢損大小便不通未可便服損藥盖損藥用酒必熱且服四物湯更看如何又服大成湯加木通如大小便尚未通又加朴硝待大小便通後却服損藥凢傷重者未服損藥先服氣藥如匀氣散之類凢渾身無故損痛是風損當服風損藥如排風湯之類凢服損藥不可吃冷物魚牛肉極冷尤不可喫若喫牛肉痛不可治凢損藥必熱便生血氣以接骨耳凢服藥不拘在紅酒無灰酒生酒皆可凢藥三四月鍊不可多合五月尤甚存散藥隨時旋丸凢收藥丸子末子并用罐子收入厨子内以火焙之凢損用火炙則醫不得服藥不效矣諸藥惟小紅丸大活血丹最貴盖其間用乳香没藥楓香可代乳香三之一血碣難得合大活血丹欠此亦可若有更佳合藥斷不可無乳香没藥若無没藥以番降真代血碣無亦用此代凢所用藥材有外道者有當土者如當歸土與川不同丸子可用土當歸土藥材末子須用外道者凢傷重者用此方煎湯洗之然後傅藥生葱切斷一本用生姜荆芥剉土當歸右三味煎湯温熱淋洗黑龍散貼用治跌撲傷損筋骨碎斷差爻出舊先煎葱湯或藥汁淋洗拔伸整擦令骨相續平正後却用生姜汁或生地黄汁和水調稀却將熟帛或皮紙量損處大小薄攤於上貼之次以木皮約如指大片疏排令周匝將小繩三度縛之要緊三日一次再如前淋洗換藥貼裹不可去夾須護毋令揺動候骨生牢穩方去夾則復如故若被刀箭傷蟲獸傷嚙成瘡穰爛肌肉不生跌磕腫痛并用姜汁和水調貼有破則留口以風流散填塗川山甲六兩炒黄或燒存性丁香皮六兩枇杷葉根去毛入半兩一云山枇杷根士當歸二兩百草霜散血入半兩右焙碾爲細末姜汁水調或研地黄汁調用大活血丹治撲損傷折骨碎筋傷疼痛浮腫腹有瘀血灌注四肢煩滿不安癰疽發背筋肉壞爛諸般風疾左癱右痪手足頑麻婦人血風諸疾産後敗血不行流入四肢頭面浮腫血氣疼痛渾身疼痺經脉湛濁風勞發動百節酸疼并宜服之每服半丸用無灰酒磨化微煎三五沸温服不拘時不限多少此藥將紗葛袋收挂凈處經乆不壞可備急用孕婦莫服損在上食後服在下空心服傷重不拘餘仿此天南星一斤姜汁浸一宿焙芍藥一斤赤白皆可骨碎𥙷一斤焙石上生者佳黑豆一斤酒煮焙乾大栗間一斤老者去皮焙川烏一斤炮自然銅半斤火煆酸醋淬存性取半斤血碣六兩別研細辛十兩去苗葉取十兩白芷一斤木鼈半斤去殻細切剉炒取半斤川牛膝一斤去蘆酒浸焙取一斤没藥四兩别研如無降真香爲末代乳香半斤别研如無以三陪楓香代青桑炭十斤青桑木取如臂大者去皮葉炭火煅令赤烟起用酸醋殺爲炭右桑栗豆補星藥六味爲末和餘藥研爲細末用米醋煮糯糊拌入曰搗千杵方聚衆人急下手丸下手稍緩則拆陰乾半月然後用火焙或晒一日大丸重六文濕中丸重三文濕乾則以漆抹在手上取兩三丸挪漆爲衣每服半丸合此藥勿令四眼見之更忌雞犬婦人見之則折矣小紅丸治踒折傷損皮破骨出手足碎斷筋肉壞爛疼痛甚至晝夜叫呼百治不止手足乆損筋骨差爻舉動不得損後傷風濕支節攣縮遂成偏廢勞傷筋骨肩背疼痛四肢疲乏動用無力常服壯筋骨治經絡生氣血每服三十丸用生姜煎酒或鹽湯吞下不拘時候孕婦莫服土當歸六兩炲取川烏六兩煨白楊皮六兩焙肉桂四兩不見火莪术二兩焙丁香二兩乾姜二兩焙川芎一兩細辛四兩焙没藥三錢别研附子三兩半煨去皮乳香三錢别研不焙芍藥六兩焙骨碎補六兩姜製焙取六兩右補藥歸楊四味用當土者餘八味研爲細末乳没别製和醋糊爲丸如菉豆大信朱爲衣每服三十丸温酒下傅用生姜自然汁煎酒或鹽湯皆可不拘時候大紅丸治撲損傷折骨碎筋斷疼痛痺冷内外俱損瘀血留滯外腫内痛肢節痛倦應諸損痛不問年深日近并宜服之常服補損堅筋固骨滋血生力神驗不可具述每服三十丸温酒醋湯任下不拘時候孕婦莫服天南星一斤焙芍藥一斤焙土當歸十兩焙牛膝十兩酒浸焙細辛八兩去苗葉焙赤小豆二斤焙赤歛一斤即何首烏焙乾川烏一斤七兩火煨坼青桑皮五斤煅醋淬缺此一味亦可其上俱要製焙向後方秤斤兩自然銅四兩煅存性骨碎補一斤姜製焙右歛星芍藥歸𥙷膝辛七味并用當土者同餘藥羅爲末醋煮麵糊爲丸如梧桐子大朱爲衣每服三十丸温酒下醋湯亦可損在上食後服在下空心服傷重不俱時服或與小紅丸互用亦可黑丸子治打撲傷損驢馬跌墜骨斷筋碎百節疼痛瘀血不散浮腫結毒一切風疾四肢疼痺筯痿力乏渾身倦怠手足緩弱行步不前婦人諸般血風勞損并宜服之每服二十丸三十丸用煨葱酒或茶任下孕婦莫服白斂一斤焙白芨四兩焙南星六兩焙芍藥十兩焙土當歸四兩焙骨碎補八兩焙川烏三兩焙牛膝六兩焙百草霜十兩赤小豆一斤右除星芍歸𥙷膝豆用土産者草霜釜上取同爲末醋糊爲丸如梧子大每服三二十丸當歸散治打樸傷損皮肉破碎筋骨寸斷瘀壅滯結腫不散或作癰疽疼痛至甚因損後中風手足痿痺不能舉動筋骨縫縱攣縮不舒及勞役所損肩背四肢疼痛並宜服之此藥大能續筋接骨尅日取效澤蘭川當歸牛膝川續斷各十兩芍藥白芷川芎肉桂去粗皮各五兩川烏川椒去目各三兩結梗甘草各四兩白楊皮不用亦可細辛五兩已上俱要好者右爲極細末每服二錢熱酒調下不拘時乳香散治跌撲傷損皮肉破綻筋骨寸斷敗血壅滯結腫爛壞疼痛至甚或勞役所損背肩四肢疼痛損後中風手足痿痺不能舉動筋骨乖縱攣縮不舒大能續筋接骨卓有奇驗常服結血止痛生力每服二錢温湯調下不拘時候肉桂乾姜各三兩牛膝羗活川芎細辛姜黄芍藥草烏川烏各四兩白芷二兩碎補當歸蒼术木鼈去殻麩炒各六兩没藥五兩何首烏十四兩赤小豆一升乳香半斤桔梗十兩乳香没藥别研一方去木鼈加海桐皮右焙碾爲末續入乳没末和湯使調服如前鼈甲散治五勞七傷四時傷寒渾身增寒壯熱骨節煩疼嗽咳痰涎酒色傷憊四肢倦怠及治山嵐瘴瘧一切積氣心腹膨脹嘔吐泄瀉應是風疾并宜服之肉桂川芎白芷蓁芃鼈甲醋炙三次令赤色紫苑凈洗焙乾麻黄不去節羗活一云獨活當歸去尾乾姜紫蘇不過火橘皮已上各四兩天臺烏藥烏藥柴胡五味子各七兩蒼术桔梗三斤半焙川烏半隻焙右焙碾爲細末每服二錢水一盞姜三片烏梅一箇同煎至七分熱服傷寒加葱白煎勞損入鹽熱酒調下小紅丸烏頭一箇何首烏蒼术蛇床子五靈脂牛膝赤小豆白膠香當歸各一兩乳香二錢右爲末好酒煮糊爲丸如菉豆大每服三十丸温酒下小黑丸白歛白芨南星芍藥各十兩當歸五兩細辛三兩赤小豆一升百草霜六兩右爲末醋糊爲丸如梧子大每服三十丸温酒下搜風丸治風損腰痛頭疼治效與丸子同何首烏南星骨碎補川烏各半斤土牛膝芍藥各五兩云二兩細辛三兩當歸十兩白蘚皮右爲末醋糊爲丸如梧子大每服三十丸温酒鹽湯不拘時吞下驅風丸治效同黑丸子骨碎補五兩川爲川芎各一兩草烏川當歸牛膝木鼈各二兩何首烏四兩烏金四兩即百草霜一云京墨右爲末醋糊丸如梧子大每服三十丸空心鹽湯下或荆芥茶湯食後下黑虎丹治男子婦人手足麻痺川烏木鱉各一斤地龍十兩黑豆半升五靈脂二兩松墨二兩醋炒右四味爲末五靈脂醋研碎煮麵糊爲丸龍眼大每服一丸或二丸細嚼酒下薄苛茶亦可不拘時首烏丸治風損寬筋何首烏十斤黑豆半升同蒸熟牽牛子十兩炒牛膝薄苛各二十兩川烏二兩青木香五兩皂角二斤一斤燒存性一斤蜜炙用右爲末酒糊丸如梧子大每服三十丸葱湯或薄荷湯不拘時下匀氣散凢傷重先下此藥調氣然後服損藥茴香青皮厚朴製白芷烏藥杏仁去皮尖各半兩陳皮麥蘖前胡桔梗蒼术粉草各一兩右爲末每服二錢水一盞姜棗煎至八分空心服四物湯凢傷重腸内有瘀血者用此白芍藥川當歸熟地黄川芎右等分每服三錢水一盞半煎至七分空心熱服一方只用當歸大黄二味七氣湯半夏五兩人參肉桂甘草炙各一兩右每服三錢水一盞姜三片煎至七分食前熱服五積散治五勞七傷凢被傷頭痛傷風發寒姜煎二錢仍入葱白食後熱服蒼术桔梗各二十兩枳殻陳皮麻黄去根節各六兩芍藥白芷川芎川歸甘草肉桂茯苓半夏湯泡各三兩厚朴乾姜各四兩右除枳殻桂兩件外餘細剉用慢火炒令色變攤冷入枳桂令匀每服三錢水一盞姜三片煎至中盞熱服大成湯一名大承氣湯應傷損極重大小便不通者方服此可加木通煎如未通加朴硝俟大小便通方可服損藥損藥不可用酒煎愈不通矣然亦須量人肥弱用如孕婦小兒莫服大黄枳殻各四兩川芒硝甘草陳皮紅花當歸蘇木木通各二兩厚朴少許右件㕮咀每服二錢水一盞半煎至一沸去相温服不拘時此乃專治男子傷重瘀血不散腹肛膨脹大小便不通上攻心腹悶亂至死者急將此藥通下血瘀後方可可服損藥小承氣湯大黄四兩芒硝二錢煎熟漸入枳實二兩厚朴八兩右治效同大成湯此較力輕不拘婦人女子小兒皆可服排風湯治諸風疾損白蘚皮白术芍藥肉桂去粗皮川芎杏仁去皮尖川當歸去蘆防風甘草各二兩獨活麻黄去根節各三兩白茯苓三兩右每服二錢水一盞半姜四片煎至八分不拘時服更宜續命湯消風散接骨藥下窟烏一名鶚用骨燒存性用古銅錢一箇煆醋淬七次爲末等分骨斷夾縛訖用藥一錢酒調下不可過多病在下空心服在上食後服此方極驗常用整骨藥用大草烏刮去皮爲細末每服逐半錢温酒調下如未覺再添二分藥酒下又方用乳香没藥各二兩别研次用血竭自然銅無名異醋煮黄木鼈子各一兩地龍二兩並爲末蜜丸如龍眼大嚼爛熱酒嚥下俟了用生葱嚼解至真散治打破傷損破腦傷風頭痛角弓反張一名奪命散天南星炮防風去蘆叉右等分爲末凢破傷風病以藥傅貼瘡口即以温酒調一錢服如牙關緊急以童便調二錢服垂死心頭微温童便調二錢并進三服急救仙方卷之六
