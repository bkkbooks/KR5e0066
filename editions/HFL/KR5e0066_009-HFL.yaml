front:
  text: 急救仙方卷之九惻九
  hash: sha256:9e6bb6ced595e0b026cf1d80b59710b4f14e804cee914f4bbfae61875e721fe1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_HFL_009-001a, image: hfl/0822/0822-084.png}
body:
  text: 秘傳五痔品原痔者貧富男女皆有之富者酒色財氣貧者擔輕負重飢露早行皆心肝二血喜則傷心怒則傷肝喜怒無常風血侵於大腸到穀道無出路結積成塊出血生乳各有形相婦人因經後傷冷月事傷風餘血在心經血乃流入於大腸小兒因利後或母腹中受熱也治方于後水澄膏護肉欎金白芨各一兩一方加黄連右二味爲細末候内痔登厠翻出在外用温湯洗淨不須坐入即側卧床沿上用新水和蜜調令稀稠用篦挑藥輕手塗穀道四邊好肉上只留痔頭在外用薄紙圓轉盖藥上仍用筆蘸温水塗紙上紙以護水澄膏不令四散耳才覺藥乾又用温水潤之後用枯藥好白礬四兩生信石二錢半硃砂一錢生研十分細爲妙右各研爲細末先用砒在建盞中次用白礬末盖之用火煆令烟斷其砒盡隨烟去止借砒氣於礬中耳用礬爲細末十分細可也看痔頭大小用礬末在掌上入生硃砂少許以唾調稀用蓖頭塗痔上周遍一日三上須子細看痔頭顔色焦黑爲妙至夜有黄水出切勿他疑水盡爲妙至中夜上藥一遍來日依然上藥三次有小痛不妨换藥時以碗盛新水或温湯在痔邊用筆一管輕洗刷痔上去舊藥上新藥仍用護藥此藥只是借砒信又有硃原少解砒毒次用荆芥湯洗之三兩日之後黄水出將盡却於藥中增朱砂减白礬則藥邊緩矣三兩日方可增减漸漸取之庶不驚人全在用藥人看痔頭轉色增减厚薄傅藥方是治法荆芥湯右用荆芥剉水三椀煎常常煎下如洗痔了依然傾入瓶内火煨之可用三五次潤腸丸大黄濕紙包煨剉枳殻去穰當歸蜜鍊右三味等分爲末蜜丸每服二十丸或三十丸湯下量臟腑虚實多寡服之緣爲已用枯藥後痔頭將欲焦枯糞門迫急恐大便堅難下所以預服此令臟腑稀滑耳龍石散龍骨煅去火毒香白芷好黄丹軟石膏煆去火毒右等分爲極細末候痔頭落盡以此藥摻收斂瘡口預先備好血碣末止血或歛瘡口倉卒要用耳導赤散生地黄二兩黄芩三兩右剉每服三錢水一盞煎六七分温服用藥之後小便恐赤澁即服之加滑石甘草燈心雙金散黄連欎金右二味等分爲末極細用蜜水調傅痔頭上虚人已用枯藥上忽有些疼痛用此其止一方只用腦子末傅亦可内補散此藥調理氣血排膿生肌候痔瘡將欲收歛即服此所謂腸頭直候瘡口安好血氣中和自然收入人參黄耆當歸各二兩桔梗芎藭厚朴官桂防風白芷甘草各一兩右十味各等分爲細末木香湯温酒亦可日二三服國老湯甘草煎湯常常要煎下薰洗痔瘡蓋甘草自是痔藥又解砒毒若瘡收斂其痒異常尤要此藥澆洗温熱隨意催痔治痔雖硬只是不脱用此藥催自落百草霜二錢白姜末一錢川烏頭右爲細末以井水調稀以筆點痔上良久立脫熨法凢醫痔用枯痔藥後急大小便間好肉疼如針刺及痛上腎根令人將衣物火上烘之令熱熨痛處三五次其痛立止水澄膏盖慮痔根毒水流汙好肉生瘡故用藥塗油單紙護内周徧不用連紙貼定可也喚痔真磁石另研白姜各一錢另别研白礬半錢枯過草烏尖三箇生用右爲末却以葱涎調傅腸頭上其乳出用枯藥又方磁石煆醋淬九次硏水飛白礬枯大草烏川山甲朋砂右末如前出用洗藥痔二十四證歌此疾酒色氣風食五事過度痔證分三八憑君子細看莫教年日久見者膽心寒菱角看形怪蓮花不可觀穿腸并鼠奶酒色兩相干莫願翻花怨蜂窠亦不寬雌雄同氣血子母及腸盤玄珠由可怪勾腸痛若鑽核桃與流炁見者便心酸㗚子於中大鷄心在外安珊瑚形可惡那更脫肛難内痔紅不出搭腸裏内盤垂珠更難治日久有雞冠切莫輕刀火令君性命殘用工無半了去病更除根用喚藥用此紅肉膏治痔辰砂黄丹各一錢乳香半錢别硏白礬一兩砒半兩用白礬鋪底火煆七分巴豆三箇右爲末每用二錢斑猫三個香油一兩同一處煎斑猫巴豆赤爲度去二味只用油調藥末成膏子看大小貼之一二日一次換藥至六七日看焦黑不用塗用摧藥未破已破用紙撚子任藥入瘡爲妙金花散洗痔無名異半錢黄糵一兩黄連半兩生烏黑豆半升右爲末温洗了用海蛤散傅龍骨海蛤散蕪荑一兩龍骨海蛤各一錢煆蜜陀僧半錢右爲末先摻次用貼痔膏日一次貼乳香膏貼痔茱萸白芨白歛黄連黄糵當歸各等分右用香油四兩入柳枝三尺四寸長同煎柳枝黑爲度入前藥末同煎紫色用絹濾去滓再煎數沸次入黄丹乳香一二錢熬成膏以瓦瓶盛藏用少許貼瘡上立効凢下痔先服通血積藥一日二次方用喚痔藥當歸飲通血積黄連火麻子當歸各半兩右爲末用一錢嚼温酒下又將通真丸一粒臨卧再服通真煨姜丸良姜炮柯子炮肉桂去皮木香肉豆蔻破故紙茴香葫蘆巴末𥐼各一錢右研匀醋糊丸如梧桐子大用一錢重木瓜生姜藥一處濕紙裹煨香熟温酒下下高散不思飲食苦參一兩蓬莪术炮益智去皮荆芥穗炒各一兩右爲末每服一錢水一盞薑蜜同煎八分入鹽虚心服洗腸犀角散骨碎補川山甲蛤粉炒各二兩甘草根玄胡索生用半兩右爲細末茶調半錢空心服止痛麥煎散滑石三錢鼈甲半錢川烏去皮尖一兩秦芃半錢前胡半兩右爲末每二錢小麥三十五粒同煎至七分通口服不拘時三四服見効黑神黄耆散京墨一兩黄牛角一隻蛇蛻一全條檳榔三箇川山甲蔓荆子黑狗脊去毛枳殻去皮白各一兩黄京子半兩猪牙皂角十箇右爲末以瓜婁五箇去子入藥在内用新瓦瓶盛之後用黄泥固濟火煆烟盡末入没藥青木香各一錢白蕪荑半兩荆芥一兩右爲末同煎藥一處服二錢胡桃酒下日三服茶亦可宣風散巴豆去油大黄炮朴硝枳殻陳皮去瀼右各等分每服二錢水一盞煎至七分温服如服藥後大便結澁二三日可服木通散人參一錢斑猫炒去殻足羽鶴蝨大黄牡礪煆枳殻各等分蓽澄茄半兩丁香少許右爲末糯米糊爲丸如梧桐子大每服五丸煎沙糖湯下此藥恐不可用收膿膏海金砂乳香白芨雄黄各等分右爲末入瘡口次以乳香膏貼之車前散食茱萸車前子雄黄乳香赤石脂龍骨各一錢生用右爲末摻瘡口以乳香膏壓之一日二次如瘡口乾只用乳香膏貼有清水出用後藥注青膏注青膏五倍子三箇生玄胡索白礬各一錢右爲末服少許如清水出以紙貼膏藥入瘡口内金花散欎金甘草炙白姜炮槐花炒各一兩右爲末每服二錢空心陳米飲下山甲散五倍子生川山甲各一兩炒存性右爲末瀉血水者服二錢空心陳米飲下解腸散治藏毒瀉血葳靈仙蕤生各分貫衆一兩右爲末每服二錢麝香酒調服凡内痔用葱涎膏次用洗腸當歸丸次用取血當歸散次用取血黄連丸次日上紅肉膏凡服藥忌猪血毒食及去風不可摩動藥有惡水出污好肉生瘡以和風膏妨出入以藥塗綿子掩痔上綿托帛縛日二次上重十日輕八日若有痔曰連腸若惡滯腰間疼者用肉桂膏貼腰煩痛以通心散逐日服次下丁鬲散煨姜丸枳殻散落洗用海蛤散附之乳香膏貼退痔匀腸散收腸貼頂散治痔久不差變漏不戒酒色服藥耳治則先用紙撚子細看大小淺深即服通真丸黄耆散以紙撚貼紅肉膏入瘡一日五六次用乳香膏入作撚子貼瘡口日一次三五次進藥入瘡内凢取爛肉有血水出方不進藥須用收膿膏三日後用藥洗三日用龍骨海蛤散摻以車前散摻口内一日兩次服藥至三服至取深效後有水出即効也又神驗治痔方信没藥乳香各半錢白礬朴硝綠礬各一兩麝少許右用鐵銅鍋先以信在鍋底以白礬覆之又以綠礬覆之又以硝覆之候成水投乳香末攪匀候乾如石方出地上出火毒一宿末方入麝同研加片腦少許用唾調塗附瘡口上四邊一日三次其痔自然焦落又枳殻水浸去穰每二片去皮用巴豆一粒在内綫縛入銀石器内米醋高一指煮乾去豆焙爲末醋糊丸每服十五丸空心茶清下或隨津下亦可腸風下血平胃散加續斷煎服又方加小麥四十九粒去續斷治痔上瘡臘蓮蓬等分鍋内慢火微烟熏之治湯風下血五倍子末服二錢麝香酒下治痔白礬四兩綠礬一分信半兩朴硝半兩右礬硝作一處以少半許入建盞内以信成塊入中以餘藥塗上以炭大約二斤許燒四圍下候沸將乾却覆細末用砂合收此藥經年火熟黄色則效而不疼赤色則不可用如傅外痔可以白礬减半如速效可將津液調傅不疼甘草湯調傅此藥久留不損且能不疼次用茅根湯熱洗然後附藥日夜三五易凢疼發必大腸祕結服寬腸丸并通大便不可燒烟熏入腸反爲害暑月加百草霜黄丹調附如痔落了肛門腫痛用槐皮煎湯洗用津洗瓦上磨枳殻附如肛門不收木賊朴硝煎湯附各以一次二次即効未落已前黄皮薄荷煎湯唾調附肛門夏月用此尤佳洗藥初用此洗木通黄苓黄柏黑豆右熱煎即洗三次急救仙方卷之九
