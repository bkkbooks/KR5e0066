front:
  text: 急救仙方卷之七惻七
  hash: sha256:a44beb0dd12a45dfedbd335702e7e4965cdf343bdd0d2d2984f3b2d35b1af2b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_SJB_007-260634b, image: sjb/26/260634b.png}
body:
  text: 治傷損方論如傷重者第一用大承氣湯或小承氣湯或四物湯通大小便去瘀血也惟婦人别有隂紅湯通下第二用黄末藥温酒調不拘時病在上食後服在下空心服遍身痛臨卧時服第三服白末藥熱酒調其法同黄末服婦人産後諸血疾並皆治之第四服烏丸子第五服紅丸子第六服麻丸子用温酒吞下婦人艾醋湯下孕婦不可服第七服活血丹當歸散乳香散二散方見前方内並用酒調不拘時與黄末白末服法同惟乳香散參之山泉方則又加六味白楊皮一斤生芥子十個澤蘭一斤檀香六兩沉香二兩川芎一斤餘方條具如後大承氣小承氣四物湯并見前方内黄末藥治跌撲傷損皮肉破綻筋肉寸斷敗血壅滯結癰爛壞疼痛至甚或勞役所損肩背四肢疼痛損後中風手足痿痺不能舉動筋骨乖張攣縮不伸續筋接骨方有奇功常服活血止腫生力川烏炮草烏醋煮楓香别研各三斤當歸去蘆頭酒浸一宿隂乾赤芍藥各半兩川獨活去蘆川芎湯泡七次細辛去苗凈洗香白芷山桂去粗皮白姜麵裹煨黄姜濕紙裏煨五加皮凈洗去骨桔梗去蘆碎補去毛炒蒼术醋煮七次何首烏用黑豆酒煮七次牛膝酒浸七日焙乾各二斤知母半斤没藥半斤右件爲細末每服二錢鹽酒調病在上食後下空心服遍身損臨卧服孕婦莫服白藥末治打破傷損皮肉破碎筋骨寸斷瘀血壅滯結腫不散或作癰疽疼痛至甚或因損後中風手足痿痺不能舉動筋骨偏縱攣縮不伸及勞傷破損肩背四肢疼痛並宜服之此藥大宜續筋接骨刻日取効婦人産後諸血疾并治之桔梗去苗白芷甘草炙各十兩川芎湯泡七次山桂去粗皮細辛去苗各半斤川烏炮斷續米汁浸牛膝去苗酒浸一宿當歸香附子炒各六兩花椒五兩去子合口者赤芍藥酒浸一宿澤蘭葉去叉枝各九兩白楊皮十二兩米汁浸一宿右爲細末每服二錢酒調下服法同前婦人諸血風氣皆治之烏丸子治打撲傷損骨碎筋斷瘀血不散及一切風疾筋痿力乏左癱右痪手足緩弱諸般風損婦人血疾産後敗血不散灌入四肢面目浮腫並宜服之惟孕婦勿服赤小豆炒白歛細辛去苗赤芍藥何首烏醋煮白芨煨草烏醋煮七次山桂去粗皮川芎南星麩裏煨當歸酒浸一宿川牛膝去苗酒浸一宿百草霜骨碎補去毛炒天台烏藥烏豆酒煮後焙乾己上各一兩半右爲細末用煮豆酒煮麵糊爲丸如梧子大每服五十丸用煨葱酒或煨葱茶任下紅丸子治打撲傷損骨碎筋斷疼痛痺冷内外俱損瘀血留滯外腫内痛肢節疼倦應諸傷損不問年月日久并宜服之常服補損堅筋固骨滋血生力神效不可具述孕婦勿服牛膝酒浸一宿川烏炮南星醋煮三次細辛去苗凈洗何首烏用水煮熟桔梗去蘆山桂去粗皮當歸白歛赤芍藥没藥别硏骨碎補去毛羗活去蘆赤小豆不見火自然銅煅醋淬七次别研右除研藥外餘並打和炒乾爲末酒煮麵糊爲丸每服五十丸隨病上下服之麻丸子治踒折傷損皮破骨出手足碎斷肌肉壞爛疼痛至甚日夜呌呼百治不止手足久損筋骨差爻舉動不能損後傷風濕肢節攣縮遂成偏廢勞傷筋骨肩背疼痛四肢廢乏動作無力常服壯筋骨活經絡生氣血及治婦人血氣惟孕婦勿服川當歸桔梗名布羅匐牛膝不用酒浸各半兩骨碎補二兩去毛川芎百草霜草烏周山礬灰汁浸各一斤木鼈子去油殻赤芍藥各半斤金毛狗脊去尾烏豆一升酒煮焙乾川烏不見火切片子煮醋右爲末酒煮麵糊爲丸如梧子大每服五十丸温酒下婦人艾醋湯下活血丹治跌樸傷損折骨斷筋疼痛浮腫腹有瘀血灌注四肢煩悶不安癰疽發背肌肉壞爛諸般風疾左癱右痪手足頑麻婦人血風發動並宜服之每服半丸用無灰酒磨化微煎三五沸温服不拘時候不以多少此藥常將紗葛袋收挂靜處經久不壞可備急用惟孕婦勿服荆芥二兩半草烏酒煮川烏炮各三兩楓香別研檀香不見火降眞節乳香別研没藥别研各一兩山桂去粗皮當歸酒浸一時川羗活去蘆白笈麵裹煨晒乾地龍去土射香别研碎𥙷去毛炒川牛膝酒浸一時細辛去苗花桑木燒灰成性白芷不蛀者赤芍藥酒浸川牽牛石灰炒天栗間烏豆以糯末炒黄川芎熱湯洗三次南星以石灰炒黄色爲度自然銅煅酒淬别研蒼术术汁浸春五夏三秋七冬十炒乾已上各半兩滴青一錢半别研五靈脂一兩半用燈心别研木鼈二十箇去油殻右爲細末酒煮麵糊丸如彈子大入臼杵三十餘下團成塊秤一兩分作三丸候丸盡分作三分一分隂乾一分晒乾半時久一分焙半時久却三分打和一處令隂陽相合俟藥上塺氣爲度然後刷去塺用黑漆光爲衣洗藥後有仙正散方如傷重先用洗後却用烏龍角貼其洗藥同前方内又參山泉方洗藥用木朔翟石南葉白芷白楊皮生葱何首烏土當歸荆芥藁本芍藥右不拘多少煎湯候温將洗損處令凈用絹滲乾瘡口烏龍角貼藥治跌撲傷損筋骨碎斷差叉出臼其用法詳見前方黑龍散同先洗擦整理後調貼夾縛亦可用此乾糝瘡口白殭蠶去絲觜炒赤小豆各六兩川牛膝去蘆六兩山桂去皮桔梗白笈生剉隂乾山枇杷葉生剉隂乾各一斤百草霜當歸尾碎補去毛炒各半斤北細辛去苗半斤白芷南星煨赤芍藥何首烏白歛各十兩知母草烏用姜汁煮各三兩右爲細末如藥潤亦可焙乾碾之每用以姜汁或冷水茶水調攤紙上於痛腫處貼之三日一洗一換貼骨碎須夾桃紅散治積年不效朽爛瘡口金瘡箭射打碎皮破血出不止可將此藥乾擫次日别用藥水洗凈再擫大能散血結口白礬飛過龍骨别研各二兩血碣一兩别硏松糖别研五倍子粉霜黄丹細研火飛過水飛過各三兩石膏一斤黄泥封煅過右研爲極細末罐子收用紫金散整骨續筋生肌止痛内傷肝肺嘔血不止或在心腹脹痛四肢無力左右半身風痪並宜服之紫金藤皮降真骨碎𥙷去毛琥珀當歸去尾桃仁去皮各二兩蒲黄大黄煨各一兩續斷五兩要細者無名異燒紅酒淬七次牛膝去苗酒浸一宿各三兩朴硝半兩熱湯泡化用花葉紙濾過七次右件爲末用蘇木煎酒調日進三服即効七寳散治冷水風脚濕氣下注脚膝生瘡左癱右痪筋脉拘急脚下隱痛不得伸屈不能踏地并皆治之晚蠶沙炒蛇床子炒各一升肉桂去皮乾荷葉川烏炒各二兩荆芥穗藁本去土五兩薏苡仁三兩右件㕮咀約二兩重用水五升加花椒連须葱同煎至七分去粗於痛處熱斟淋洗定痛丸治腰痛不可忍不問男子婦人室女老幼並皆治之威靈仙去土半兩金鈴子去核炒川烏炮八角茴香各一兩右爲細末酒煮麵糊爲丸如梧子大每五十丸鹽湯酒隨上下服之七氣湯治積年久損入經絡服藥無効腰背拘急咳嗽痰涎風勞發動日漸羸瘦每到秋來損病復作不問男子婦人並皆治之青皮去白炒陳皮去白三稜濕紙裏煨北梗去蘆肉桂去粗皮藿香去枝益智去殻炒香附子炒甘草炙半夏湯炮赤芍藥烏藥獨活去蘆羗活去蘆降真香各一兩右㕮咀每服五錢水一大盞半姜三片棗一枚煎至七分去滓隨病上下服仙正散洗藥治男子婦人骨斷用此煎水洗後整骨却用烏龍角貼之如破留口當夾縛即依前方爲之肉桂去皮二錢當歸去尾三錢荆芥四兩蒼术防風各一兩玄胡索白芷赤芍藥各五錢右㕮咀每服五錢水五升乾荷葉兩皮煎至七分去滓於損處斷處及冷水風脚筋脉拘急不得屈伸行步艱苦可用此藥熱蒸用被盖覆俟温淋洗摻瘡口方但遇傷損皮肉血出或破腦傷風血出不止急用此藥擫之血碣二錢半别研降真節四錢燈心一把龍骨五花者別研紅花要馬頭者焙乾爲末各二錢乳香同燈心研没藥別研各五錢桔梗少許當歸三錢蘇木同降真碾少許雞一隻連毛屎用醋煮後碎之用黄泥封固文武火煨乾後焙爲末右爲細末每用少許乾擫瘡口上如血流湧出不止多擫之候血藥將乾又用清油調塗於瘡上可製一料以備急用接骨散治飛禽骨斷從高墜下驢馬跌折筋斷骨碎痛不可忍此乃接骨續筋止痛活血朋砂一錢半水粉當歸各一錢右爲末每服二錢煎蘇木湯服訖時時但飲蘇木湯立効除痕治欲傷後瘡愈無痕用此蔓青子隨風子俗隨子黄荆子右件各等分爲細末飯上蒸九遍用童便浸一宿後炒乾爲度以花葉紙包在絹巾内揩之可以除痕隂紅湯專治婦人傷損瘀血不散腹肚膨脹大小便不通上攻心腹悶亂至死者急將此藥通下瘀血却依前次第服藥産婦油髮燒灰鹿角膠各一錢没藥三錢右用酒一大盞調服膠艾湯專治婦人尋常經脉不通宜先服此後服鼈甲散乾地黄三錢阿膠川芎艾藥各二錢右㕮咀每服二錢水一大盞酒半盞同煎至八分温服不拘時洗藥治男子婦人骨斷用此煎水洗後整骨了却用烏龍角貼杜仲五兩五加皮七兩葱根一把右三味水五升煎至七分去滓淋洗每服二兩半重傷破留口用藥糝骨斷當夾縛詳見前論急救仙方卷之七
