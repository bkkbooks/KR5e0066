front:
  text: 急救仙方卷之四惻四
  hash: sha256:f104cc11ea61106943543d19f01d87999d334c1063f2f409c29032774133c75c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_SJB_004-260617a, image: sjb/26/260617a.png}
body:
  text: 濟隂品序論醫經云香附子婦人仙藥常用導血調氣佐以烏藥使陽不至强隂不至弱自女子而至婦人由有生以來雖曰禀賦衆隂所集以血爲主得病之因其源皆未有不先因氣所觸作然後血氣相愽結成大病盖以血本屬隂性柔軟閏易於成病感熱即血溢冒寒即血凝勞傷之過血失常經喜怒不常血結氣聚憂思不伸血不歸絡又巢氏云血得凉而生醫治之間輕重失審冷熱有差未免轉成他疾而有傷生之危可不愼哉今此前後用方性味温平乃出神仙之旨要不凉不僣順榮衛之疏通胎前産後無不備矣若老若少皆獲全生切恐用方之士疑此藥品之不精良妄意淺近而輕忽之却不知此方爲女人養生去疾之寳可不依而行之諸方逐一故具于後異香四神散又名四神湯專調理婦人室女血氣不調及胎前産後諸疾皆主之盖女人以氣血爲主殊不知因氣先不調然後血脉不順即生諸證此方大有奥理香附子去毛炒半斤烏藥炒四兩甘草炙一兩右㕮咀每服五錢重水一盞生姜三片棗一箇煎至七分去滓空心温服或用葱白三寸同煎如治諸證依後加减用之立見功效婦人氣血不順心胷痞滿加紫蘇葉同煎驚憂悶氣喜怒傷神心滿腹疼面目虚浮及一切氣疾并加石菖蒲同煎血脉不調血膈番胃嘔吐飲食以老姜一塊燒令黑切作五片入鹽少許同煎脾胃感冷亦依前用血積血暈悶血癥血刺痛煎熟入好醋一呷服經血行時被風雨或驚憂相并經候不時名曰搐脉腹痛緊脹腰腿疼痛每服加炒茴香一撮同煎血氣不順喘滿氣急面目浮腫加生姜紫蘇葉同煎唾血咯紅痰喉中腥氣加黄桑葉三四皮花桑尤佳血氣秘大便結滯不通宜加枳殻數片或去白青皮亦可凡血臓虚冷血澁腹痛血海久冷血崩赤白帶下小便頻數又血脉妄行滲入大腸有似腸風並入炒吴茱萸末一七同煎易名温經湯經絡感熱經水沸溢血脉妄行病曰氣崩加生地黄凢敗血攻冲脾胃血噎氣血若咳逆加生姜三片柿蒂五箇血氣昏悶心腹刺痛加良姜赤芍藥以水酒各半盞同煎胎脉傷食胷膈悶不快噎氣食臭心腹緊滿更加南木香或宿砂仁煎懷胎臨月近上逼心名曰子懸依舊用姜片紫蘇同煎産後諸疾不明血脉去留不辨虚實冷熱且宜此藥通順血氣不致差誤然後隨證調理産後寒氣入腹硬緊臍下刺痛名日寒疝加炒吴茱萸煎産後因産中用力太過于宫脫下俗名㿗病先用此順氣安腸兼以樗樹根或枝梗同葱白以花椒煎湯熏洗子腸自定及平居女人患此亦然烏犀圓調治血脉治風補虚及血海一切疾證應血風血冷血滯血氣悉宜服之馬鳴肝即晚蠶砂五月收者良揀凈炒至烟起用半斤大草烏二兩重入灰火内逼裂取出以布袋打去皮尖右二味爲細末酸醋煮作糊爲丸如梧桐子大每服三十丸常服以淡醋湯温酒隨下如别有證候依後湯使凢血氣不順月水不調或過期不來或月内再至淡醋湯温酒吞下凢血弱隂虚經水枯竭數月不得痿黄瘦瘁腰腹疼痛厭厭不巳及脚滕攣急并以黑豆炒浸酒吞下久服血閏自通凢經脉凝滯乆乆不行腰重疼痛數月不利以土牛膝根浸酒吞下脉復即行凢婦人年未五十住脉太早腰脊重疼腿足麻痹目多昏暗常用茶清或酒任下凢血氣逆上血上冲肺喉間作腥或咯血唾血以葱白或花桑葉煎湯吞下凢感踏風冷血氣痛時復昏懵以鐵秤槌燒紅淬酒下或伏龍肝擣碎細炒浸酒下凢經脉妄行不止漸或成崩或赤白帶下兼生黄水名曰漏下并艾醋湯吞下或炒黑豆浸酒或以綿子燒灰調酒下或北艾地榆柏葉煎湯吞下兼以局方艾醋湯相間來進治血氣攻脾心胸懵雜此名血懵以猪嘔血入麻油少許同煎酒浸送下治血風筋脉攣急脚腫疼痛脚多轉筋以木瓜湯下或當歸木瓜牛膝浸酒下或炒黑豆同羗活浸酒下兼以紅蓼莖葉細切煎湯熏洗治血瀝腰腫痛膝重此皆血脉凝滯於足太陽經可先嚼茴香一撮温酒吞下或炒黑豆浸酒吞下尤佳血風攻注手足偏重頑麻酸疼炒生姜酒下血虚血風上攻齒牙浮腫及血風頭疼偏正頭風耳内鳴響耳聾重聽遍身生瘡頑麻燥癢以上并用荆芥穗葉或生葱茶服食前後并宜服之肝虚生風眼多冷泪多饒昏睛木澤煎湯吞下或煎黑豆湯下不拘時候風寒觸血遂成血癥瘕咳嗽喘急桑白皮煎湯下大便下血側栢地榆煎湯吞下蒲黄黑神散調理室女婦人風虚勞冷一切血氣之疾及胎前産後血滯血暈惡露不快敗血爲疾并皆服之凢生産之後首先進烏金散壓血暈逐惡血第二日即便常進此藥逐敗血安新血自然百病不生此方常用百發百中悉得效驗若將調理女人諸疾用鍊蜜爲劑每一兩三錢重分作十丸或用酒煮麵糊爲丸如梧桐子大每服三五十丸隨證用湯使各以其病立名稱之名益隂丹又名通真丸又名勝金丹又名金釵煎又名保生丸又名四順理中丸黑豆一升炒熟去皮香附子末四兩乾姜炮生乾地黄各一兩右爲末每服二錢食前温酒調下或以酒煮麵糊爲丸如梧桐子大每服三十丸温酒米湯任下新産敗血不散兒枕堤硬疼痛者童子小便下臨産胎死腹中或死胎不下以黑豆一合醋煮豆熟爲度調藥七分盞服暖其胎即自下臨産之時胞衣不下以童子小便同煎酒調下産後惡露不快血暈冲心眼昏黑悶暈口禁不省人事並用温酒調下若稍重可用秤錘淬酒服前項黑神散以煉蜜和劑爲丸如梧桐子大名四順理中丸新産五臘暴露羸弱少氣體常自汗以米飲吞下三十丸空心服之若以鍊蜜爲丸如彈子大治胎前名保生丸理婦人初受胎時胎氣不安多卧少起不進飲食名曰惡阻每服一丸細嚼以苧根糯米煎飲送下或以秦芃糯煎飲亦好又漏胎下血不止或下黄赤汁腰腹痛重以温酒嚥下兼以膠艾湯法艾湯六物湯安胎飲又有初結胎氣盛煩壅嘔逆痰涎不喜飲食過腹膨脹以淡竹刮青同橘皮煎湯送下兼以茯苓半夏湯或二陳湯下若因房勞動胎下血名曰傷胎温酒下若妊娠數經墜胎多至半産漏下用温酒服氣順攝血自然胎自安固若妊娠日月不足而一向似欲産者以真知母煎湯下若妊娠胎上逼心胎不近下煎川芎湯下若妊娠至七八月常服養胎益血安和子臓仍令易産以枳殻糯米煎湯下但糯米飲下亦得若産後用名勝金丹治産後一切諸疾并以温酒或米飲下若補理血虚血勞血氣血風等病名益陰丹以温酒米湯下若女人血冷面白脫色青筋迸露以酒服良驗若調理經候溢養少女名金釵煎凢是經候不調月水湛濁腹常刺痛及室女血弱隂虚經脉不匀并依前酒飲送下又一等少女經脉巳行一二次復至一二年又不行或有四季一行或有三五箇月復至此本血脉柔弱未充故行脉斷續宜以此藥調氣潤血血旺自通不必攻之不爾成血癥積塊變成血劫勞氣傳爲骨蒸勞瘵兼百一方沈香勝金丹滋血湯佐之若婦人時行雜病用大聖通真丸治諸中風口禁角弓反張手足嚲曳并以羌活同黑豆炒酒下兼以小續命湯烏荆丸之類又婦人漏下五色及治血少氣寒面色青白及産後百日内常服能除宿血生養新血兼益氣補虚調和衝任不生諸疾皆以温酒米飲下産前蒲黄黑神散其中萬品佐助温和看不上眼而自有妙理與大局方法不同臨産對證且如妊娠一節至精纔媾一氣方凝經云秘法潮養胞源稍著寒温即致損墜故經云舉寒爲痛傷熱而驚峻僭湯劑勿可妄用怒傷胎氣及其生産之後百節開張去血過多津液燥少隂陽俱虚臟腑怯弱偶有疾傷即成危殆故經云犯時微若秋毫感病重於嵩嶽故凉冷之劑剛燥之藥尤戒輕用轉生他病若委有冒風感熱之疾亦是和解隨證調理縱有虚寒極冷之候亦宜用性温平和之藥救療漸次加進大温藥調治切戒粗踈若依此說則産後胎前百無一失不可取目前之急亂投湯劑反致其禍罪福非輕切須記之大當歸湯治臨産腹雖趁痛生理未順破水巳行血道凝滯經一二日皆因驚動稍早與催生藥急以致如此且須順調産母多進此藥自然安泰川當歸地黄川芎白茯苓甘草赤芍藥熟枳殻各半兩桂心二錢半右每服三錢水一盞煎七分入滴乳香末一字煎一沸温服不拘時候或兒身巳下而胎衣未即來且須斷帶以物繫之進黑神散及奪命丹并此藥如兒巳下腹尚滿仍服小黑神散打醋炭調和胃氣無令粥食缺少如能飲者少與酒亦加不可過多乳香湯亦可托珠丹治催生要認得是正産時腰腹墜痛不可勝任方可進此但要進得一兩丸産理自然順快無憂疑然亦須不曾輕進此藥則功效可必矣車前子四兩淘洗略炒碾羅爲末兔絲子淘洗酒蒸焙碾爲末四兩右二味擇逐月上七日晴明良吉用鴉酸俗名婆婆酸草搗自然汁少許添酸醋炒麵糊爲丸雞頭子大用辰砂爲衣隂乾每服半丸或一丸用老鴉酸葉搗自然汁磨化添入百沸醋湯調服乳香湯通明滴乳不問多少爲末如覺腰腹痛急且先用此每服一七或半盞沸湯點服偶遲滯則是坐草早致令有不順亦宜服之能酒人以酒調服亦可取其通經絡去滯定痛止疼於産母甚有益然亦不可過多恐傷兒骨力也治難産第一方金箔三片兔毫筆頭三個燒灰右爲末用黄蠟爲丸如梧桐子大此料爲一服丸酒下如又經日不生用雲母粉半兩澄過研細取一團如雞子大臨時以無灰酒下此方巳活三五千人矣神應散療横生逆生甚者每服即分娩百草霜研白芷等分右爲末每服二錢童便好醋各一茶脚許調更以沸湯浸起服治死胎不出朴硝二錢爲末童便調下又死胎不下其證指甲青舌青脹悶甚者口如屎臭先以平胃散一貼作二服每服水酒各一盞同煎至一盞即投朴硝末再煎三五沸傾出候微温服盡其胎即化爲血水而下探胎湯治驗婦人三箇月經不行以此認之是否妊娠川芎爲末右用艾湯空心調服覺微動則是胎若臍下動及不動此皆血癥也可用行血藥治之宜早萬方散蒼术米泔浸剉炒陳皮去白炒青皮去白剉炒軍姜剉炒良姜剉炒粉草炒巳上各半斤砂仁去膜炒草果剉炒各六兩益智炒丁皮不見火各五兩香附子洗炒杜烏藥炒紫蘇炒厚朴去粗皮姜製炒巳上各一斤大腹皮四兩凈洗剉姜汁炒桂枝不見火右每服水一盞半生姜五片同煎七分去滓空心服要温切忌生冷毒物腹疼加小茴香一撮四肢浮腫加陳蘿蔔子炒入冷氣加吴茱萸炒入腰脚疼加川牛膝酒洗不見火木𤓰剉頭疼風證者加防風去蘆北細辛去葉或加川烏湯炮去皮尖生用焙姜汁煎四肢骨節痛加小茴香炒感風惡寒者加葱白煎潮熱加葱白熱退則止心氣不通喘急加麥門冬去心每三粒或加燈心三寸作渴加烏梅每半箇或加粉葛咳嗽加桑白皮向東取去粗皮剉蜜炒乾再入蜜炒傷肺者加北五味子或桑葉一皮向東取五心煩熱小便赤加車前草茆根蔗或燈心經脉來不已加燒棕灰存性泄瀉加炒糯米一撮或肉豆蔻催生用苧根三莖經脉敗正膠艾湯經脉不匀加北艾葉浸洗炒乾用醋眞料濟隂丹治胎前産後百疾凈香附子八兩二兩㕮咀好醋浸二兩無灰酒浸二兩塩湯浸二兩用二三嵗童便浸一日夕長流水洗如無童便用姜汁艾煎汁浸亦可巳上共炒乾以烏藥當歸澤蘭赤芍百草霜陳皮川芎五靈脂熟蒼术半兩右件共十一味爲末醋煮麵糊爲丸每服三十丸諸疾各湯使無孕加三稜莪术白芷各一兩桂半兩四味爲末醋糊丸服産後加百草霜或添益母草蜜浸炒乾爲末入前藥内用急救仙方卷之四
