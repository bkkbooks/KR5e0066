front:
  text: 急救仙方卷之十惻十
  hash: sha256:6d03cc7ffbdd209474f3124a0930f8a830e7770986cadd6d83d51343f4f0b3da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_SJB_010-260645b, image: sjb/26/260645b.png}
body:
  text: 上清紫庭追癆仙方論法老叟自序傳世已久罔知姓名惟存此文不敢妄加其字以俟知者吾自處世以來精研藥術急救濟危鍼灸明堂無不詳覽尋文檢籍洞視五臟之盛衰緬懷古人世莫能究至如晋景公何爲而死虢太子何爲而生吾思刮骨續筋開腸取病惟有傳屍之病最爲難測雖是患起一身變動萬種矣爲醫者能明脉候察病根本如此治療固不爲難若差毫釐則失千里夫傳尸癆者皆因三屍鬼疰九蟲傳灾具載其原以開未悟總論傳癆傳屍癆瘵皆心受病氣結血凝故有成蟲者盖由飲食酒色憂思喪真遂至於此凡蟲爲蠱以血凝而氣養之氣血在胞即爲正氣氣中即爲瘕塊凝在心部即爲蟲悉由不正其心憂思業緣所致三屍九蟲之爲害治者不可不知其詳九蟲之内而六蟲傳於六代三蟲不傳者蝟蛔寸白也六蟲之内或藏種毒而生或親屬習染而傳疾之初覺精神恍惚氣候不調切在戒忌酒色調節飲食如或不然五心煩燥心腎夜汗心乃忪悸如此十日頓成骨瘦面黄光潤此其證也妄信邪師祈穰求福庸醫用藥延蔓歲時方知病重苟非警戒禍福反掌此人死後兄弟子孫骨肉親屬綿綿相傳以至滅族大抵六蟲一旬之中遍行四穴周而復始病經遇木氣而生立春一日後方食起三日一食五日一退方其作苦百體有痛蟲之食也退即還穴醉睡一醉五日其病乍靜俟其退醉之時方可投符用藥不然蟲熟於符藥之後不能治也一蟲在身中游十二穴六蟲共占七十二穴一月之中上十日蟲頭向上從心至頭游四穴中十日蟲頭向内從心至臍游四穴下十日蟲頭向下從臍至足遊四穴若投符用藥可知如紫蠶苗在汗中盖蟲性巳通靈切在精審其或取蟲不補即學淺妄行徒費貲財終無去病之理可不悲哉師曰治傳屍癆者先須知正氣與毒氣並行故臟腑有凝即成蟲狀遇陽日長雄隂日長雌其食先臟腑脂膏故其色白五臟六腑一經食損即皮聚毛脫婦人即月信不行血脉皆損不能榮五臟六腑也七十日後食人血肉盡故其蟲黄赤損於肌肉故變瘦劣飲食不能爲膚筯緩不能收持一百二十日外肉血食盡故其蟲紫即食精髓傳於腎中食精故其蟲色黑食髓即骨痿不能起於床枕諸蟲乆即生毛毛色雜花鍾孕五臟五行之氣傳之三人即自能飛其狀如禽亦多品類傳入腎經不可救治法之所載者能利後其蟲色白可三十日服藥補其蟲黄赤可六十日服藥𥙷其蟲紫黑此疾巳極可百二十日服藥𥙷又云蟲頭赤者食患人肉可治頭口白者食患人髓其病難治只宜斷後故經曰六十日者十得七八八十日内治者十得三四過此以往未知生全但可爲子孫除害耳今以六代所傳蟲狀病證詳著于後第一代蟲狀病證遊食日治法爲初癆病謂初受其疾不測病源酒食加餐漸覺羸瘦治療蹉跎乃成重病醫人不詳其故誤藥多死此蟲形如嬰此蟲形如兒背上毛長鬼狀變動三寸在人身在人臓腑中中此蟲如蝦養變動在人臓腑中巳上諸蟲在人身中榮著之後或大或小令人夢寐顛倒魂魄飛揚精神離散飲食不减形容漸羸四肢酸疼百節勞倦增寒壯熱背膊拘急頭腦疼痛口苦舌乾面無顔色鼻流清涕虚汗常多行步艱辛眼睛多痛其蟲遇丙丁日食起醉歸心俞穴中四穴輪轉周而復始俟蟲太醉方可醫灸取出蟲後用藥補心守靈散第二代爲覺癆病謂傳受此病巳覺病者患人乃自知夜夢不祥與亡人爲伴侣醒後全無情思昏沉似醉神識不安所食味輙成患害或氣痰發動風毒所加四體不和心胸滿悶日漸羸瘦骨節枯乾或嘔酸水或是醋心唇焦口苦鼻塞胷痛背膊酸疼虚汗常出腰膝刺痛如此疾狀早須醫治過時難療致傷性命此蟲形如亂此蟲形如絲長三寸許蝦蟹在人在人臓腑中臓腑中此蟲形如蜈蚣或似手弓在人臓腑中巳上諸蟲在人身中令人氣喘唇口多乾咳嗽增寒心煩壅滿毛髮焦落氣脹吞酸津液漸衰次多虚渴鼻流清水四肢將虚臉赤面黄皮膚枯瘦腰膝無力背脊酸疼吐血唾膿語言不利鼻塞頭痛胷膈多痰重者心悶吐血僵仆在地不能自知其蟲遇庚辛日食起醉歸肺俞穴中四穴輪轉周而復始俟蟲大醉方可治醫取岀其蟲補肺則差虚成第三代爲傳屍癆病謂傳受病人自尋得知之日漸消瘦頓改顔容日日恓惶夜夜憂死不遇良醫就死伊邇此蟲形如此蟲形如𧏙蚊蟻俱遊螂大如碎血臓腑中片在五臓中此蟲形如刺猬在人腹中巳上諸蟲在人身中令人三焦多昏日常思睡嘔吐苦汁或吐清水或甘或苦粘涎常壅腹脹虚鳴卧後多驚口鼻生瘡唇黑面青日漸消瘦精神恍惚魂魄飛揚飲食不消氣咽聲乾目多昏泪其蟲遇庚寅日食起醉歸厥隂穴中四穴輪轉周而復始俟蟲大醉方可治取蟲後𥙷氣多差第四代此蟲形如此蟲形如亂絲在人豬肺在人腹臓中腹中此蟲形如蛇虺在人五臓中巳上諸蟲在人身中令人臟腑虚鳴嘔逆傷中痃癖氣塊增寒壯熱肚大筋生腰背疼痛或虚或瘦瀉利無時行履困重四肢憔悴上急氣喘口苦舌乾飲食及水過多要吃酸醎之物其蟲遇戊己日食起醉歸脾俞穴中四肢輪轉周而復始俟蟲大醉方可冶取出蟲後補脾爲瘥䰟停第五代此蟲形如鼠此蟲形如似小瓶渾無有頭無足表裏背面有足無頭此蟲變動形如精血斤在於陽宮巳上諸蟲入肝經而歸腎得血而變更也令人多怒氣逆筋骨拳攣四肢解散唇黑面青增寒壯熱腰背疼痛起坐無力頭如斧斫眼睛時痛翳膜多泪背膊刺痛力乏虚羸手足乾枯卧著床枕不能起止有似風中肢體頑麻腹内多痛眼見黑花忽然倒地不省人事夢寐不祥覺來遍體虚汗或有面色紅潤如平時者或有通靈而言未來事者其蟲遇癸未日食起醉歸肝俞穴中四穴輪轉周而復始俟蟲大醉方可醫救取蟲出後補肝乃得瘥金明第六代此代蟲有翅足全者千里傳産所謂飛尸不以常法治也此蟲形如馬此蟲形如尾有兩條一龜鱉在人雌一雄五臓中此蟲形如爛面或長或短或如飛禽巳上諸蟲在人身中居於腎臟透連脊骨令人思食百物要吃身體尪羸腰膝無力髓寒骨熱四體乾枯眼見火生或多黑暗耳内虚鳴隂汗燥癢冷汗如油夢多鬼交小便黄赤醒後昏沉臍下結硬或奔心胷看物如艷心腹悶亂骨節疼痛食物進退有時喘嗽其蟲遇丑亥日食起醉歸腎俞穴中四穴輪轉周而復始俟蟲大醉可醫治取蟲後補腎塡精瘥育嬰散蘇遊論論曰大抵傳屍之候在心胷脇滿悶背膊煩痛兩目不明四肢無力雖欲寢卧睡常不寐脊膂急痛腰膝酸疼多卧少起狀如佯病每至早旦精神尚存有如無病日午之後四體微熱面無顔色喜見人過常懷忿怒才不稱意即多嗔恚行立脚弱夜卧盗汗夢與鬼交或見先亡或多驚怖有時氣息有時咳嗽雖思飲食不能多餐死在須臾精神尚好或時微利兩脅虚脹口燥鼻乾常多粘唾有時唇赤有時欲睡漸就沉羸猶如涸魚不覺死也又曰傳尸之候本起無端莫問老少男女皆有此疾大抵五行相剋而生穴内傳毒氣周遍五臓漸熟羸瘦以至于死死訖又傳家親一人故曰傳屍亦名傳疰以其初傳半卧半起號曰殖殜氣息嗽者名曰肺痿痎骨體身中熱稱爲骨蒸内傳五臓名曰復連不解療者乃至滅門假如男女虚損得之名曰勞極吴楚乃名淋瀝巴蜀亦名勞極其源先從腎起初受之氣兩脛酸疼腰背拘急行立脚弱飲食咸少兩耳颼颼真似風聲夜卧遺泄陰汗痿弱腎旣受訖次傳於心心初受氣夜卧心驚或多恐悸心懸之氣吸吸欲盡夢見傳於先亡有時盜汗飲食無味口内生瘡心氣煩熱惟欲眠卧朝輕夕重兩頰口唇悉皆紋赤如傅臙脂又時手足五心煩熱心受巳次傳於肺肺初受氣咳嗽氣力微痛有時喘氣卧即便甚鼻口乾燥不聞香臭如或忽聞惟覺枯腐物氣有時惡心憒憒欲吐肌膚枯燥時或疼痛或似蟲行乾皮細起狀若麩片肺旣受已次傳於肝肝初受氣兩目胱胱面無血色尚欲顰眉眼視不遠目常乾澀又時赤痛或復睛黄朝昏懵驀常欲合眼及時睡卧常睡不著肝旣受已次傳於脾脾初受氣兩肋虚脹食不消化又時瀉利水穀生蟲有時肚痛腹脹雷鳴唇口焦乾或生瘡腫毛髮乾聳無有光潤或時上氣撑肩喘息痢赤黑汁見此證者乃不治也夫骨蒸殗殜復連屍疰癆疰蟲疰毒疰熱疰冷疰食疰鬼疰等皆曰傳屍者以疰者注也病自上注也與人相似故曰疰其變有二十二種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺精白濁髮乾而聳或腹内有塊或腦後兩邊有小結復連數箇或聚或散沈沈默默咳嗽痰涎或咯膿血如肺痿肺癰狀或復下痢羸瘦困乏不自勝持積月累年以至于死死復傳疰易傳親人乃至滅門者是也更有蜚蟲遁屍寒屍喪屍屍疰等謂之五屍及大小附疰等證不的知其所苦無處不惡乃挾諸鬼邪而害人其證多端傳變推遷難以推測故自古及今愈此病者十不一得所謂狸骨獺肝天靈盖銅鎖鼻徒有其説未嘗取効惟膏盲俞崔氏穴法若聞早灸之可否幾半晚亦不濟也癆瘵諸證病者增寒壯熱自汗面白目乾口苦精神不守恐畏不能獨卧其傳在肝病者寒熱面黑鼻燥忽忽喜忘大便苦難或復清瀉口瘡其傳在心病者增寒發熱面青唇黄舌舉强不能飲食無味四肢羸瘦口吐涎沫其傳在脾病者增寒發熱面赤鼻乾口燥毛折咯嗽喘急時吐白涎或有血綫其傳在肺病者增寒增熱面黄耳輪焦枯胻骨損痛小便血濁遺瀝其傳在腎所謂癆蒸者二十四種隨證皆可考若眉毛折髮焦肌膚甲錯其蒸在脾外人覺熱自返思寒身振鵬劇其蒸在肉髮焦鼻衄或復尿血其蒸在血方熱煩燥痛如刺針其蒸在脉爪甲焦枯目昏兩脅急痛其蒸在筋版杼齒黑痛燥大杼醉痛其蒸在骨背膂疼痛胻骨酸其蒸在腦男子失精女人自淫其蒸在玉房乍寒乍熱中腕目腫中煩悶其蒸在三焦小便黄赤凝濁如膏其蒸在膀胱傳道不均或泄或秘腹中雷鳴其蒸在小腸大腹隱隱右鼻乾疼其蒸在大腸口鼻乾燥腹脹睡卧不安自汗涌出其蒸在胃口苦耳聾脅下疼痛其蒸在膽裏急後重肛門秘塞其蒸在回腸小腹痛筋脉緩縱隂器自强其蒸在宗筋眼昏淚下時復暈燥怒不常其蒸在肝耳輪焦枯腰脚酸疼起居不得其蒸在腎情思不寧無故精泣綿綿而下其蒸在右腎心主胞絡心膈噎塞攻擊疼痛俯仰煩悶其蒸在膈諸證雖曰不同其根多有蟲嚙其心肺治之不可不絶其根也浴法香草乃三屍九蟲所憎之物煮湯沐浴其蟲必死今之人病莫重於癆癆天下名醫多不能療蓋由一人得病傳染子孫親姻族屬故曰傳屍癆乃至滅門盡族故人皆畏之或焚屍山林殯弃江湖不入墳墓族屬無骨肉之親夫婦弃義合之禮有此傷慟深可憫憐凡覺得此病不先焚滅三屍九蟲服藥無效十少一生凡人多秘此法不傳於世人以疾呼爲宿業甘心受病至死無憾嗟乎誤矣今述上聖之方以救世人三月四月取香草葉五片熟搗解衣坐之令氣入下部散入腹中從旦至暮其屍蟲盡去蓋三屍九蟲常居人身貪煞每至庚申將人罪奏上天令人夭死故老君三屍經纂云夫人生也皆寄形於父母抱五穀之精是以腹中盡皆屍蟲爲人之害至庚申夜告天帝記人罪過落人生籍令人速死魂升于天魄沉於淵惟有屍蟲獨在名曰鬼若不依時祭祀輒爲人祟損人性命也守庚申法夫人生於世上至國王次至大臣下至僧道庶人多少不定也惟有女人此疾尤甚學道之士若不去三屍九蟲以求長生者終不可得也每值庚申日其夜不睡守之至曉覺見體瘦倦方可投睡令人數覺此蟲不得去奏事也大帝玄科云六月八日及庚申日北帝開諸生門聽諸法詞訟旣作過滿五百者其人必死也宜守庚申鎮伏三屍凡守庚申三屍長絶使人精神爽利五神恬靜搔擾每夜之時叩齒三十六通以左手捧心呼三屍名上屍彭琚出中屍彭瓆出下屍彭𤩝出輒不得爲害常以庚申去手甲丑日去足甲每年七月十六日將所去手足甲燒灰和水服之三屍九蟲皆滅名曰斬三屍修合藥法凢修合藥時先須齋戒志心焚香凈掃一室不得令鷄犬猫兒仔子婦人一切穢濁之物來見然後驗醫傳屍方越王文湖南長老法名清於南嶽天福二年八月十二日收得越王時古方前越王說文後有方及符法自後醫救萬餘人於淳化九年傳授於丁相公後至祥符七年雷使得此方後救百餘人越王留文曰駙馬劉志家三百餘口因買一婢姓馮名捧書一日忽患寒熱不定服藥無效約得一百餘日甚瘦弱忽然而死不經五日有子劉祥年二十歲忽然得疾如前婢服藥醫救又百餘日忽然而死自後如此病者死百餘人皆爲此疾又駙馬忽然有此寒熱服藥無效越王遂大張於朝門詔名醫十日茅山道士姓李名同因入越王城問天使天使曰並未有識此證先生莫能治此疾先生曰此疾多證或死不明或夢中得物夢中見蟲夢中同行或同酒食語話出入惡風又有令人寒熱有嗽者有或傳染前患者衣服家事皆受此患也其傳氣出屍蟲多飛入衣服卧具化卵若得人氣血立化爲蟲自髮尾毛孔先食血脉次食五臟令人瘦弱如食心臟後其蟲即化爲鬼其藥不能醫治若未食心臟下藥投符取蟲蟲瀉下皆治疾共八九傳只有屍氣無蟲藥下取惡物青黄如膠亦安也立去身上衣服如前死人等物三日不得在家使用患人収掌如不信立依前受疾劉志乃煎鬼哭飲子取傳屍癆蟲鬼哭飲子天靈盖酥炙鼈甲酥炙柴胡去蘆阿魏安息香貫衆桃仁二十一箇去皮尖木香十分豉心半合青蒿半握甘草二寸生剉檳榔各一分辰砂半分别硏麝一錢别研赤脚蜈蚣以竹筒盛姜汁浸乾取一分用烏鷄糞一分先令鷄於五日前以火麻仁飼之五日後方取其糞用右件自檳榔起五味爲末研匀分爲三貼於六甲建日或除日貼此藥先以童子小便二升隔夜浸前藥十一味於星斗露天之下至四更時煎至八分濾去渣分爲三服每服用散子藥一貼五更初温温頓服即穩睡卧至二三點時又吃一服至日出時覺腹中欲利如未覺又進一服是第三服如利即不用進此第三服也取下惡物并蟲以盆盛之其蟲或似蜣螂蛇虺或如蜈蚣蜘蛛蚯蚓狀急以油火并穢物併燒殺之其身上所著衣服薦褥盡易燒之食葱粥將近不住服後主療數日後夜夢人哭泣相别是其驗也如取下得蟲看其嘴或青赤黄色可療如黑色與白色乃是食人精髓即不可療也雖不可療亦絶後患又合此藥時却不得令患人聞其氣息恐蟲聞其氣後難取下并煎時亦不得令聞知合藥亦不得在病家治癆取蟲經驗天靈蓋散天靈盖兩指大以檀香煎湯洗過用酥塗炙咒七遍云雷公神電母聖逢傳癆便須定急急如律令阿魏二分細研麝香三分別研辰砂一分别研安息香三分銅刀子切入鉢内硏同諸藥拌和檳榔如鷄心者五箇爲末連珠甘遂二分爲末一本不用此味右六味研極細和令匀每服三大錢同後湯使下薤白葱白各二七莖青篙二握甘草二莖五寸許桃枝以下并用向東南嫩者柳枝桑白皮一云桑枝酸石榴根一云枝各二握七寸許右八味須選淨潔處採用童子小便四升於銀石器内文武火煎至一升濾去渣分作三盞將前藥末調下五更初服男患女煎女患男煎服藥後如覺欲吐即用白梅肉止之五更盡覺臟腑鳴須轉下蟲及惡物黄水異糞異物若一服未下如人行五七里又進一服至天明更進一服並温吃如瀉不止用龍骨黄連等分爲末熟水調下五錢次吃白梅粥𥙷之論巳試功效嵓叟自老叟處得此神方應驗非一今連一二事書于篇後庶使來者知用藥之功效焉一職方郎中游烈者邵武寧人也其子之婦年十六得病渾身壯熱咳嗽痰涎月候不通飲食减少不歲餘衆醫不救用天靈盖散服之取下蟲一枚如娱蚣之狀當時鉗入沸油鼎中煎之投於江遂瘥一有一男子三十歲餘患病擫擫飲食倍多而不生肌肉每日常須肉食如或稍飢腹内疼痛倦怠遂以天靈盖散服之取下赤小蟲其數有十内有一蟲其色微紫大於衆蟲頭有細毛自後用藥𥙷理遂安兼進眞蘇合香丸一有男子一人年五十每日須酒數升空心未飲則兩手與脚并皆振動得酒一升飲之少減若至醉則手足不動俗謂酒疾醫議之是振風累日針灸服藥無效疑其蟲遂服天靈蓋散取下一物如烏梅之狀撥之有足正類蜘蛛其疾頓愈不復飲酒前效如此問病之士宜加審焉急救仙方卷之十
