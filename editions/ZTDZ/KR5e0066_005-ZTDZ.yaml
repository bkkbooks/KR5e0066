front:
  text: 急救仙方卷之五惻五
  hash: sha256:1a5af5d9af00e5794bfd965785e6406f0a6b0e1892e54b75d26a58de98d7647b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_SJB_005-260620c, image: sjb/26/260620c.png}
body:
  text: 濟隂品四十一證歌括用藥調經婦人經血有七七七七通行病難識非寒非熱及頭疼次第調經不須失正胃湯半夏一兩川芎四錢旋覆花四錢陳皮三錢丁香一錢白茯苓半錢右用姜煎空心服平胃湯人參草果白术宿砂白茯苓紅棗肉煨過焙乾右爲末空心白湯調下漏胎腹痛漏胎下血不須醫乾煞孩兒悔莫追方内有湯名縮住皆因妊母受災危凢婦人三兩月或五七月時下血塊多不治曰漏胎縮住湯宿砂仁一兩益智仁半兩右爲末每服三錢空心白湯下安胎飲香附子一兩去毛炒右爲末白湯下手足疼痛百節酸疼時復痛皆因勞役損精神梅煎散子加添味温酒時須活絡靈凢婦人四肢痛皆因先前坐草時及經絡勞役受風入體梅煎散當歸北柴胡黄耆各半兩鼈甲天仙藤甘草各一兩右爲末熟酒調下活絡丸川烏草烏各半兩赤小豆地龍各一兩大蒜一箇煨右爲末酒煮糊丸熟酒下腰脚痛水觸經時經不行因而脚痛致腰疼但用流經調血藥治療遲時别病生凢婦人脚疼腰痛皆因氣血凝滯多因經行之際水濕所觸住而不行流入脚經故成疾甚不轉側日夜呻吟不止或有發熱流經散當歸肉桂川芎威靈仙黑牽牛各三錢烏豆爲藥地黄各半錢京芍藥四錢牡丹皮二錢右㕮咀半酒半水煎服頭疼太陽頭疼血虚風漸漸疼加兩眼中先須𥙷取陽經候須用甦風最有功一字散南星生全蝎三箇川芎白芷荆芥穗各二錢右爲末茶調下頭暈肝臟虚時眼暈花心中欲吐是痰邪早上起來痰暈轉須知臟腑受寒邪凢婦人頭暈眼花不得起止心中欲吐是肝虚受痰飲所致宜補肝行風化痰婁金丸茴香香附子各半錢草烏一箇半夏曲一兩白茯苓細辛各半兩右酒麵糊爲丸每服二十丸食後酒下仍以三五七散補之腹常痛經年積血在關元日夜呻吟不得眠青皮烏藥姜香附莪术三稜方得痊凢婦人腹中常痛上下不足經年積血也立效散青皮陳皮烏藥乾姜香附子莪术三稜右用醋煮焙乾爲末空心陳皮湯下消痛丸乾漆三稜各半兩良姜一兩斑猫三箇炒右醋一升煮乾焙爲末醋糊丸每服三十丸醋湯下薑湯亦可又方三稜莪术青皮麥芽半夏各四兩右醋六升煮乾焙爲末醋糊丸每服二十丸醋湯或姜湯下脇下刺痛兩旁脇痛氣不通或時冲下氣連胷烏沈香附玄胡索七氣湯中加减功凢婦人兩脇痛小腹疼至胷背乃氣不順也加减七氣湯人參桂各三錢甘草玄胡索香附子沉香各二錢烏藥五錢半夏四錢右用姜煎不拘時煎服小膓滿痛血在三焦滿腹間或時淋瀝小便難萬靈散子通神用熱酒調加三兩飡凢婦人小腹痛是血也熱也氣也注於三焦之内流於膀胱之中小便淋也或大小産後是遺經敗血所致萬靈散桂半兩當歸一兩莪术半兩木香三錢地黄六錢右爲末熱酒調下又以小建中湯補之小便淋瀝八正散本事方桃仁煎手足心熱經血行時受其濕致令心中熱來侵白术柴胡滋血後手足煩熱自然清凢婦人經行時手足受水觸血風所致手足心時時有煩熱先服磁石湯加柴胡磁石湯芍藥地黄各二錢白术甘草地骨皮各三錢北柴胡五錢右㕮咀水煎空心服往來寒熱隂陽相勝致傷寒或是胎前雜病得但服柴胡加减湯一似燒湯去潑雪凢婦人寒熱往來此隂陽相勝隂勝則寒陽勝則熱所受如是受胎雜病但服柴胡散柴胡散北柴胡黄苓甘草各三錢荆芥桂各三錢地骨皮一錢右㕮咀水煎仍服小柴胡湯三五貼虚熱虚熱來時日夜般兩手脉來微細看逍遥散内加香附竹葉煎時始得安凢婦人體熱脉微乃虚熱此妄血太過道遥散内加地骨皮甘草各三錢北柴胡五錢黄芩川芎各三錢右㕮咀用水煎空心服背心疼痛心生血者資脾養或因怒炁在於心就使背心相對痛烏頭妙劑最爲靈凢婦人心能生血脾能養血或因怒氣冲犯於心致使氣血相搏在於胸膈故背心相對痛烏頭丸主之烏頭丸川烏一箇川椒一兩焙桂一兩赤石脂半兩煅附子一箇炖狼毒半兩良薑半兩右爲末蜜丸每服十丸空心温酒米湯下腹内脹痛腹脹因緣氣血虚因而食積損於脾𥐼砂丸子頻頻服不得消時蠱有餘凢婦人心生脹或腹内脹虚劣血氣因食生冷傷於脾或月候不行血注於脾致使然也若不甦脾順氣終成蠱疾難治𥐼砂丸𥐼砂三兩别研三稜青皮川椒乾漆各三錢厚朴二錢右爲末醋糊爲丸每服三十丸姜湯下四肢腫毒四肢腫毒便如水庸醫不識用藥餌米飲調下當歸丸自然經脉化爲水凢婦人四肢腫痛乃經血不得流徧四肢或腫而痛此因水濕所傷觸經而然當歸丸當歸半兩桂三錢葶藶二錢人參一錢大黄三錢赤芍藥二錢白茯苓半錢甘遂半錢右用蜜丸彈子大米飲化下皮肉如針刺皮肉之中似針刺或時自吐嘔頻頻此是月經傷冷得血痛元來自有因凢婦人肌肉如針刺或時吐嘔者因月經傷冷血痛但𥙷胃熱方用止痛先服加乾散次服立效散方見前腹痛内加乾散没藥當歸北芍藥各三錢桂二錢麝香一分川烏三錢茴香三錢右爲末酒調下月候不乾月經太過不乾時乃是氣虚之所爲内𥙷丸中加使用鹿茸附子𥙷三虚歸茸丸當歸一兩牡丹皮鹿茸各三錢附子一箇地黄三錢人參三錢右爲末糊丸阿膠湯下自痢下血下痢之病有兩般赤是熱證白是寒腹痛時時頻下痢八寳湯中服立安凢婦人下痢赤白腹痛皆因受寒熱之邪積於臟腑故有此證當先去熱然後調脾胃八寳湯當歸一兩大黄半兩枳殻赤芍藥木香各三錢右水煎服調胃養中湯人參白术陳皮豆蔻各三錢訶子一箇白茯苓三錢右爲末米飲調下喘嗽皆因肺藏受風寒咳嗽痰涎喘不安但要安胎調胃氣紫蘇湯點伏龍湯凢婦人肺臟感寒邪而成嗽漸次傳脾吐痰涎也治療之遲成血塊血勞也經喘不通失音也伏龍湯杏仁七箇訶子五箇陳皮枳殻各三錢阿膠七片麻黄二錢青黛一錢右爲末蘇湯調食後再用調經散見三因方産後血不乾産後因何血不乾皆因傷損子宫寒日久漸加形體瘦却成帶下不能安凢婦人産後血不乾或一月之後其血黄如灰汁者日久成帶玉神散毛頭紙十張燒灰楮皮紙一大張燒灰荆芥穗一握半夏半錢右用水酒同煎若有咳嗽金沸草散姜棗煎服小便赤澁臍中有撮小便攻或在産前産後中葵子丸中三五服葱熨臍中立便通凢婦人小便赤澁腹中有熱如小便澁赤兩津液血出多所以小便不尋常也葵子散木通半兩當歸三錢葵子二錢通草一兩栀子三箇右用水煎産後葱熨臍中小便即通也大便閉結肺臟虚熱大便結此乃脾虚臟中竭薄苛湯點三四服自然通利熱須撤凢婦人大便結肺臟受熱風血虚也三黄散防風半兩枳殻半兩大黄二兩右爲末薄荷湯下空腸丸麻仁厚朴枳殻大黄杏仁川烏各等分右爲末煉蜜丸米飲下牙疼腫痛牙疼腫痛是脾虚兩脥腫時風熱俱赴筵散子頻頻漱續使𥙷肝湯即除凢婦人牙疼脥腫脾虚血弱氣不升降受暴風熱但以祛風赴筵散灌潄赴筵散細辛蓽附子皮川烏皮右煎湯噙漱口滿吐之𥙷肝湯肉豆蔻生陳皮半兩白术半兩荆芥三錢旋覆花三錢良薑茯苓三錢右爲末米湯調下腸風大便之後血相隨名曰腸風氣有餘荆芥川烏爲丸子黄耆酒下便令除凡婦人此證因房太過血不足氣有餘致有肛門澁痛宣腸丸川烏生荆芥穗一兩枳殻一兩右用米糊丸黄耆酒下吐血上行經血行時反上行肺經有病熱冲然但要順經調肺氣紅花散子善能痊凢婦人吐血有三一經不行反上行便傷氣也二傷冲三肺經受熱隨上冲故便吐血調脾散三稜莪术各兩麥芽半兩胡椒二錢宿砂三錢川芎二錢茴香二錢甘草三錢青皮三錢陳皮三錢右爲末米飲調下通經丸當歸一錢半桂不見火青皮去白大黄炮乾漆炒令烟盡乾薑炮川烏炖桃仁炒去皮莪术炒川椒各錢右十味每味各同椒微炒放地上出汗爲末一半用醋熬成膏後入一半更入雞子清同爲丸隂乾醋湯下三十丸胎前腹痛胎氣有餘腫脚經三隂受濕未能分治療先須調去濕方可安胎治脚經凢婦人孕七八月脚腫此胎氣流於三隂脚經至將月時經血大過氣隨血散先爲去濕次與分氣飲分氣飲陳皮甘草赤伏苓各三錢蒼术木瓜白术各五錢右以姜棗煎服筋掣發搐風入肝經發爲搐虚之太極又攣拳參附湯中加减服要行氣脉自然痊凢婦人氣虚太極肝經受風肝主筋受風則搐急不舒先散風參附湯人參附子生甘草細辛白术乾姜各二錢右爲末熱酒調服徧身黄面目遍身似橘黄其人經脉不尋常皆因房事中其血若不醫之定不祥凢婦人遍身黄疸名經水不調房事觸犯寸金散黄臘五錢白凡五錢陳皮三錢右以黄蠟丸滋血湯調經湯吞下大全方上語音不岀或時嗽後語音咽脫着傷風是亦然但用塩湯乾與嚼血勞之病斷琴弦凢婦人氣虚肺感風邪而失音有因嗽絶宜用脚經丸塩煨姜過一宿早晨服之久失音者尤宜助桂湯助桂湯好真蘇子二兩杏仁三十枚訶子三枚百藥煎二兩右用熱酒調下塞噎氣不調和上膈寒致令塞噎吐痰涎丁香柿蒂枇杷葉自然塞去得安痊凢婦人氣不順上膈受寒致塞噎不住傷風者有此丁香散丁香柿蒂枇杷葉陳皮各等分右爲末細嚼服形容瘦瘁氣不充時血不榮肌肉不長瘦其身谷靈丸子服兩月頰紅肥大長精神凢婦人血弱血虚肌肉不長血海虚竭大要調血氣谷靈丸黄茋人參牛膝當歸各一兩附子一枚地黄半兩杜仲蒼术白术桂枸杞各三錢茯苓五錢右以酒糊丸人參湯下數月懐胎經行如故懷胎數月不能分飲食無妨經又行蘇合香丸化水下鬼胎客忤不能迍凢婦人懷胎三四月飲食無妨月經如常此鬼忤怪氣在於臟腑是以滿腹宜服蘇合香丸井花水早晨服玉户生瘡玉户生瘡時痛癢皆因房色損其元黄蔥水洗兩三次杏仁燒灰油調痊凢婦人玉户生瘡皆因月事受風房事太過致生瘡名隂蝕宜黄蔥煎水洗次用杏仁散杏仁一兩右燒灰清油調塗身痛右邉身痛爲血逆左邉身痛氣所煎思慮風寒於兩及此痛元來通一邉凢婦人身痛右是血左是氣皆因受風濕思慮交會氣血不調是氣匀氣湯是血匀血湯匀血湯茴香厚朴乳香桂甘草黑牽牛地黄羌活右等分木香湯下匀血湯當歸細辛白芷没藥澤蘭甘草天仙藤右等分爲末熱酒調下寒戰身戰慄慄似鬼魔血寒之證實無他但信子規靈有驗熱酒調和不用多凡婦人戰慄者血寒也皆因傷風冷氣血弱所以戰栗也子規丸荆芥牡丹皮桂白芍藥右爲末熱酒調下心酸酸心病是脾宿寒胃中痰積致心酸陳皮麥糵能除積蒼术茱萸病日安凢婦人有積飲痰證在脾胃間時時酸心或吐水茱萸丸吴茱萸塩湯洗蒼术各一兩陳皮去白麥芽桂神麯各五錢右水煮麵糊爲丸米飲下耳聾末後三旬耳怎聾皆因妄血受其風巴㦸丸中加附子更添腦麝取全功凢婦人風虚上攻如此但服巴㦸丸加附子温酒下更服黄耆湯巴㦸丸局方上載遍身麻痹因虚受濕徧身麻不知癢痛眼生花氣血一時風毒感五𥙷祛風大有加凢婦人遍身麻痺謂之不仁皆因血風血虚受風濕所致五𥙷丸黄耆一兩人參五錢附子一枚當歸三錢白芍藥五錢右煉蜜丸祛風散下祛風散生川烏白术白芷甘草各三錢右温酒調吞下五𥙷丸秦桂丸增添别本得效治婦人無子昔知金州范羅言乞以此方試令婦人服之四十九日如無子請罰臣一家以令天下何德易云雖其言自誇然實有異驗臣妻年卄七無子服此藥二十日便有孕殘藥以與石門縣令妻年三十四斷産巳十六年服此便有娠又將殘藥與太子中守文季妻年四十無子服此遂有娠其效如神不可具述乃仙方也秦芃桂心杜仲防風厚朴各三分附子生一兩半茯苓兩半白薇乾薑沙參牛膝半夏各五錢人參一兩細辛一兩一分右十四味並生碾爲末煉蜜丸如菉豆大每服三十丸空心米飲任下未效更加數丸巳覺有孕便不可服急救仙方卷之五
