front:
  text: 急救仙方卷之一
  hash: sha256:c3bb04bbd1e231202fa3ecd19cee12973abfce8d910e2045ea0d912b8f1b3069
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_SJB_001-260599c, image: sjb/26/260599c.png}
body:
  text: 妊娠諸疾品术苓湯治婦人胎孕不安白术黄苓各等分右爲粗末每服三錢水二盞當歸一根同煎至一盞稍温服立效散治胎動不安如重物所墜冷如冰川芎當歸各等分右爲粗末每服五錢水煎食前温服或下血心腹痛酒水相半煎服保安散治妊娠因有所傷胎動疼不可忍及血崩不止連皮縮砂不以多少炒黑去皮右爲細末温酒調下覺腹中熱則胎巳安矣治妊娠胎動不安或腰痛胞轉搶心下血不止石菖蒲根搗汁三升飲之又方艾葉如鷄子大以酒四升煮取二升分二服良又方檳榔一兩爲末葱白湯調下一錢七佳二黄散治有孕胎漏下血生地黄熟地黄各等分右爲細末每服三錢煎白术枳殻調下立聖散治妊娠下血不止鷄肝二具用好酒一升煮熟共酒食之大效枳苓散治胎漏下血或因事下血枳殻去穰半兩麩炒黄苓半兩白术二兩右爲粗末每服五七錢水煎去滓食前服治妊娠誤有失墜或推築著疼痛難忍當歸一兩新青竹茹二合右以好酒二升煑十數沸分三服又方以川芎爲末每服二錢温酒調下治妊娠因頓跌胎動不安腰痛腹滿或有所下或胎上搶心熟地黄二兩白芍藥艾葉當歸甘草阿膠炒珠黄蓍川芎各一兩右㕮咀每服半兩姜三片棗一枚水煎服火龍散治妊娠心氣痛艾葉半兩鹽炒一半茴香半兩炒川練子半兩炒右爲細末水煎食前服通氣散治妊娠腰痛狀不可忍此藥神妙破故紙不以多少瓦上炒香熟爲末嚼胡桃肉一個空心温酒調下三錢芎歸湯治妊娠胎動子死或不死川芎當歸各等分右㕮咀每服三五錢加紫蘇數葉酒水合煎服死者即下未死者即安黄連湯治妊娠兒在腹中啼黄連二錢生甘草一錢右濃煎汁令母呷之又方以多年空屋下鼠穴中土一塊令母噙之即止猪苓散治妊娠從脚上腫至腹小便微利微渴引飲猪苓五兩右爲末以熟水服方寸七日三葶藶散治妊娠遍身洪腫葶藶二兩白术五兩白茯苓桑白皮郁李仁各二兩右爲粗末水六升煮取二升分三服小便利即差又方澤瀉二兩葶藶二兩茯苓枳殻麩炒白术各六兩右爲細切以水六升煮取二升分二服防已湯治妊娠脾虚遍身浮腫心腹脹滿喘促小便不利防已七錢半桑白皮赤茯苓紫蘇莖葉各一兩木香二錢半大便不通加枳殻檳榔右粗末每服四錢姜四片水同煎食前服當歸芍藥散治妊娠腹中絞痛心下急痛白芍藥四兩當歸茯苓各一兩澤瀉二兩川芎二兩甘草炙一兩右爲細末每服三錢食前温酒調服以蜜丸亦可人參散治妊娠霍亂吐瀉心煩腹痛人參一兩厚朴一兩姜製陳皮一兩當歸炒甘草半兩炙乾生姜一兩嘔逆不止加益智仁煨草豆寇右㕮咀每服四錢棗三個水煎服茯苓半夏湯治妊娠惡阻心中憒悶頭目眩暈四肢怠惰百節煩疼胸膈痰逆嘔吐惡心嫌聞食氣好酸醎多卧少起全不進食先服茯苓半夏湯次服茯苓丸半夏一兩二錢湯洗七次炒赤茯苓熟地黄各七錢半陳皮人參旋覆花芍藥川芎桔梗各半兩甘草半兩炒右爲粗末每服五錢姜三片同煎食前熱服茯苓丸赤茯苓人參桂炒半夏湯洗炒陳皮乾姜炮各五錢白术葛根各一兩甘草一兩炙枳實二兩麩炒右爲細末鍊蜜丸桐子大米飲下三五十丸食前竹瀝湯治妊娠恒若煩悶心膽怯此名子煩茯苓三兩竹瀝一升右以水四升煎取二升分三服不差再服又方茯苓四兩防風麥門冬去心黄苓各三兩人參一兩五錢右㕮咀每服四錢淡竹葉數片同煎服不得眠加酸棗仁紫蘇飲治妊娠胎上逼脹滿疼痛謂之子懸兼治臨産驚悸氣結連日不下紫蘇一兩當歸甘草各二錢半人參川芎大腹皮陳皮白芍藥各半兩右㕮咀每服半兩水一盞半姜四片葱白七寸去滓空心温服知母散治妊娠煩躁悶亂口乾及胎藏熱知母甘草麥門冬去心各半兩黄耆黄芩赤茯苓各七錢右㕮咀每服四錢竹茹一塊水煎服四肢壯熱加葛根柴胡治妊娠忽下黄汁如膠或如小豆汁苧根切二升右水四升煎取二升分二服每服入酒半升再煎服厚朴散治妊娠下利黄水不止厚朴三兩姜汁炙黄連二兩肉豆寇五個連皮右㕮咀用水二升煮取一升服治妊娠無故卒下血阿膠二兩重以蚌粉同炒珠搗爲末生地黄半斤搗取汁右以清酒三升將二味攪匀温過分三服治妊娠無故尿血龍骨一兩爲末蒲黄五錢硏匀右以酒調方寸七日三服治妊娠藏氣本虚脾胃乆弱臍腹疼痛滑泄無度産後同厚朴二兩姜汁浸炒黄草豆寇一箇煨肉豆寇一箇麵裹煨右㕮咀每服三錢姜三片煎服大寧散治妊娠下利赤白及泄瀉疼痛垂死者黑豆三十粒甘草二寸半半生半熟鶯粟殻二十一生炒一右爲粗末都作一服生姜三片同煎食前服神效治妊娠挾熱下痢黄連一兩黄柏一兩梔子仁十枚右㕮咀每服五錢水二盞浸三時久煮十沸去滓頓服嘔加生姜橘皮治妊娠下痢腹痛小便澁糯米一合當歸一兩炒黄耆一兩右細切和匀水二盞煮取一盞二分去滓分四服黄連散治妊娠下痢赤白膿血乆不止黄連八錢厚朴姜製阿膠蚌粉炒當歸各六錢艾葉黄柏各四錢乾姜炮四錢右爲細末空心米飲調下方寸七日三服治妊娠小便不禁桑螵蛸十二箇炙右爲細末每服二錢空心米飲調下白薇散治妊娠遺尿不禁白薇白芍藥炒各等分右爲末每服二錢食前温酒調下茯苓散治妊娠小便不通赤茯苓黄葵子各等分右㕮咀每服五錢水二盞煎一盞温服如不通恐是轉胞加髮灰少許調服極妙治妊娠患淋小便澁水道熱不通車前子一兩葵根五錢切右二味以水升半煎至一半空心温服大腹皮散治妊娠大小便赤澁大腹皮枳殻去白麩炒甘草黄芩各一錢赤茯苓去皮二錢右㕮咀加葱白水一盞煎七分空心温服斬邪丹治婦人鬼胎如抱一甕吴茱萸川烏秦芃柴胡白殭蚕洗巴㦸生用巴豆去殻不去油莞花醋煮各一兩右爲末鍊蜜爲丸如梧桐子大每服七丸蜜酒吞下取出惡物即愈桔梗散治妊娠肺壅及外傷風寒咳嗽喘急天門冬去心一兩貝母人參甘草桑白皮桔梗紫蘇各半兩赤茯苓一兩麻黄去節七錢右㕮咀每服四錢姜三片水煎服服藥忌食鯉魚紫苑湯治妊娠咳嗽不止胎不安紫苑天門冬各一兩桔梗半兩甘草桑白皮杏仁各二錢半防風半兩右㕮咀每服三錢竹茹一塊水煎去滓入蜜半匙再煎二沸温服服藥忌食鯉魚人參橘皮湯治妊娠嘔吐痰水多是惡阻人參橘紅白术麥門冬去心各一兩甘草三錢厚朴姜製白茯苓各半兩右爲粗末每服四錢入淡竹葉彈子大生姜三片水煎空心食前服加味四物湯治妊娠傷寒諸證熟地黄當歸川芎芍藥各等分右㕮咀每服四五錢水煎服若妊娠傷寒頭痛身熱無汗脉浮緊加麻黄細辛若妊娠傷寒中風表裏自汗頭痛項强身熱惡寒脉浮而弱加黄耆地骨皮右妊娠傷寒中風濕之氣肢節煩疼脉浮而熱頭痛加防風蒼术製若妊娠傷寒胸脇滿痛而脉弦加柴胡黄苓若妊娠傷寒大便硬小便赤氣滿而脉沈數加大黄生桃仁去皮尖麩炒若妊娠傷寒小便不利加茯苓澤瀉若妊娠傷寒小便赤如血狀者加琥珀茯苓若妊娠傷寒四肢拘急身凉微汗腹中痛脉沈而遲加附子炮去臍桂少用若妊娠傷寒畜血證加生地黄酒浸大黄若妊娠傷寒身熱大渴蒸又而熱脉長而大者加石膏知母若妊娠傷寒下後過解而不愈温毒發班如錦紋加升麻連翹若妊娠傷寒下後咳嗽不止者加人參五味子若妊娠傷寒下後虚痞腹滿加厚朴姜製枳實麩炒若妊娠傷寒下後不得眠者加栀子黄芩若妊娠傷寒汗後血漏不止胎氣損者加阿膠炙甘草黄耆若妊娠脉浮頭腫自利腹中疼痛去地黄加桂枝炒若妊娠傷寒自利腹中痛飲食不下脉沉者去地黄川芎加白术炙甘草茯苓加黄耆護胎法治妊娠傷寒白藥子不拘多少爲末用雞子清調攤於紙花上可捥來大貼在臍下胎存處乾則以温水調之又方以竈心土水調塗臍下乾又塗之又調服彈子大佳又方壯熱甚則以井底泥敷心下令胎不傷白术散治妊娠傷寒煩熱頭痛胎氣不安或時吐逆不下食白术橘紅人參前胡川芎麥門冬去心赤茯苓各一兩半夏湯洗炒甘草各半兩右每服四錢姜四片竹茹二錢半水煎服升麻散治妊娠傷寒頭痛身體壯熱升麻蒼术炒麥門冬去心麻黄去節石膏各一兩黄芩知母各五錢右每服四錢姜四片淡竹葉十四片水煎服柴胡散治妊娠傷寒頭痛項强身熱口乾胷脇疼柴胡前胡川芎當歸人參芍藥甘草生地黄各等分右爲細末每服四錢姜三片棗三枚葱白三根水煎出汗秦芃散治妊娠傷寒五六日不得汗口乾多喫水狂語嘔逆秦芃柴胡各一兩石膏二兩前胡赤茯苓甘節葛根犀角屑升麻黄苓各半兩右每服四錢姜四片竹茹三錢水煎防風葛根湯治妊娠中風腰背强直時復反張防風葛根川芎生地黄各二兩杏仁製一兩半麻黄去節一兩半桂心炒獨活甘草防己各一兩右㕮咀每服四錢水煎治妊娠中風角弓反張口噤語澁謂之風痙亦名子癎麻黄去節防風獨活各一兩桂心炒升麻甘草羚羊角犀酸棗仁秦芃各半兩川芎當歸杏仁製各七錢右㕮咀每服四錢姜四片竹瀝一合水煎服治妊娠臨月因發風痙忽悶憒不識人吐逆眩倒名子癎葛根貝母去心牡丹皮防巳防風當歸川芎甘草澤瀉白茯苓桂心炒各二兩獨活石膏人參各三兩右㕮咀以水九升煮取三升分二服貝母令人易産若未臨月以升麻代之柴胡散治妊娠瘧疾柴胡生大黄各二錢黄芩一錢半甘草一錢右㕮咀作一服水煎臨發日五更温服必取利爲愈如胎上逼心可服枳殻散忌油麵辛熱等物又方大黄二兩柴胡一兩半黄芩芍藥各一兩右爲細末清水糊爲丸如桐子大每服百丸臨發日五更冷湯吞下隔兩時再服五十丸以利爲度治妊娠瘧疾發熱口乾渴飲無度者生地黄一兩半黄芩麥門冬去心人參知母各一兩石膏二兩甘草半兩乾葛一兩右㕮咀每服五錢入烏梅半箇煎服治妊娠瘧疾得效方常山石膏各一兩甘草炙黄芩各半兩烏梅七箇右細切以酒水各一碗浸一宿平旦煎至一椀去滓分二服臨發日驗胎方治婦人經脉不行巳經三月者川芎不見火右爲細末空心濃煎艾湯調下方寸七覺腹内微動則有胎也急救仙方卷之一
