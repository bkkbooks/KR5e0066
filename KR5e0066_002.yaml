front:
  text: 急救仙方卷之二惻二
  hash: sha256:512ddd7e4e90cbde61976f56b9497ad52abaa1abddc711972dc6f21ab362bac3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_HFL_002-001a, image: hfl/0821/0821-038.png}
body:
  text: 産難諸疾品枳殼散治婦人臨月服即合胎瘦易産枳殼四兩各用麩炒甘草一兩生右為細末每服一二錢白湯調服治孕婦日月未足疼痛而欲産者菖蒲根搗汁灌喉中又方蒲黃如棗許大井花水調下又方知母三兩為末蜜丸桐子大每服二十丸米飲下如聖散治産難紫蘇葉當歸各等分右每服三五錢長流水煎服如無流水以水順攪動煎服又方以黃葵子百粒研爛酒湯任服立産又方以好墨一寸末之水調服立産又方取夫褐帶五寸燒末存性酒調服又方萆麻子二枚令婦兩手各把一枚即下又方取槐樹東枝令孕婦把之易産又方取皂角子二枚吞之立産又方取槐子七粒新汲水吞之即産又方取皂角少許末吹鼻中令嚏子便生又方紫蘇煎湯調益元散服即産治婦人臨産纍日氣盡不能生兼惡露出盡胞乾終不産者右用赤小豆一斗水九升煮令熟去豆滓將阿膠三兩入豆汁中溶化每服止半盞未産再服即出治婦人生産五七日不下及矮石女子交骨不開者右取自死龜殼或占卜廢殼酥炙或醋浸炙及用生男女多者婦人頭髮一握燒存性以當歸川芎同煎服屢效約人行五里生死胎俱下烏蛇散治婦人逆産烏蛇蛻一條蟬蛻十四合血餘一箇即胎髮右三味燒為灰分作二服溫酒調下併進二服仰卧霎時兒即順生又方用小絹針於小兒腳心刺三五下急用鹽少許塗刺處即順生用穀尖刺尤好又方以鹽塗兒足底又可爪甲搔之并以鹽摩母腹上又方以手中指取鍋底墨交畫兒足下即順生又方取其父名書兒足下即順生治婦人橫生不可出右車前子為末酒服二錢七又方兔絲子為末酒調服一錢七米飲調亦可治婦人橫逆生得效方百草霜香白芷各等分不見火右用童子小便與好醋各一合調成膏沸湯浸服甚者二服即生治婦人逆橫難産子死腹中先用黑豆一合炒熟水與童便合煎服神效又方艾葉半斤酒四升煮取一升服之又方當歸為末酒服方寸七紫蘇湯調服亦可奪命散治婦人産死腹中胎不下桂二錢麝香當門子一粒右件用為末研酒服須臾即下又方用鹿角屑三二方寸七煎葱豉湯和服之立出又方用朱砂一兩水煮數沸末之酒調服效又方揄白皮煮汁服二升即出又方取竈心土為末以水調三錢七服之其土兒當戴出又方用瞿麥二兩銼水八盞煮三盞服一盞未出再服又方朴硝二錢溫童子小便調服亦治胞衣不出立效又方用萆麻子一百粒去殼雄黃末二錢一處研成膏攤紙上貼母右腳心先置冷水一捥才下急洗去亦治胞衣不下治婦人産難已死子不出者用水銀如彈子大斡開口灌之扶令坐少頃又扶令𠋣立子即出祕方治婦人胎衣不下取本婦𥚛覆井口立下又方米麥赤小豆三味同煮濃汁服之即效又方皂角刺不以多少燒灰存性為末每服一大錢溫酒下又方取竈下土一寸研碎用好醋調納於臍中取甘草湯服之又方牛膝半斤以水九升煎取三升分三服治婦人墮胎胞衣不下腹中疼痛牽引腰脊用好墨細研每服二錢七溫酒下無時治婦人落胎下血不止方又生地黃汁調代赭末一錢日三服取桑木中蝎蟲燒末存性酒服方寸七日三服治婦人落胎身下有血方丹參十二兩以酒五升煎取三升分三服治婦人小産下血子死增寒唇口爪甲皆青面色白黃黑或胎上搶心則悶絶欲死冷汗自出或食毒物傷動胎氣下血不止胎尚未損服之可安已死者服之可下牡丹皮白茯苓桂心桃仁去皮尖麩炒赤芍藥右各等分為細末鍊蜜丸如彈子大每服一丸細嚼淡醋湯下連進兩丸若胎腐爛腹中危甚者立可取出治婦人推腸生又名盤腸産蓋臨産則子腸先出既産其腸不收右以半夏為末搐鼻中又以萆麻子研膏貼頂心腸上即拭去産後諸疾品治婦人産後血暈不知人狂語顛倒健忘失志紫礦一兩右細研溫酒調二錢七服又方用蘇合香丸童子小便煎一二沸調下治産後血暈昏迷心氣絶夏枯草絞汁服一盞妙又方五靈脂二兩半生半炒為細末每服一錢溫酒調下口禁者斡開灌之加荆芥等分為末溫童便調下更妙又方紅花一兩分為兩服酒童便各一盞煎取一盞服又方半夏一兩為末冷水和丸如豆大納鼻中即愈又方醋磨京墨服之良治産後血暈連心頭硬悶亂氣絶手腳煩熱及寒熱不禁延胡索炒為末酒服一錢七亦治穢汙不盡胸腹脹滿又方續斷皮二兩銼以水三升煎取一升分作三服溫服如人行二三里再服無忌雖垂死者亦愈又方生地黃汁一盞當歸赤芍藥各二錢半右水煎三五沸溫服如覺煩熱去當歸入童便半盞服之治産後敗血衝心發熱狂言奔走脉虛大者乾荷葉生地黃牡丹皮右等分煎湯調蒲黃二錢七一服即定治産後惡血衝心胞衣不下腹中血塊錦紋大黃一兩研為細末用釅醋半升熬成膏丸如桐子大用醋七分盞化五丸至七丸服之須臾即下治産後血上心巳死或胎不下鬱金燒存性為末每服二錢釅醋一合調灌之立活治産後敗血衝心胸滿上喘命在須臾真血碣如無紫礦代沒藥右等分輕手研細每服二錢用童便合酒半大盞煎一沸溫調下才産下服之上床良久再服治産後氣喘為孤陽絶陰不治者人參蘇木各一兩右每服五錢水二盞煎七分頻頻呷之又方用胡桃肉不去皮同人參等分每服五錢水一盞半煎七分頻頻呷之屢效倉公散治産後鬱冒血厥閉目昏默先以倉公散取嚏後服白薇湯甜瓜蒂藜盧雄黃明凡煅等分右為細末吹入鼻中白薇湯白薇當歸各一兩人參半兩甘草二錢半每服四錢水煎溫服孤鳳散治産後閉目不語白礬一錢右為細末熟水調下治産後血不下夏枯草絞汁每服一小盞入酒一合溫攪勻服又方蒲黃三兩水三升煎取一升頓服治婦人産後敗血未盡心腹脹滿生姜切五兩右以水五升煮三升分三服立效治産後血癖痛大黃一兩當歸半兩官桂二錢右以酒三升煮十沸頓服治産後惡物不盡腹內疼痛生乾地黃一兩微炒當歸一兩微炒生姜半兩瓦上炒焦黑右以為細末每服二錢姜酒調服神效治産後心腹痛欲死五靈脂蒲黃各等分右為末先用釅醋調二錢熬膏入水半盞童便半盞煎七分食前熱服神效治産後腹中絞痛不可忍延胡索當歸芍藥川芎乾姜各等分右為細末每服三錢溫酒調下治産後惡露不盡腰腹痛兒枕痛并皆治之延胡索桂心當歸各等分右為細末每服三錢熱酒調服治産後內虛寒氣入腹腹中絞痛及兩脅當臍急痛名曰寒疝肥羊肉一斤當歸甘草芍藥炒人參各一兩右㕮咀以水一斗先煮取七升入藥更煮再二升去滓分二服治産後血瘕痛臍下脹不下食當歸二兩桂心芍藥各半兩蒲黃各一兩半血碣延胡索各一兩脅肋脹去血碣加檳榔柴胡青木香右為細末每服二錢溫酒調下治産後血入於肺面黑發喘欲死者人參一兩另為末蘇合香二兩右以水二碗煮蘇合香至一碗去滓調參末隨多少如神效治産後惡露不下三四日嘔逆壯熱芍藥二兩半知母生姜當歸蒲黃各二兩紅花五錢生地黃汁一盞荷葉中心蒂七箇右以水二升煎至一升去滓下蒲黃煎四沸空心分作三服治産後嘔吐不止陳皮一兩半夏曲甘草各半兩藿香二兩右為細末每服三錢姜三片煎熱服趂痛散治産後氣弱血滯身熱頭疼及遍身疼痛牛膝當歸桂心白术黃耆獨活生姜各半兩甘草炙薤白各二錢半右㕮咀每服半兩水三盞煎至盞半去滓食前熱服治産後頭痛川芎當歸荆芥穗各等分右㕮咀每服五錢水煎熱服治産後下血不止炙桑白皮煮水飲之良又方菖蒲二兩以酒二升煮分作兩服止治産後下血虛羸殆死蒲黃二兩水二升煮取八合頓服治産後子宫不收荆芥穗藿香葉𣗬椿樹皮各等分右煎湯熏之子宫即入又方五倍子白凡為末溫湯泡洗又方萆麻子搗塗頂心吸入即洗去藥治産後生腸不收枳殼煎湯溫浸良久即入治産後陰下脫蛇床子絹袋盛蒸之亦治隂户痛又方順火草一斤陰乾水五升煮取汁分溫服又方以鐵爐中紫塵羊脂二味攪令稠布褁炙熱推納之差治産隂後道開不閉以石灰一斗炒黃水三斗投灰中放冷澄清取一斗二升暖洗又治隂腸脫出治産後中風寒遍身冷直口噤不識人白术三兩川芎當歸生姜各一兩右以酒三升煎取一升頓服治産後中風語澀四肢拘急羌活三兩當歸一兩官桂半兩杏仁半兩去皮尖炒右為末每服五錢酒水各半盞煎去滓溫服治産後中風煩渴紅花五合微炒水一升煎取七合徐徐呷之治産後中風不省人事口吐涎沫手足瘈瘲當歸荆芥穗各等分右為細末每服三錢水一盞入酒煎七分灌之口噤者斡開灌小續命湯治産後中風腰强直時時反張或半身不遂口眼喎斜手足戰掉語言蹇澀防巳肉桂去皮黃芩芍藥杏仁去皮尖甘草川芎麻黃去根節人參各一兩防風一兩半附子去皮臍半兩右㕮咀每服五錢水一盞姜五片棗一枚煎七分熱服若藏寒下利者去防巳黃芩加白术附子一倍若自汗者去麻黃杏仁加白术黃耆若失音者加杏仁一倍治産後中風手足不遂語言蹇澀恍惚多忘精神不定獨活當歸芍藥防風川芎玄參天麻各五錢桂心三錢若作丸巳上皆加分兩右㕮咀以水八升煮取二升半分為三服亦可蜜丸服若有氣證加生姜一兩半若有熱加葛根五兩冷加白术五兩若手足不穩加牛膝一兩二錢萆薢三兩黃耆四兩治産後血渴不止一方用黃芩麥門冬去心等分煎服延胡索蔚金乾葛桂心青皮枳殼麩炒各等分右并以好醋浸一宿焙乾為細末每服二錢冷橘皮湯調下又方生地黃汁和蜜微鍊過熟水溫調服即止竹葉湯治産後虛渴少氣竹葉三升甘草人參茯苓各一兩小麥五合生姜半夏各三兩麥門冬去心五兩大棗十五枚右㕮咀以水九升先煮竹葉小麥生姜棗取七升去滓納藥再煎取三升去滓一服五合日三服夜一服益元散治産後虛渴煎人參五味子麥門冬去心湯調服良治産後小便數及遺尿桑螵蛸半兩炙龍骨一兩右為細末米飲調下二錢空心服又方以雞矢燒灰空心酒服方寸七治産後大小便不通或下血車前子黃芩蒲黃牡蠣生地黃芍藥各一兩右為細末空心米飲服方寸七忌麵蒜治産後虛煩不得眠芍藥當歸栀子各五錢香豉半合右㕮咀每服一兩水煎服治産後往來寒熱柴胡二兩黃芩七錢人參五錢半夏一兩半湯洗甘草七錢半大棗三枚生地黃栀子枳殼麩炒各五錢右㕮咀每服一兩姜五片煎熱服柴胡散治産後虛羸發寒熱飲食少腹脹增損柴胡人參甘草半夏湯洗陳皮川芎白芍藥各等分右㕮咀每服五錢姜五片棗二枚水煎食後服咳嗽加桑白皮地骨皮治産後血不止以雞子三枚醋半升好酒二升煎取一升分四服如行二三里微溫進之治産後瀉白不止艾葉半兩炙熱老生姜半兩右水煎服之即止治産後諸痢神效方蒼耳葉搗絞汁入蜜溫服半盞日三黃芩丸治産後赤白痢腹中絞痛不可忍阿膠蒲黃栀子仁各兩黃連四兩當歸一兩半黃柏三兩黃芩芍藥各二兩右為細末鍊蜜為丸桐子大每服六十丸米飲下日三夜一又方芍藥阿膠艾葉熟地黃甘草當歸各四兩右㕮咀每服一兩水煎服危急者巳上分兩只作一服水三升煮取一升分二服空心名救急散又方芍藥三錢黃芩二錢半當歸二錢甘草一錢半右㕮咀水一升煎七分溫服食前裏急後重加枳殼檳榔治産後虛汗不止當歸黃耆麻黃根牡蠣煅為粉人參粉草炙各等分右㕮咀每服五錢水一盞煎溫服又方牡蠣煅小麥麩炒黃右等分為細末煮生猪汁調下二錢無時候治産後吃意丁香白豆蔻各半兩伏龍肝一兩右為細末煎桃仁吳茱萸湯調下一錢如人行五里再服治産後咳逆三日不止欲死者桂心半兩生姜三合右同煎取二合以火先炙背摩令熱塗藥盡妙治産後經脉不調四肢煩疼飲食全少日漸羸瘦琥珀牛膝生地黃當歸各一兩桃仁赤芍藥各半兩右粗末每服三五錢水一盞姜三片煎去滓溫服治産後心膈迷悶腹藏撮痛氣急月信不通烏藥二兩當歸莪术各一兩右為細末每服二錢溫酒調下服後以食壓之大忌生冷油膩等物急救仙方卷之二
