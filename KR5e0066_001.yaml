front:
  text: 急救仙方卷之一
  hash: sha256:c3bb04bbd1e231202fa3ecd19cee12973abfce8d910e2045ea0d912b8f1b3069
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_HFL_001-001a, image: hfl/0821/0821-006.png}
body:
  text: 妊娠諸疾品术苓湯治婦人胎孕不安白术黃苓各等分右為粗末每服三錢水二盞當歸一根同煎至一盞稍溫服立效散治胎動不安如重物所墜冷如冰川芎當歸各等分右為粗末每服五錢水煎食前溫服或下血心腹痛酒水相半煎服保安散治妊娠因有所傷胎動疼不可忍及血崩不止連皮縮砂不以多少炒黑去皮右為細末溫酒調下覺腹中熱則胎巳安矣治妊娠胎動不安或腰痛胞轉搶心下血不止石菖蒲根搗汁三升飲之又方艾葉如雞子大以酒四升煮取二升分二服良又方檳榔一兩為末蔥白湯調下一錢七佳二黃散治有孕胎漏下血生地黃熟地黃各等分右為細末每服三錢煎白术枳殼調下立聖散治妊娠下血不止雞肝二具用好酒一升煮熟共酒食之大效枳苓散治胎漏下血或因事下血枳殼去穰半兩麩炒黃苓半兩白术二兩右為粗末每服五七錢水煎去滓食前服治妊娠誤有失墜或推築著疼痛難忍當歸一兩新青竹茹二合右以好酒二升煮十數沸分三服又方以川芎為末每服二錢溫酒調下治妊娠因頓跌胎動不安腰痛腹滿或有所下或胎上搶心熟地黃二兩白芍藥艾葉當歸甘草阿膠炒珠黃蓍川芎各一兩右㕮咀每服半兩薑三片棗一枚水煎服火龍散治妊娠心氣痛艾葉半兩鹽炒一半茴香半兩炒川練子半兩炒右為細末水煎食前服通氣散治妊娠腰痛狀不可忍此藥神妙破故紙不以多少瓦上炒香熟為末嚼胡桃肉一個空心溫酒調下三錢芎歸湯治妊娠胎動子死或不死川芎當歸各等分右㕮咀每服三五錢加紫蘇數葉酒水合煎服死者即下未死者即安黃連湯治妊娠兒在腹中啼黃連二錢生甘草一錢右濃煎汁令母呷之又方以多年空屋下鼠穴中土一塊令母噙之即止豬苓散治妊娠從腳上腫至腹小便微利微渴引飲豬苓五兩右為末以熟水服方寸七日三葶藶散治妊娠遍身洪腫葶藶二兩白术五兩白茯苓桑白皮郁李仁各二兩右為粗末水六升煮取二升分三服小便利即差又方澤瀉二兩葶藶二兩茯苓枳殼麩炒白术各六兩右為細切以水六升煮取二升分二服防已湯治妊娠脾虛遍身浮腫心腹脹滿喘促小便不利防已七錢半桑白皮赤茯苓紫蘇莖葉各一兩木香二錢半大便不通加枳殼檳榔右粗末每服四錢薑四片水同煎食前服當歸芍藥散治妊娠腹中絞痛心下急痛白芍藥四兩當歸茯苓各一兩澤瀉二兩川芎二兩甘草炙一兩右為細末每服三錢食前溫酒調服以蜜丸亦可人參散治妊娠霍亂吐瀉心煩腹痛人參一兩厚朴一兩薑製陳皮一兩當歸炒甘草半兩炙乾生薑一兩嘔逆不止加益智仁煨草豆寇右㕮咀每服四錢棗三個水煎服茯苓半夏湯治妊娠惡阻心中憒悶頭目眩暈四肢怠惰百節煩疼胸膈痰逆嘔吐惡心嫌聞食氣好酸醎多卧少起全不進食先服茯苓半夏湯次服茯苓丸半夏一兩二錢湯洗七次炒赤茯苓熟地黃各七錢半陳皮人參旋覆花芍藥川芎桔梗各半兩甘草半兩炒右為粗末每服五錢薑三片同煎食前熱服茯苓丸赤茯苓人參桂炒半夏湯洗炒陳皮乾薑炮各五錢白术葛根各一兩甘草一兩炙枳實二兩麩炒右為細末鍊蜜丸桐子大米飲下三五十丸食前竹瀝湯治妊娠恆若煩悶心膽怯此名子煩茯苓三兩竹瀝一升右以水四升煎取二升分三服不差再服又方茯苓四兩防風麥門冬去心黃苓各三兩人參一兩五錢右㕮咀每服四錢淡竹葉數片同煎服不得眠加酸棗仁紫蘇飲治妊娠胎上逼脹滿疼痛謂之子懸兼治臨産驚悸氣結連日不下紫蘇一兩當歸甘草各二錢半人參川芎大腹皮陳皮白芍藥各半兩右㕮咀每服半兩水一盞半薑四片蔥白七寸去滓空心溫服知母散治妊娠煩躁悶亂口乾及胎藏熱知母甘草麥門冬去心各半兩黃耆黃芩赤茯苓各七錢右㕮咀每服四錢竹茹一塊水煎服四肢壯熱加葛根柴胡治妊娠忽下黃汁如膠或如小豆汁苧根切二升右水四升煎取二升分二服每服入酒半升再煎服厚朴散治妊娠下利黃水不止厚朴三兩薑汁炙黃連二兩肉豆寇五個連皮右㕮咀用水二升煮取一升服治妊娠無故卒下血阿膠二兩重以蚌粉同炒珠搗為末生地黃半斤搗取汁右以清酒三升將二味攪勻溫過分三服治妊娠無故尿血龍骨一兩為末蒲黃五錢研勻右以酒調方寸七日三服治妊娠藏氣本虛脾胃久弱臍腹疼痛滑泄無度産後同厚朴二兩薑汁浸炒黃草豆寇一箇煨肉豆寇一箇麵裹煨右㕮咀每服三錢薑三片煎服大寧散治妊娠下利赤白及泄瀉疼痛垂死者黑豆三十粒甘草二寸半半生半熟鶯粟殼二十一生炒一右為粗末都作一服生薑三片同煎食前服神效治妊娠挾熱下痢黃連一兩黃柏一兩梔子仁十枚右㕮咀每服五錢水二盞浸三時久煮十沸去滓頓服嘔加生薑橘皮治妊娠下痢腹痛小便澀糯米一合當歸一兩炒黃耆一兩右細切和勻水二盞煮取一盞二分去滓分四服黃連散治妊娠下痢赤白膿血久不止黃連八錢厚朴薑製阿膠蚌粉炒當歸各六錢艾葉黃柏各四錢乾薑炮四錢右為細末空心米飲調下方寸七日三服治妊娠小便不禁桑螵蛸十二箇炙右為細末每服二錢空心米飲調下白薇散治妊娠遺尿不禁白薇白芍藥炒各等分右為末每服二錢食前溫酒調下茯苓散治妊娠小便不通赤茯苓黃葵子各等分右㕮咀每服五錢水二盞煎一盞溫服如不通恐是轉胞加髮灰少許調服極妙治妊娠患淋小便澀水道熱不通車前子一兩葵根五錢切右二味以水升半煎至一半空心溫服大腹皮散治妊娠大小便赤澀大腹皮枳殼去白麩炒甘草黃芩各一錢赤茯苓去皮二錢右㕮咀加蔥白水一盞煎七分空心溫服斬邪丹治婦人鬼胎如抱一甕吳茱萸川烏秦芃柴胡白殭蠶洗巴戟生用巴豆去殼不去油莞花醋煮各一兩右為末鍊蜜為丸如梧桐子大每服七丸蜜酒吞下取出惡物即愈桔梗散治妊娠肺壅及外傷風寒咳嗽喘急天門冬去心一兩貝母人參甘草桑白皮桔梗紫蘇各半兩赤茯苓一兩麻黃去節七錢右㕮咀每服四錢薑三片水煎服服藥忌食鯉魚紫苑湯治妊娠咳嗽不止胎不安紫苑天門冬各一兩桔梗半兩甘草桑白皮杏仁各二錢半防風半兩右㕮咀每服三錢竹茹一塊水煎去滓入蜜半匙再煎二沸溫服服藥忌食鯉魚人參橘皮湯治妊娠嘔吐痰水多是惡阻人參橘紅白术麥門冬去心各一兩甘草三錢厚朴薑製白茯苓各半兩右為粗末每服四錢入淡竹葉彈子大生薑三片水煎空心食前服加味四物湯治妊娠傷寒諸證熟地黃當歸川芎芍藥各等分右㕮咀每服四五錢水煎服若妊娠傷寒頭痛身熱無汗脈浮緊加麻黃細辛若妊娠傷寒中風表裏自汗頭痛項強身熱惡寒脈浮而弱加黃耆地骨皮右妊娠傷寒中風濕之氣肢節煩疼脈浮而熱頭痛加防風蒼术製若妊娠傷寒胸脅滿痛而脈弦加柴胡黃苓若妊娠傷寒大便硬小便赤氣滿而脈沈數加大黃生桃仁去皮尖麩炒若妊娠傷寒小便不利加茯苓澤瀉若妊娠傷寒小便赤如血狀者加琥珀茯苓若妊娠傷寒四肢拘急身涼微汗腹中痛脈沈而遲加附子炮去臍桂少用若妊娠傷寒畜血證加生地黃酒浸大黃若妊娠傷寒身熱大渴蒸又而熱脈長而大者加石膏知母若妊娠傷寒下後過解而不愈溫毒發班如錦紋加升麻連翹若妊娠傷寒下後咳嗽不止者加人參五味子若妊娠傷寒下後虛痞腹滿加厚朴薑製枳實麩炒若妊娠傷寒下後不得眠者加梔子黃芩若妊娠傷寒汗後血漏不止胎氣損者加阿膠炙甘草黃耆若妊娠脈浮頭腫自利腹中疼痛去地黃加桂枝炒若妊娠傷寒自利腹中痛飲食不下脈沉者去地黃川芎加白术炙甘草茯苓加黃耆護胎法治妊娠傷寒白藥子不拘多少為末用雞子清調攤於紙花上可捥來大貼在臍下胎存處乾則以溫水調之又方以竈心土水調塗臍下乾又塗之又調服彈子大佳又方壯熱甚則以井底泥敷心下令胎不傷白术散治妊娠傷寒煩熱頭痛胎氣不安或時吐逆不下食白术橘紅人參前胡川芎麥門冬去心赤茯苓各一兩半夏湯洗炒甘草各半兩右每服四錢薑四片竹茹二錢半水煎服升麻散治妊娠傷寒頭痛身體壯熱升麻蒼术炒麥門冬去心麻黃去節石膏各一兩黃芩知母各五錢右每服四錢薑四片淡竹葉十四片水煎服柴胡散治妊娠傷寒頭痛項強身熱口乾胸脅疼柴胡前胡川芎當歸人參芍藥甘草生地黃各等分右為細末每服四錢薑三片棗三枚蔥白三根水煎出汗秦芃散治妊娠傷寒五六日不得汗口乾多喫水狂語嘔逆秦芃柴胡各一兩石膏二兩前胡赤茯苓甘節葛根犀角屑升麻黃苓各半兩右每服四錢薑四片竹茹三錢水煎防風葛根湯治妊娠中風腰背強直時復反張防風葛根川芎生地黃各二兩杏仁製一兩半麻黃去節一兩半桂心炒獨活甘草防己各一兩右㕮咀每服四錢水煎治妊娠中風角弓反張口噤語澀謂之風痙亦名子癎麻黃去節防風獨活各一兩桂心炒升麻甘草羚羊角犀酸棗仁秦芃各半兩川芎當歸杏仁製各七錢右㕮咀每服四錢薑四片竹瀝一合水煎服治妊娠臨月因發風痙忽悶憒不識人吐逆眩倒名子癎葛根貝母去心牡丹皮防巳防風當歸川芎甘草澤瀉白茯苓桂心炒各二兩獨活石膏人參各三兩右㕮咀以水九升煮取三升分二服貝母令人易産若未臨月以升麻代之柴胡散治妊娠瘧疾柴胡生大黃各二錢黃芩一錢半甘草一錢右㕮咀作一服水煎臨發日五更溫服必取利為愈如胎上逼心可服枳殼散忌油麵辛熱等物又方大黃二兩柴胡一兩半黃芩芍藥各一兩右為細末清水糊為丸如桐子大每服百丸臨發日五更冷湯吞下隔兩時再服五十丸以利為度治妊娠瘧疾發熱口乾渴飲無度者生地黃一兩半黃芩麥門冬去心人參知母各一兩石膏二兩甘草半兩乾葛一兩右㕮咀每服五錢入烏梅半箇煎服治妊娠瘧疾得效方常山石膏各一兩甘草炙黃芩各半兩烏梅七箇右細切以酒水各一碗浸一宿平旦煎至一碗去滓分二服臨發日驗胎方治婦人經脈不行巳經三月者川芎不見火右為細末空心濃煎艾湯調下方寸七覺腹內微動則有胎也急救仙方卷之一
