front:
  text: 急救仙方卷之十一惻十一
  hash: sha256:bf5811bfce86b2e59fabdea6c5e6fb3409b9ce40be7af7697ef59ab7efe218ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_HFL_011-001a, image: hfl/0822/0822-148.png}
body:
  text: 上清紫庭追癆仙方品麝香散治男子婦人傳屍骨蒸食熱五癆天靈盖麝香各一分柴胡一兩犀角屑半兩阿膠東引桃枝青蒿東引柳枝石榴皮四味各一握甘草三寸患人中指長男左女右薤白葱白各七寸右件爲末用童便二升半浸藥一宿明日早晚煎至升半去渣服之若男子病女人煎女病男煎忌猫雞犬驢馬僧尼孕婦生人孝子並不令見之煎成飲後分爲三服入檳榔末三錢温服初服約人行三五里遠便再進一服慮有惡心以白梅與他含止之服三五服病止即瀉出異物若蟲如頭髮馬尾身赤口黑身上如蟻行不可名狀瀉後葱粥飲補之同時藥煎𥙷五臟伏神散忌風一月忌食油膩濕麵鹹味并牛猪雞鴨犬等物服此藥無不當日差凢天下治勞服之亦須累日及年猶未全去病源者不似此方至遠年重病不過兩劑如病未多即一劑飲子便當服此伏神散不問遠年近日取效下蟲紅色便可治肚下黑差成否肚下白色是食髓也萬不一瘥補方服茯神散白茯神茯苓人參遠志去心龍骨肉桂甘草陳皮炒各一兩當歸五味子各一兩半黄耆二兩大棗五十六箇右件爲散分作八服細末每服入棗七箇生姜二錢用水一升半煎至一升趂前藥後喫亦空心服神效此是神人所授靈妙秘方此方前後活數百人也神效散治諸傳屍癆氣殺蟲此方得之于河源郡王府濟世極多功不可量川椒二斤擇去子合口者炒出汗右爲末每服二錢空心米湯調下或酒糊丸如梧桐子大每服三五十粒神仙秘方取癆蟲青桑皮楊柳枝梅枝石榴枝一方無此味桃枝正東引者各七莖四寸許葱白七莖阿魏一錢别硏安息香真者一分并去石青蒿一握如無以子代之右八味除魏香外餘用童子便一升半煮藥煎及一半去滓將藥汁化魏香再煎十數沸去滓候温分作二次調服辰砂研末檳榔研末各半錢麝香少許另硏右研極細末分爲二服五更初一服三點時一服至巳暖必取下蟲紅者可救青者不治但有所下即用熱油煎殺即進飲粥飯温暖相息不用性及食生冷毒物仍先服紙丸子法見後合此藥時須擇良日焚香祝告天地令病人設榻於福德方服即有神效不可令病人先知氣味亦不得令猫犬孝服穢惡婦人等見之金明散𥙷肝臟勞極人參知母茯苓丁香秦芃去蘆甘草炙石膏煆各等分右件爲細末每服二錢水一盞葱白三寸同煎至八分通口服守靈散補心臟勞極白茯苓丁香訶子各一兩桔梗芍藥羌活甘草炙各一分右件爲細末每服二錢水一盞入銀耳環一隻葱白三寸同煎至八分通口服䰟停散𥙷脾臟勞極白藥子桔梗人參訶子皮茯苓甘草炙丁香各一錢右件爲細末每服二錢水一盞入蜜一匙同煎至八分通口服虚成散𥙷肺臟勞極枳實去瓤皮心秦芃去皮心白茯苓芍藥麻黄去節玄胡索當歸洗淨茴香炒各半兩甘草炙一分右件爲極細末每服二錢水一盞銀耳環一對蜜五點同煎至八分通口服育嬰散𥙷腎臟虚勞香附子炒黑附子炮一隻木香白蒺藜去角各一分白茯苓半兩甘草炙一錢右件爲細末每服二錢水一盞姜七片葱白同煎至七分空心服龍膽丸治積熱癆瘦不食壓熱壅消瘡腫解肌骨散解毒滯草龍胆柴胡地骨皮黄芩一方不用此味加茯苓鼈甲醋炙各一兩桃仁去皮尖山梔子陳皮當歸大黄甘草炙各半兩右爲細末鍊蜜爲丸梧桐子大每服二十丸空心用温熱水吞下如小兒加减丸數無比丸治傳屍癆服至一月愈其餘勞瘦之疾數服取效紫河車二兩煮醋浸一宿焙乾爲末芍藥鼈甲半兩醋炙桔梗胡黄連大黄炮甘草炙草龍膽苦參黄藥子知母貝母去心秋石研䜴心火段莪术磫硝犀角屑各二分一云無此味右件爲細末鍊蜜爲丸如梧桐子大每服二十丸温酒吞下如腸蟲熱食前服膈上熱食後服奪命散鼈甲醋炙天靈盖醋浸一宿酥塗炙黄柴胡去蘆青蒿知母各兩甘草人參各半兩阿魏四棗子大葱白一握桃仁二十一箇去皮尖麩炒右以天靈盖鼈甲爲末次下人參知母柴胡甘草又同搗次下葱白青蒿桃仁阿魏杵成餅子慢火焙乾爲末稱二錢用童子小便二盞煎至一盞去滓露星斗下一宿至五更三點暖服半盞服了衣被盖卧天明又煖半盞扶行病人服强行五七步三日更不得洗手面指頭候生毛爲驗每日早晨先吃白湯投之天竺黄飲子天竺黄麥門冬去心各一兩人參茯苓甘草茯神生地黄乾遠志去心防風龍骨各半兩玄胡索七枚大腹子十一箇犀角另右㕮咀爲末用水二升半煎至一升分作三服温服忌一切毒物如治乆卧床枕此藥先看十指毛色如藕白者可治紫黑色者難治麝香散治婦人室女一切蓄熱腹内悶著骨蒸室女經脉不行痩勞肌熱威靈仙四兩細末雄黄麝香各一分二味另硏乾漆一兩碎炒令煙盡右件爲末再研每服一大錢水八分盞煎至六分空心和渣温服當有惡穢毒物下並是病根此藥頗難服可以蒸餅糊爲丸如梧桐子大每服十五丸至二十丸茶湯任下次服桃仁散桃仁散桃仁湯泡去皮尖麵炒令黄赤茯苓各一兩去皮芍藥人參各三錢檳榔四箇陳皮三分去白犀角安息香各一分麝香二錢右爲細末研匀每服二錢姜五片水一盞煎至六分早晚食前服若取下其蟲頭赤便服天竺黄飲子𥙷護心臟未取下蟲亦須先服之護心柴胡散治童稚骨蒸熱葱解傷寒後肌熱柴胡川大黄乾漆炒秦芁甘草常山各一兩鼈甲三兩醋炙右㕮咀每服一錢用水一盞入小麥一撮同煎七分冷服取蟲藥取啄木禽一隻朱砂四兩精猪肉四兩餵木禽一晝夜飢甚將朱砂作菉豆大相和在切碎肉片子肉若無啄木禽晝將繫禽用塩泥固濟入禽在内用剛火煆一夜來日不見太陽取出不得打破同固濟塩泥入地埋二尺許一書夜取出銀器内研作細末以無灰酒作一服調下入麝少許在藥内同調置病人在帳中四下緊閉用鐵鉗候病人口中蟲出即鉗之於沸油中煎殺可預置烈火沸油於病人左右如蟲出後便令煎嘉禾散與病人服進粥又煎藥悉如前夜服呪云唵嗚吽吽吒釣蟲丸磁石一兩半有墻者緊研爲末龍骨半兩𥐻砂一兩研麝香一錢膩粉半兩另研右用蠟爲丸如小嬰桃大每服一丸以藥上針穿一小竅子以青紅綫貫之梢頭繫一大古錢早晨令病人向破方正坐用温水吞下候藥下咽喉中合口以牙咬定古錢等候惡心便吐出其蟲狀不一急以熱油煎殺如不吐出蟲只吐得血絲子或涎一二合皆是安證更服尋常和氣理中諸藥三兩日决取痊瘥其治過藥可用温水浴過更可醫一二人若是傳屍癆一丸可活兩人釣蟲神功奪命散母丁香一錢半酒蠟半兩鼈甲一帖和殻水磨硫黄二錢石燕一箇火煆醋淬七次右爲細末用蠟爲丸如菉豆大每用一丸裝鈎子上繫緋綫一條長一丈二尺用雪膏少許圓藥丸以蠶蠒一截穿於綫上蓋之令病人先吃膏後一口同藥吞下良久綫動用力拽出有蟲用沸油煎殺此藥於端午日日未出時修合先服紙丸次同神仙秘法服服紙丸子法凢醫傳屍先當齋戒志心對聖焚香服紙丸子用雞子清塗紙上令乾剪作錢樣大丸服之然後服前件丸散通神散治屍癆附子一箇大黄一兩牛黄二字右件爲末加桃柳枝青蒿各七握剉碎用童子小便半椀浸一宿來日五更初煎數十沸濾滓調散子一半喫服了以衣被盖便睡取下惡物自住不用利下時用盆子盛看何物在其中蟲類有四一頭如馬尾二似亂髮三似蜈蚣四如雞子或破綿絮後要有一人來别此忌硬物茶炙煿鳴蟹血生冷油膩醃蔵等物後服藥甘草黄連當歸木香各半兩右將酒二升甆器内煎取五合傾出煎四味熬看軟硬和丸如梧桐子大空心晚後酒或塩湯下三十丸紫河車丹治飛屍鬼疰虚勞羸瘦喘嗽氣其法取男子首經兒先以皂水洗淨次以銚子内用米醋堞洗控乾將一小小焙籠以低周圍密糊不令失火氣或無小焙籠只用小籃子去繫蜜糊安紫河車於上用烈火焙更將參子盖之焙令極乾約只有十二三文重候極乾至乾了更入後藥人參一兩半木香半兩白术炒白茯苓茯神當歸熟地黄各一兩乳香别研没藥各四錢朱砂二錢别研麝香二錢右件爲細末用諸藥和匀紅酒糊爲丸如梧子大每服五十丸煎人參湯下空心日午四服鍊蜜丸亦得明目丹又傳追下屍蟲治傳屍癆白兔糞中秋夜取四十丸立野中者佳𥐻砂右研爲細末鍊蜜丸梧子大每服七丸用甘草半兩生搥碎以水一盞揉取濃汁若患人瘦弱即炙過甘草五更空心服預戒患人不得心燥冷服不妨小瘥兩日再服下蟲爲準須上旬服青蒿飲治癆疾青蒿赤根者取子一升葉五兩隂乾桃枝三兩嫩者柴胡甘草各一兩柳枝三兩嫩者地骨皮二兩梔子仁一兩量患人虚實用右㕮咀每服三錢水一盞烏梅兩箇煎至七分温服不拘時柴胡散𥙷虚勞柴胡人參白茯苓桔梗芍藥青皮去白川當歸酒浸一宿麥門冬去心川芎升麻桒白皮白术米泔浸一宿甘草各一兩右件爲細末每服二錢水一盞煎至七分通口服鼈甲煎補虚勞鼈甲一枚醋炙令黄柴胡去蘆川當歸甘草炙桔梗赤芍人參各一兩麝香半錢杏仁去皮尖炒胡黄連地骨皮宣連各一錢木香半兩真酥白沙蜜各三兩官桂半兩去粗皮不見火右件爲細末用青蒿一斤童便五升熬青篙汁約二升濾去滓入酥蜜再熬成膏疾冷入藥末搜和爲丸如梧子大每服十五丸温酒下米飲亦可日進三服如秋冬時更入桃柳心七箇與前柴胡散同煎服貫衆丸去三屍五蟲貫衆五分殺伏屍白萑蘆三分殺虫蜀漆三分殺白蟲厚朴三分殺肺蟲狼牙子四分殺胃蟲殭蠶四分殺膈蟲雷丸六分殺赤蟲雄黄三分殺屍蟲蕪荑五分殺差蟲右揀凈焙乾炒令黄色搗爲細末鍊蜜爲丸如梧子大川水下五丸三服可漸加至十丸二十丸服之二十日百病皆愈三屍九蟲自滅服者須齋戒恭敬婦人絶孕服之有子桂心丸神仙去三屍九蟲熟地黄三兩乾漆半兩炒桂心一兩右爲細末鍊蜜爲丸如梧子大每服七丸米飲送下雄黄丸又去三屍九蟲雄黄研松脂各一兩研右溶脂爲丸如蓮子大平旦吞一丸服七日三屍盡去輕骨散治勞嗽烏梅龍膽草胡黄連貝母知母鼈甲醋炙桔梗秦芁柴胡甘草炙山梔子去皮人參青篙酒煮阿膠炒杏仁去皮尖麩炒右件晒乾爲末用好京墨一寸以井花水磨調前藥末作餅子如大指頭大透風處窨乾二七日方用每服一餅井水磨化又用没藥五十磨成一盞於五更又用黄皮末二錢同煎數沸却入盞内頻頻打轉通口於五更時輕輕起吃纔服了便睡令病人仰卧甚者不過三服蛤蚧散又治勞瘦白茯苓一兩去烏皮入銚内慢火炒令燥便住桑白皮二兩用酥醋刷炙五次令黄色紫色杏仁六兩湯泡去皮尖雙仁者以紙簟入鐺内炒令乾入臼内搗爲粉用皮紙角出油盡爲度知母用酥醋涮炒令黄熟蛤蚧雌雄一對入酥醋内浸透慢火炙乾再用酥醋刷炙五七次令黄熟不得燒損無力了貝母二兩用酥醋刷炙令黄色三五次甘草三兩捶碎用醋酥須刷炙三五次令紫黄人參一兩大者用酥醋刷炙三五次令黄熟乳酥真好者四十文切作骰子大塊入銚内溶成汁入陳米醋極酸者半升已下和匀同刷炙前藥醋不宜多用只以四合多爲的庶好刷用否則稀炙右件爲末每服二大錢水一盞煎七分服忌油膩冷毒物如久患嗽者初服此藥必服鬪嗽加甚須勤服乆則可安須自保惜爲妙治勞熱止損止嗽蛤蚧一對洗淨酒醋浸炙黄芩半兩胡黄連秦芁甘草生地黄熟地黄青蒿人參炒柴胡麻黄知母貝母杏仁去皮尖雙仁取梢各半兩鼈甲一兩酒醋炙桔梗龍膽草木香各一錢右件爲細末用烏梅姜棗煎服治虚勞方杏仁一斤右用生姜六兩剉碎嗽者加人參四兩剉碎同置於新沙鍋内用無根河水一斗燒木炭文武火熬水盡爲度去生姜參滓放冷每服五七箇杏仁頻頻服之治傳屍勞瘵方右童子便一盞無灰酒一盞以新甆瓶貯之取全猪腰子一對於内密封泥日晚時以慢火養熟至中夜止待五更初更以火温之發瓶飲酒食腰子病篤者只一月效平日瘦怯者亦可服此盖以血養血絶勝金石草木之藥也又方以獺肝一具隂乾杵末方寸七日三服有效又方以赤兒俗名王瓜焙乾爲末温酒調服即有效黄帝灸二十一種癆圖并序夫人含靈受氣禀於五常攝之乖理降之大疾至若岐黄廣記抑有六舊經法單行顯靈斯術骨蒸病者亦名傳尸亦名殗殢亦名伏連亦名無辜丈夫以元氣爲根本婦人以血海爲根源其病狀也髮乾而短或聚或分或腹中有塊或腦門結核或卧盗汗夢見鬼交雖目視分明而四肢無力上氣食少漸至沉羸終延歲月遂至殞滅余昔忝任洛州司馬三十日灸活一十三人前後差者數通二百里至於狸骨獺肝徒聞曩說金牙銅鼻罕見其能未如此方扶危救急非止單攻骨蒸兼亦療風或瘴或勞或邪或僻患狀旣廣灸愈亦多不可具録聊述大概又恐傳說訛謬以誤將來今具圖形庶令覽者易於悉使所在流傳頗用家蔵不暇明醫旁求立業返魂還魄何難之有遇斯疾者可不謹歟肺俞二穴在第三椎下兩傍相去一寸半是穴理顛癎嬰氣上氣吐逆返滿脊强寒熱不食内痛皮癢傳屍骨蒸肺嗽針三分留七分呼得氣即灸三壯厥陰二穴在第四椎下兩傍相去一寸半是穴理遂氣吐嘔心痛攣結胷中煩悶針入三分留七分得氣可灸三壯心俞穴在第五椎下兩傍各一寸半是穴理心中風狂癎氣亂語悲啼心腹坎滿汗不出結積寒奶嘔逆不食食物即吐咳腫目痛不灸通針三分留七分呼得氣即瀉灸三壯肝俞穴在第九椎下兩傍各一寸是穴理口乾中風肢滿短氣不食食物不消吐血目不明關塞胷痛肩疼寒疝針入三分留七分呼得氣灸三壯脾俞二穴在第十一椎下兩傍各一寸半是穴理腰身脹滿腹肚泄瀉痢身重四肢不收黄疸邪氣積聚腹痛寒熱針入三分留七分呼氣灸三壯腎俞二穴在第十四椎下兩傍各一寸半上一膈對是穴理虚勞耳聾腎虚水狀脹攣急腰痛小便濁膈中疼溺血精出五勞七傷冷嘔脚膝酸疼拘急好獨卧身腫如水針入三分留七分呼氣可灸三壯大杼二穴在第一椎膈俞二穴在第七椎膽俞二穴在十一椎三焦二俞二穴在十三椎胃俞二穴在十三椎旋俞二穴在第二十椎仍引灸四花膏盲爲妙師令患人平身正直立以細繩子一條令脚底竪踏男左女右其頭上大姆指湍高順脚踵引直上至曲䐐中大横文處截斷患人取穴去處一依銅人又令患人平坐解髮分開兩邊從髮路沿項直下至脊繩子頭椎骨上以骨點記之患人亦依銅人坐也又取繩子中鈎起至鼻住按定截口吻兩頭了却將此量取穴法口繩子於點記處平摺拖兩頭勿令少有偏邪直要端正兩頭記處是穴中心於點處非穴莫灸又法令患人平身正坐稍縮膊取小繩子一條拖其兩垂向前繩兩頭高至鳩尾穴穴在心上頗骨下也便截斷却翻繩子向背拖繩停心於喉結骨上其繩兩頭雙垂當脊上中繩子頭便點記又法取一繩令患人平坐合口横量準前取繩子兩頭是灸穴此通前四穴各灸七壯至二十一壯須加至百五十壯仍停候瘡欲發又將先量口繩子於前脊椎上垂繩子點處停心竪量以繩子兩頭是穴點記灸之如前法此名四花穴須是離日灸之用三月三日採艾極妙灸疾若了於百日内却愼飲食房室且安心靜眠如一月覺未全安常如初法於舊穴上再灸之永除害也灸後仍服藥製方在後余切讀老叟自序論傳屍之候巳詳如灸心俞穴中取蟲㨿銅人經云則不可用正如此高高嗣照世稱良醫雖取穴針灸上古治法不同豈神聖之功殆不可云一法當於癸亥日夜二更時六神皆聚之時解去下體衣服直身平立用筆於其腰上兩傍微陷處點定鍼家謂之腰眼然後上床合面而卧每灼小艾炷七壯兩腰眼共一十四壯勞蟲或吐出或瀉下即可平安斷根更不傳染灸後服藥生地黄汁青蒿汁薄苛汁童便好酒右各二升同煎成膏入柴胡去蘆鼈甲醋炙秦芁各一兩麝另研硃砂各半兩右五味爲細末入前膏爲丸如梧桐子大每服十五丸至二十丸温酒下忌生冷毒物又取蟲方凡取癆蟲可於三節骨上一穴膏肓二穴每穴灸七壯然後喫飲食調理方下藥取蟲其蟲或如亂絲或如紅綫者是也春用雄黄硫黄巴豆一粒出油豆豉七粒右同前藥共和研爲丸如梧子大次用童子不喫飯的小便一合酒一盞下夏用蘆伏子鶴虱硫黄巴豆一粒去油豆豉七粒右同前藥丸如前湯使下秋用錫灰雄雌二黄菉豆粉豆豉七粒巴豆一粒去油右同藥爲丸用前湯使下冬用雄雌二黄錫灰巴豆去油豆䜴七粒右爲丸同前湯使下淨明法中治勞瘵方度師玉真先生傳其方須先鍊度如法次以南木香五錢重切碎用新潔瓦器慢火煎出濃汁分作二處留出木香渣將在一處調朱砂書符用一處調青蒿用青蒿九斤重切碎用新潔鐵鍋水煎一日去渣取濃汁入前木香渣再煎去渣以前木香濃汁一處慢火熬成膏朱砂五錢重爲細末用前一處木香汁調書五炁符及鍊度中五炁符燒化入木香汁内就用此化開青蒿膏子與患人服切戒勿令患者知之務在志誠而爲也仍忌一切外人畜類等見之無不神效此方行是法者用之尤爲妙也急救仙方卷之十一
