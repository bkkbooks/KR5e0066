front:
  text: 急救仙方卷之十惻十
  hash: sha256:6d03cc7ffbdd209474f3124a0930f8a830e7770986cadd6d83d51343f4f0b3da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_HFL_010-001a, image: hfl/0822/0822-110.png}
body:
  text: 上清紫庭追癆仙方論法老叟自序傳世已久罔知姓名惟存此文不敢妄加其字以俟知者吾自處世以來精研藥術急救濟危針灸明堂無不詳覽尋文檢籍洞視五臟之盛衰緬懷古人世莫能究至如晋景公何為而死虢太子何為而生吾思刮骨續筋開腸取病惟有傳尸之病最為難測雖是患起一身變動萬種矣為醫者能明脉候察病根本如此治療固不為難若差毫釐則失千里夫傳尸癆者皆因三尸鬼疰九蟲傳灾具載其原以開未悟總論傳癆傳尸癆瘵皆心受病氣結血凝故有成蟲者蓋由飲食酒色憂思喪真遂至於此凡蟲為蠱以血凝而氣養之氣血在胞即為正氣氣中即為瘕塊凝在心部即為蟲悉由不正其心憂思業緣所致三尸九蟲之為害治者不可不知其詳九蟲之內而六蟲傳於六代三蟲不傳者蝟蛔寸白也六蟲之內或藏種毒而生或親屬習染而傳疾之初覺精神恍惚氣候不調切在戒忌酒色調節飲食如或不然五心煩燥心腎夜汗心乃忪悸如此十日頓成骨瘦面黃光潤此其證也妄信邪師祈穰求福庸醫用藥延蔓歲時方知病重苟非警戒禍福反掌此人死後兄弟子孫骨肉親屬綿綿相傳以至滅族大抵六蟲一旬之中遍行四穴周而復始病經遇木氣而生立春一日後方食起三日一食五日一退方其作苦百體有痛蟲之食也退即還穴醉睡一醉五日其病乍靜俟其退醉之時方可投符用藥不然蟲熟於符藥之後不能治也一蟲在身中游十二穴六蟲共占七十二穴一月之中上十日蟲頭向上從心至頭游四穴中十日蟲頭向內從心至臍游四穴下十日蟲頭向下從臍至足遊四穴若投符用藥可知如紫蠶苗在汗中蓋蟲性巳通靈切在精審其或取蟲不補即學淺妄行徒費資財終無去病之理可不悲哉師曰治傳尸癆者先須知正氣與毒氣並行故臟腑有凝即成蟲狀遇陽日長雄隂日長雌其食先臟腑脂膏故其色白五臟六腑一經食損即皮聚毛脫婦人即月信不行血脉皆損不能榮五臟六腑也七十日後食人血肉盡故其蟲黃赤損於肌肉故變瘦劣飲食不能為膚筯緩不能收持一百二十日外肉血食盡故其蟲紫即食精髓傳於腎中食精故其蟲色黑食髓即骨痿不能起於床枕諸蟲久即生毛毛色雜花鍾孕五臟五行之氣傳之三人即自能飛其狀如禽亦多品類傳入腎經不可救治法之所載者能利後其蟲色白可三十日服藥補其蟲黃赤可六十日服藥𥙷其蟲紫黑此疾巳極可百二十日服藥𥙷又云蟲頭赤者食患人肉可治頭口白者食患人髓其病難治只宜斷後故經曰六十日者十得七八八十日內治者十得三四過此以往未知生全但可為子孫除害耳今以六代所傳蟲狀病證詳著于後第一代蟲狀病證遊食日治法為初癆病謂初受其疾不測病源酒食加餐漸覺羸瘦治療蹉跎乃成重病醫人不詳其故誤藥多死此蟲形如嬰此蟲形如兒背上毛長鬼狀變動三寸在人身在人臟腑中中此蟲如蝦養變動在人臟腑中巳上諸蟲在人身中榮著之後或大或小令人夢寐顛倒魂魄飛揚精神離散飲食不减形容漸羸四肢酸疼百節勞倦增寒壯熱背膊拘急頭腦疼痛口苦舌乾面無顔色鼻流清涕虛汗常多行步艱辛眼睛多痛其蟲遇丙丁日食起醉歸心俞穴中四穴輪轉周而復始俟蟲太醉方可醫灸取出蟲後用藥補心守靈散第二代為覺癆病謂傳受此病巳覺病者患人乃自知夜夢不祥與亡人為伴侣醒後全無情思昏沉似醉神識不安所食味輒成患害或氣痰發動風毒所加四體不和心胸滿悶日漸羸瘦骨節枯乾或嘔酸水或是醋心唇焦口苦鼻塞胸痛背膊酸疼虛汗常出腰膝刺痛如此疾狀早須醫治過時難療致傷性命此蟲形如亂此蟲形如絲長三寸許蝦蟹在人在人臟腑中臟腑中此蟲形如蜈蚣或似手弓在人臟腑中巳上諸蟲在人身中令人氣喘唇口多乾咳嗽增寒心煩壅滿毛髮焦落氣脹吞酸津液漸衰次多虛渴鼻流清水四肢將虛臉赤面黃皮膚枯瘦腰膝無力背脊酸疼吐血唾膿語言不利鼻塞頭痛胸膈多痰重者心悶吐血僵仆在地不能自知其蟲遇庚辛日食起醉歸肺俞穴中四穴輪轉周而復始俟蟲大醉方可治醫取出其蟲補肺則差虛成第三代為傳尸癆病謂傳受病人自尋得知之日漸消瘦頓改顔容日日恓惶夜夜憂死不遇良醫就死伊邇此蟲形如此蟲形如𧏙蚊蟻俱遊螂大如碎血臟腑中片在五臟中此蟲形如刺猬在人腹中巳上諸蟲在人身中令人三焦多昏日常思睡嘔吐苦汁或吐清水或甘或苦粘涎常壅腹脹虛鳴卧後多驚口鼻生瘡唇黑面青日漸消瘦精神恍惚魂魄飛揚飲食不消氣咽聲乾目多昏泪其蟲遇庚寅日食起醉歸厥隂穴中四穴輪轉周而復始俟蟲大醉方可治取蟲後𥙷氣多差第四代此蟲形如此蟲形如亂絲在人豬肺在人腹臟中腹中此蟲形如蛇虺在人五臟中巳上諸蟲在人身中令人臟腑虛鳴嘔逆傷中痃癖氣塊增寒壯熱肚大筋生腰背疼痛或虛或瘦瀉利無時行履困重四肢憔悴上急氣喘口苦舌乾飲食及水過多要吃酸醎之物其蟲遇戊己日食起醉歸脾俞穴中四肢輪轉周而復始俟蟲大醉方可冶取出蟲後補脾為瘥魂停第五代此蟲形如鼠此蟲形如似小瓶渾無有頭無足表裏背面有足無頭此蟲變動形如精血斤在於陽宮巳上諸蟲入肝經而歸腎得血而變更也令人多怒氣逆筋骨拳攣四肢解散唇黑面青增寒壯熱腰背疼痛起坐無力頭如斧斫眼睛時痛翳膜多泪背膊刺痛力乏虛羸手足乾枯卧著床枕不能起止有似風中肢體頑麻腹內多痛眼見黑花忽然倒地不省人事夢寐不祥覺來遍體虛汗或有面色紅潤如平時者或有通靈而言未來事者其蟲遇癸未日食起醉歸肝俞穴中四穴輪轉周而復始俟蟲大醉方可醫救取蟲出後補肝乃得瘥金明第六代此代蟲有翅足全者千里傳産所謂飛尸不以常法治也此蟲形如馬此蟲形如尾有兩條一龜鱉在人雌一雄五臟中此蟲形如爛面或長或短或如飛禽巳上諸蟲在人身中居於腎臟透連脊骨令人思食百物要吃身體尪羸腰膝無力髓寒骨熱四體乾枯眼見火生或多黑暗耳內虛鳴隂汗燥癢冷汗如油夢多鬼交小便黃赤醒後昏沉臍下結硬或奔心胸看物如艷心腹悶亂骨節疼痛食物進退有時喘嗽其蟲遇丑亥日食起醉歸腎俞穴中四穴輪轉周而復始俟蟲大醉可醫治取蟲後補腎填精瘥育嬰散蘇遊論論曰大抵傳尸之候在心胸脅滿悶背膊煩痛兩目不明四肢無力雖欲寢卧睡常不寐脊膂急痛腰膝酸疼多卧少起狀如佯病每至早旦精神尚存有如無病日午之後四體微熱面無顔色喜見人過常懷忿怒才不稱意即多嗔恚行立腳弱夜卧盜汗夢與鬼交或見先亡或多驚怖有時氣息有時咳嗽雖思飲食不能多餐死在須臾精神尚好或時微利兩脅虛脹口燥鼻乾常多粘唾有時唇赤有時欲睡漸就沉羸猶如涸魚不覺死也又曰傳尸之候本起無端莫問老少男女皆有此疾大抵五行相剋而生穴內傳毒氣周遍五臟漸熟羸瘦以至于死死訖又傳家親一人故曰傳尸亦名傳疰以其初傳半卧半起號曰殖殜氣息嗽者名曰肺痿痎骨體身中熱稱為骨蒸內傳五臟名曰復連不解療者乃至滅門假如男女虛損得之名曰勞極吳楚乃名淋瀝巴蜀亦名勞極其源先從腎起初受之氣兩脛酸疼腰背拘急行立腳弱飲食咸少兩耳颼颼真似風聲夜卧遺泄陰汗痿弱腎既受訖次傳於心心初受氣夜卧心驚或多恐悸心懸之氣吸吸欲盡夢見傳於先亡有時盜汗飲食無味口內生瘡心氣煩熱惟欲眠卧朝輕夕重兩頰口唇悉皆紋赤如傅胭脂又時手足五心煩熱心受巳次傳於肺肺初受氣咳嗽氣力微痛有時喘氣卧即便甚鼻口乾燥不聞香臭如或忽聞惟覺枯腐物氣有時惡心憒憒欲吐肌膚枯燥時或疼痛或似蟲行乾皮細起狀若麩片肺既受已次傳於肝肝初受氣兩目胱胱面無血色尚欲顰眉眼視不遠目常乾澀又時赤痛或復睛黃朝昏懵驀常欲合眼及時睡卧常睡不著肝既受已次傳於脾脾初受氣兩肋虛脹食不消化又時瀉利水穀生蟲有時肚痛腹脹雷鳴唇口焦乾或生瘡腫毛髮乾聳無有光潤或時上氣撑肩喘息痢赤黑汁見此證者乃不治也夫骨蒸殗殜復連尸疰癆疰蟲疰毒疰熱疰冷疰食疰鬼疰等皆曰傳尸者以疰者注也病自上注也與人相似故曰疰其變有二十二種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺精白濁髮乾而聳或腹內有塊或腦後兩邊有小結復連數箇或聚或散沈沈默默咳嗽痰涎或咯膿血如肺痿肺癰狀或復下痢羸瘦困乏不自勝持積月纍年以至于死死復傳疰易傳親人乃至滅門者是也更有蜚蟲遁尸寒尸喪尸尸疰等謂之五尸及大小附疰等證不的知其所苦無處不惡乃挾諸鬼邪而害人其證多端傳變推遷難以推測故自古及今愈此病者十不一得所謂狸骨獺肝天靈蓋銅鎖鼻徒有其說未嘗取效惟膏盲俞崔氏穴法若聞早灸之可否幾半晚亦不濟也癆瘵諸證病者增寒壯熱自汗面白目乾口苦精神不守恐畏不能獨卧其傳在肝病者寒熱面黑鼻燥忽忽喜忘大便苦難或復清瀉口瘡其傳在心病者增寒發熱面青唇黃舌舉强不能飲食無味四肢羸瘦口吐涎沫其傳在脾病者增寒發熱面赤鼻乾口燥毛折咯嗽喘急時吐白涎或有血線其傳在肺病者增寒增熱面黃耳輪焦枯胻骨損痛小便血濁遺瀝其傳在腎所謂癆蒸者二十四種隨證皆可考若眉毛折髮焦肌膚甲錯其蒸在脾外人覺熱自返思寒身振鵬劇其蒸在肉髮焦鼻衄或復尿血其蒸在血方熱煩燥痛如刺針其蒸在脉爪甲焦枯目昏兩脅急痛其蒸在筋版杼齒黑痛燥大杼醉痛其蒸在骨背膂疼痛胻骨酸其蒸在腦男子失精女人自淫其蒸在玉房乍寒乍熱中腕目腫中煩悶其蒸在三焦小便黃赤凝濁如膏其蒸在膀胱傳道不均或泄或祕腹中雷鳴其蒸在小腸大腹隱隱右鼻乾疼其蒸在大腸口鼻乾燥腹脹睡卧不安自汗涌出其蒸在胃口苦耳聾脅下疼痛其蒸在膽裏急後重肛門祕塞其蒸在回腸小腹痛筋脉緩縱隂器自强其蒸在宗筋眼昏淚下時復暈燥怒不常其蒸在肝耳輪焦枯腰腳酸疼起居不得其蒸在腎情思不寧無故精泣綿綿而下其蒸在右腎心主胞絡心膈噎塞攻擊疼痛俯仰煩悶其蒸在膈諸證雖曰不同其根多有蟲嚙其心肺治之不可不絶其根也浴法香草乃三尸九蟲所憎之物煮湯沐浴其蟲必死今之人病莫重於癆癆天下名醫多不能療蓋由一人得病傳染子孫親姻族屬故曰傳尸癆乃至滅門盡族故人皆畏之或焚尸山林殯弃江湖不入墳墓族屬無骨肉之親夫婦弃義合之禮有此傷慟深可憫憐凡覺得此病不先焚滅三尸九蟲服藥無效十少一生凡人多祕此法不傳於世人以疾呼為宿業甘心受病至死無憾嗟乎誤矣今述上聖之方以救世人三月四月取香草葉五片熟搗解衣坐之令氣入下部散入腹中從旦至暮其尸蟲盡去蓋三尸九蟲常居人身貪煞每至庚申將人罪奏上天令人夭死故老君三尸經纂云夫人生也皆寄形於父母抱五穀之精是以腹中盡皆尸蟲為人之害至庚申夜告天帝記人罪過落人生籍令人速死魂升于天魄沉於淵惟有尸蟲獨在名曰鬼若不依時祭祀輒為人祟損人性命也守庚申法夫人生於世上至國王次至大臣下至僧道庶人多少不定也惟有女人此疾尤甚學道之士若不去三尸九蟲以求長生者終不可得也每值庚申日其夜不睡守之至曉覺見體瘦倦方可投睡令人數覺此蟲不得去奏事也大帝玄科云六月八日及庚申日北帝開諸生門聽諸法詞訟既作過滿五百者其人必死也宜守庚申鎮伏三尸凡守庚申三尸長絶使人精神爽利五神恬靜搔擾每夜之時叩齒三十六通以左手捧心呼三尸名上尸彭琚出中尸彭瓆出下尸彭𤩝出輒不得為害常以庚申去手甲丑日去足甲每年七月十六日將所去手足甲燒灰和水服之三尸九蟲皆滅名曰斬三尸修合藥法凡修合藥時先須齊戒志心焚香淨掃一室不得令雞犬猫兒仔子婦人一切穢濁之物來見然後驗醫傳尸方越王文湖南長老法名清於南嶽天福二年八月十二日收得越王時古方前越王說文後有方及符法自後醫救萬餘人於淳化九年傳授於丁相公後至祥符七年雷使得此方後救百餘人越王留文曰駙馬劉志家三百餘口因買一婢姓馮名捧書一日忽患寒熱不定服藥無效約得一百餘日甚瘦弱忽然而死不經五日有子劉祥年二十歲忽然得疾如前婢服藥醫救又百餘日忽然而死自後如此病者死百餘人皆為此疾又駙馬忽然有此寒熱服藥無效越王遂大張於朝門詔名醫十日茅山道士姓李名同因入越王城問天使天使曰並未有識此證先生莫能治此疾先生曰此疾多證或死不明或夢中得物夢中見蟲夢中同行或同酒食語話出入惡風又有令人寒熱有嗽者有或傳染前患者衣服家事皆受此患也其傳氣出尸蟲多飛入衣服卧具化卵若得人氣血立化為蟲自髮尾毛孔先食血脉次食五臟令人瘦弱如食心臟後其蟲即化為鬼其藥不能醫治若未食心臟下藥投符取蟲蟲瀉下皆治疾共八九傳只有尸氣無蟲藥下取惡物青黃如膠亦安也立去身上衣服如前死人等物三日不得在家使用患人收掌如不信立依前受疾劉志乃煎鬼哭飲子取傳尸癆蟲鬼哭飲子天靈蓋酥炙鱉甲酥炙柴胡去蘆阿魏安息香貫衆桃仁二十一箇去皮尖木香十分豉心半合青蒿半握甘草二寸生銼檳榔各一分辰砂半分别研麝一錢别研赤腳蜈蚣以竹筒盛姜汁浸乾取一分用烏雞糞一分先令雞於五日前以火麻仁飼之五日後方取其糞用右件自檳榔起五味為末研勻分為三貼於六甲建日或除日貼此藥先以童子小便二升隔夜浸前藥十一味於星斗露天之下至四更時煎至八分濾去渣分為三服每服用散子藥一貼五更初溫溫頓服即穩睡卧至二三點時又吃一服至日出時覺腹中欲利如未覺又進一服是第三服如利即不用進此第三服也取下惡物并蟲以盆盛之其蟲或似蜣螂蛇虺或如蜈蚣蜘蛛蚯蚓狀急以油火并穢物併燒殺之其身上所著衣服薦褥盡易燒之食葱粥將近不住服後主療數日後夜夢人哭泣相别是其驗也如取下得蟲看其嘴或青赤黃色可療如黑色與白色乃是食人精髓即不可療也雖不可療亦絶後患又合此藥時却不得令患人聞其氣息恐蟲聞其氣後難取下并煎時亦不得令聞知合藥亦不得在病家治癆取蟲經驗天靈蓋散天靈蓋兩指大以檀香煎湯洗過用酥塗炙咒七遍云雷公神電母聖逢傳癆便須定急急如律令阿魏二分細研麝香三分別研辰砂一分别研安息香三分銅刀子切入鉢內研同諸藥拌和檳榔如雞心者五箇為末連珠甘遂二分為末一本不用此味右六味研極細和令勻每服三大錢同後湯使下薤白葱白各二七莖青篙二握甘草二莖五寸許桃枝以下并用向東南嫩者柳枝桑白皮一云桑枝酸石榴根一云枝各二握七寸許右八味須選淨潔處採用童子小便四升於銀石器內文武火煎至一升濾去渣分作三盞將前藥末調下五更初服男患女煎女患男煎服藥後如覺欲吐即用白梅肉止之五更盡覺臟腑鳴須轉下蟲及惡物黃水異糞異物若一服未下如人行五七里又進一服至天明更進一服並溫吃如瀉不止用龍骨黃連等分為末熟水調下五錢次吃白梅粥𥙷之論巳試功效嵓叟自老叟處得此神方應驗非一今連一二事書于篇後庶使來者知用藥之功效焉一職方郎中游烈者邵武寧人也其子之婦年十六得病渾身壯熱咳嗽痰涎月候不通飲食减少不歲餘衆醫不救用天靈蓋散服之取下蟲一枚如娛蚣之狀當時鉗入沸油鼎中煎之投於江遂瘥一有一男子三十歲餘患病擫擫飲食倍多而不生肌肉每日常須肉食如或稍飢腹內疼痛倦怠遂以天靈蓋散服之取下赤小蟲其數有十內有一蟲其色微紫大於衆蟲頭有細毛自後用藥𥙷理遂安兼進真蘇合香丸一有男子一人年五十每日須酒數升空心未飲則兩手與腳并皆振動得酒一升飲之少減若至醉則手足不動俗謂酒疾醫議之是振風纍日針灸服藥無效疑其蟲遂服天靈蓋散取下一物如烏梅之狀撥之有足正類蜘蛛其疾頓愈不復飲酒前效如此問病之士宜加審焉急救仙方卷之十
