front:
  text: 急救仙方卷之五惻五
  hash: sha256:1a5af5d9af00e5794bfd965785e6406f0a6b0e1892e54b75d26a58de98d7647b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0066_HFL_005-001a, image: hfl/0821/0821-132.png}
body:
  text: 濟隂品四十一證歌括用藥調經婦人經血有七七七七通行病難識非寒非熱及頭疼次第調經不須失正胃湯半夏一兩川芎四錢旋覆花四錢陳皮三錢丁香一錢白茯苓半錢右用薑煎空心服平胃湯人參草果白术宿砂白茯苓紅棗肉煨過焙乾右為末空心白湯調下漏胎腹痛漏胎下血不須醫乾煞孩兒悔莫追方內有湯名縮住皆因妊母受災危凡婦人三兩月或五七月時下血塊多不治曰漏胎縮住湯宿砂仁一兩益智仁半兩右為末每服三錢空心白湯下安胎飲香附子一兩去毛炒右為末白湯下手足疼痛百節酸疼時復痛皆因勞役損精神梅煎散子加添味溫酒時須活絡靈凡婦人四肢痛皆因先前坐草時及經絡勞役受風入體梅煎散當歸北柴胡黃耆各半兩鱉甲天仙藤甘草各一兩右為末熟酒調下活絡丸川烏草烏各半兩赤小豆地龍各一兩大蒜一箇煨右為末酒煮糊丸熟酒下腰腳痛水觸經時經不行因而腳痛致腰疼但用流經調血藥治療遲時别病生凡婦人腳疼腰痛皆因氣血凝滯多因經行之際水濕所觸住而不行流入腳經故成疾甚不轉側日夜呻吟不止或有發熱流經散當歸肉桂川芎威靈仙黑牽牛各三錢烏豆為藥地黃各半錢京芍藥四錢牡丹皮二錢右㕮咀半酒半水煎服頭疼太陽頭疼血虛風漸漸疼加兩眼中先須輔取陽經候須用蘇風最有功一字散南星生全蝎三箇川芎白芷荆芥穗各二錢右為末茶調下頭暈肝臟虛時眼暈花心中欲吐是痰邪早上起來痰暈轉須知臟腑受寒邪凡婦人頭暈眼花不得起止心中欲吐是肝虛受痰飲所致宜補肝行風化痰婁金丸茴香香附子各半錢草烏一箇半夏曲一兩白茯苓細辛各半兩右酒麵糊為丸每服二十丸食後酒下仍以三五七散補之腹常痛經年積血在關元日夜呻吟不得眠青皮烏藥薑香附莪术三稜方得痊凡婦人腹中常痛上下不足經年積血也立效散青皮陳皮烏藥乾薑香附子莪术三稜右用醋煮焙乾為末空心陳皮湯下消痛丸乾漆三稜各半兩良薑一兩斑貓三箇炒右醋一升煮乾焙為末醋糊丸每服三十丸醋湯下薑湯亦可又方三稜莪术青皮麥芽半夏各四兩右醋六升煮乾焙為末醋糊丸每服二十丸醋湯或薑湯下脅下刺痛兩旁脅痛氣不通或時沖下氣連胸烏沈香附玄胡索七氣湯中加減功凡婦人兩脅痛小腹疼至胸背乃氣不順也加減七氣湯人參桂各三錢甘草玄胡索香附子沉香各二錢烏藥五錢半夏四錢右用薑煎不拘時煎服小腸滿痛血在三焦滿腹間或時淋瀝小便難萬靈散子通神用熱酒調加三兩餐凡婦人小腹痛是血也熱也氣也注於三焦之內流於膀胱之中小便淋也或大小産後是遺經敗血所致萬靈散桂半兩當歸一兩莪术半兩木香三錢地黃六錢右為末熱酒調下又以小建中湯補之小便淋瀝八正散本事方桃仁煎手足心熱經血行時受其濕致令心中熱來侵白术柴胡滋血後手足煩熱自然清凡婦人經行時手足受水觸血風所致手足心時時有煩熱先服磁石湯加柴胡磁石湯芍藥地黃各二錢白术甘草地骨皮各三錢北柴胡五錢右㕮咀水煎空心服往來寒熱隂陽相勝致傷寒或是胎前雜病得但服柴胡加減湯一似燒湯去潑雪凡婦人寒熱往來此隂陽相勝隂勝則寒陽勝則熱所受如是受胎雜病但服柴胡散柴胡散北柴胡黃苓甘草各三錢荆芥桂各三錢地骨皮一錢右㕮咀水煎仍服小柴胡湯三五貼虛熱虛熱來時日夜般兩手脈來微細看逍遙散內加香附竹葉煎時始得安凡婦人體熱脈微乃虛熱此妄血太過道遙散內加地骨皮甘草各三錢北柴胡五錢黃芩川芎各三錢右㕮咀用水煎空心服背心疼痛心生血者資脾養或因怒氣在於心就使背心相對痛烏頭妙劑最為靈凡婦人心能生血脾能養血或因怒氣沖犯於心致使氣血相搏在於胸膈故背心相對痛烏頭丸主之烏頭丸川烏一箇川椒一兩焙桂一兩赤石脂半兩煅附子一箇炖狼毒半兩良薑半兩右為末蜜丸每服十丸空心溫酒米湯下腹內脹痛腹脹因緣氣血虛因而食積損於脾硇砂丸子頻頻服不得消時蠱有餘凡婦人心生脹或腹內脹虛劣血氣因食生冷傷於脾或月候不行血注於脾致使然也若不蘇脾順氣終成蠱疾難治硇砂丸硇砂三兩别研三稜青皮川椒乾漆各三錢厚朴二錢右為末醋糊為丸每服三十丸薑湯下四肢腫毒四肢腫毒便如水庸醫不識用藥餌米飲調下當歸丸自然經脈化為水凡婦人四肢腫痛乃經血不得流遍四肢或腫而痛此因水濕所傷觸經而然當歸丸當歸半兩桂三錢葶藶二錢人參一錢大黃三錢赤芍藥二錢白茯苓半錢甘遂半錢右用蜜丸彈子大米飲化下皮肉如針刺皮肉之中似針刺或時自吐嘔頻頻此是月經傷冷得血痛元來自有因凡婦人肌肉如針刺或時吐嘔者因月經傷冷血痛但輔胃熱方用止痛先服加乾散次服立效散方見前腹痛內加乾散沒藥當歸北芍藥各三錢桂二錢麝香一分川烏三錢茴香三錢右為末酒調下月候不乾月經太過不乾時乃是氣虛之所為內輔丸中加使用鹿茸附子輔三虛歸茸丸當歸一兩牡丹皮鹿茸各三錢附子一箇地黃三錢人參三錢右為末糊丸阿膠湯下自痢下血下痢之病有兩般赤是熱證白是寒腹痛時時頻下痢八寶湯中服立安凡婦人下痢赤白腹痛皆因受寒熱之邪積於臟腑故有此證當先去熱然後調脾胃八寶湯當歸一兩大黃半兩枳殼赤芍藥木香各三錢右水煎服調胃養中湯人參白术陳皮豆蔻各三錢訶子一箇白茯苓三錢右為末米飲調下喘嗽皆因肺藏受風寒咳嗽痰涎喘不安但要安胎調胃氣紫蘇湯點伏龍湯凡婦人肺臟感寒邪而成嗽漸次傳脾吐痰涎也治療之遲成血塊血勞也經喘不通失音也伏龍湯杏仁七箇訶子五箇陳皮枳殼各三錢阿膠七片麻黃二錢青黛一錢右為末蘇湯調食後再用調經散見三因方産後血不乾産後因何血不乾皆因傷損子宫寒日久漸加形體瘦却成帶下不能安凡婦人産後血不乾或一月之後其血黃如灰汁者日久成帶玉神散毛頭紙十張燒灰楮皮紙一大張燒灰荆芥穗一握半夏半錢右用水酒同煎若有咳嗽金沸草散薑棗煎服小便赤澀臍中有撮小便攻或在産前産後中葵子丸中三五服蔥尉臍中立便通凡婦人小便赤澀腹中有熱如小便澀赤兩津液血出多所以小便不尋常也葵子散木通半兩當歸三錢葵子二錢通草一兩梔子三箇右用水煎産後蔥尉臍中小便即通也大便閉結肺臟虛熱大便結此乃脾虛臟中竭薄苛湯點三四服自然通利熱須撤凡婦人大便結肺臟受熱風血虛也三黃散防風半兩枳殼半兩大黃二兩右為末薄荷湯下空腸丸麻仁厚朴枳殼大黃杏仁川烏各等分右為末煉蜜丸米飲下牙疼腫痛牙疼腫痛是脾虛兩脥腫時風熱俱赴筵散子頻頻漱續使輔肝湯即除凡婦人牙疼脥腫脾虛血弱氣不升降受暴風熱但以祛風赴筵散灌潄赴筵散細辛蓽附子皮川烏皮右煎湯噙漱口滿吐之輔肝湯肉豆蔻生陳皮半兩白术半兩荆芥三錢旋覆花三錢良薑茯苓三錢右為末米湯調下腸風大便之後血相隨名曰腸風氣有餘荆芥川烏為丸子黃耆酒下便令除凡婦人此證因房太過血不足氣有餘致有肛門澀痛宣腸丸川烏生荆芥穗一兩枳殼一兩右用米糊丸黃耆酒下吐血上行經血行時反上行肺經有病熱沖然但要順經調肺氣紅花散子善能痊凡婦人吐血有三一經不行反上行便傷氣也二傷沖三肺經受熱隨上沖故便吐血調脾散三稜莪术各兩麥芽半兩胡椒二錢宿砂三錢川芎二錢茴香二錢甘草三錢青皮三錢陳皮三錢右為末米飲調下通經丸當歸一錢半桂不見火青皮去白大黃炮乾漆炒令煙盡乾薑炮川烏炖桃仁炒去皮莪术炒川椒各錢右十味每味各同椒微炒放地上出汗為末一半用醋熬成膏後入一半更入雞子清同為丸隂乾醋湯下三十丸胎前腹痛胎氣有餘腫腳經三隂受濕未能分治療先須調去濕方可安胎治腳經凡婦人孕七八月腳腫此胎氣流於三隂腳經至將月時經血大過氣隨血散先為去濕次與分氣飲分氣飲陳皮甘草赤伏苓各三錢蒼术木瓜白术各五錢右以薑棗煎服筋掣發搐風入肝經發為搐虛之太極又攣拳參附湯中加減服要行氣脈自然痊凡婦人氣虛太極肝經受風肝主筋受風則搐急不舒先散風參附湯人參附子生甘草細辛白术乾薑各二錢右為末熱酒調服遍身黃面目遍身似橘黃其人經脈不尋常皆因房事中其血若不醫之定不祥凡婦人遍身黃疸名經水不調房事觸犯寸金散黃臘五錢白凡五錢陳皮三錢右以黃蠟丸滋血湯調經湯吞下大全方上語音不出或時嗽後語音咽脫著傷風是亦然但用鹽湯乾與嚼血勞之病斷琴弦凡婦人氣虛肺感風邪而失音有因嗽絶宜用腳經丸鹽煨薑過一宿早晨服之久失音者尤宜助桂湯助桂湯好真蘇子二兩杏仁三十枚訶子三枚百藥煎二兩右用熱酒調下塞噎氣不調和上膈寒致令塞噎吐痰涎丁香柿蒂枇杷葉自然塞去得安痊凡婦人氣不順上膈受寒致塞噎不住傷風者有此丁香散丁香柿蒂枇杷葉陳皮各等分右為末細嚼服形容瘦瘁氣不充時血不榮肌肉不長瘦其身谷靈丸子服兩月頰紅肥大長精神凡婦人血弱血虛肌肉不長血海虛竭大要調血氣谷靈丸黃茋人參牛膝當歸各一兩附子一枚地黃半兩杜仲蒼术白术桂枸杞各三錢茯苓五錢右以酒糊丸人參湯下數月懷胎經行如故懷胎數月不能分飲食無妨經又行蘇合香丸化水下鬼胎客忤不能迍凡婦人懷胎三四月飲食無妨月經如常此鬼忤怪氣在於臟腑是以滿腹宜服蘇合香丸井花水早晨服玉户生瘡玉户生瘡時痛癢皆因房色損其元黃蔥水洗兩三次杏仁燒灰油調痊凡婦人玉户生瘡皆因月事受風房事太過致生瘡名隂蝕宜黃蔥煎水洗次用杏仁散杏仁一兩右燒灰清油調塗身痛右邉身痛為血逆左邉身痛氣所煎思慮風寒於兩及此痛元來通一邉凡婦人身痛右是血左是氣皆因受風濕思慮交會氣血不調是氣勻氣湯是血勻血湯勻血湯茴香厚朴乳香桂甘草黑牽牛地黃羌活右等分木香湯下勻血湯當歸細辛白芷沒藥澤蘭甘草天仙藤右等分為末熱酒調下寒戰身戰栗栗似鬼魔血寒之證實無他但信子規靈有驗熱酒調和不用多凡婦人戰栗者血寒也皆因傷風冷氣血弱所以戰栗也子規丸荆芥牡丹皮桂白芍藥右為末熱酒調下心酸酸心病是脾宿寒胃中痰積致心酸陳皮麥糵能除積蒼术茱萸病日安凡婦人有積飲痰證在脾胃間時時酸心或吐水茱萸丸吳茱萸鹽湯洗蒼术各一兩陳皮去白麥芽桂神麯各五錢右水煮麵糊為丸米飲下耳聾末後三旬耳怎聾皆因妄血受其風巴戟丸中加附子更添腦麝取全功凡婦人風虛上攻如此但服巴戟丸加附子溫酒下更服黃耆湯巴戟丸局方上載遍身麻痹因虛受濕遍身麻不知癢痛眼生花氣血一時風毒感五輔祛風大有加凡婦人遍身麻痺謂之不仁皆因血風血虛受風濕所致五輔丸黃耆一兩人參五錢附子一枚當歸三錢白芍藥五錢右煉蜜丸祛風散下祛風散生川烏白术白芷甘草各三錢右溫酒調吞下五輔丸秦桂丸增添别本得效治婦人無子昔知金州范羅言乞以此方試令婦人服之四十九日如無子請罰臣一家以令天下何德易云雖其言自誇然實有異驗臣妻年草七無子服此藥二十日便有孕殘藥以與石門縣令妻年三十四斷産巳十六年服此便有娠又將殘藥與太子中守文季妻年四十無子服此遂有娠其效如神不可具述乃仙方也秦芃桂心杜仲防風厚朴各三分附子生一兩半茯苓兩半白薇乾薑沙參牛膝半夏各五錢人參一兩細辛一兩一分右十四味並生碾為末煉蜜丸如菉豆大每服三十丸空心米飲任下未效更加數丸巳覺有孕便不可服急救仙方卷之五
